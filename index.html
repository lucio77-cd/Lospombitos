<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Pombitos | v0.1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="hero">
            <div class="pixel-pigeon-main">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="10" y="4" width="4" height="2" fill="#424242"/>
                    <rect x="8" y="6" width="8" height="4" fill="#90A4AE"/>
                    <rect x="16" y="7" width="2" height="2" fill="#FFB74D"/>
                    <rect x="10" y="7" width="2" height="2" fill="black"/>
                    <rect x="6" y="10" width="12" height="6" fill="#78909C"/>
                    <rect x="8" y="16" width="8" height="2" fill="#546E7A"/>
                    <rect x="9" y="18" width="2" height="2" fill="#FF7043"/>
                    <rect x="13" y="18" width="2" height="2" fill="#FF7043"/>
                </svg>
            </div>
            <h1>Los <span>Pombitos</span></h1>
        </div>

        <hr class="divider">

        <p class="manifesto">"A rede onde o tempo voa devagar."</p>

        <a href="invite.html" class="cta-button">
            <div class="avatar-box">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="13" y="6" width="3" height="2" fill="#424242"/>
                    <rect x="16" y="7" width="2" height="2" fill="#FFB74D"/>
                    <rect x="11" y="8" width="5" height="4" fill="#90A4AE"/>
                    <rect x="13" y="9" width="1" height="1" fill="black"/>
                    <rect x="7" y="12" width="10" height="5" fill="#78909C"/>
                    <rect x="9" y="17" width="1" height="2" fill="#FF7043"/>
                    <rect x="13" y="17" width="1" height="2" fill="#FF7043"/>
                </svg>
            </div>
            <span class="cta-text">Se tem o convite, se torne pombito</span>
            <span class="cta-arrow">›</span>
        </a>

        <div class="counter-section">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <p class="counter-label">
                [ 0000 / 0100 ] codes used <span class="status-dot"></span>
            </p>
        </div>
    </div>

</body>
</html>
