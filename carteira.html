<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Carteira | Los Pombitos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#0d0d0d;--sand:#f0ebe3;--shore:#e2d9cd;--wave:#1a4fff;--foam:#c8d8ff;
      --sun:#f5b800;--muted:#8a8278;--card:#faf8f5;--green:#1a8a4a;--red:#cc2200;
      --radius:14px;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Bebas Neue',sans-serif
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--sand);color:var(--ink);min-height:100dvh;padding-bottom:90px;overscroll-behavior:none}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
    .hdr{position:sticky;top:0;z-index:100;background:var(--sand);border-bottom:1.5px solid var(--shore);padding:0 20px;height:58px;display:flex;align-items:center;gap:14px;backdrop-filter:blur(12px)}
    .btn-back{background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink);padding:4px}
    .hdr-title{font-family:var(--display);font-size:22px;letter-spacing:2px;color:var(--ink);flex:1}
    .hdr-edit{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--wave);background:var(--foam);border:none;border-radius:20px;padding:5px 12px;cursor:pointer}
    .container{padding:16px 14px;max-width:640px;margin:0 auto}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer{0%,100%{opacity:1}50%{opacity:.4}}
    .pat-card{background:var(--wave);background-image:linear-gradient(135deg,#1a4fff 0%,#0033cc 60%,#001a80 100%);padding:22px;border-radius:20px;color:white;margin-bottom:14px;position:relative;overflow:hidden;animation:fadeUp .3s ease}
    .pat-card::before{content:'POMBITOS';position:absolute;right:-16px;top:50%;transform:translateY(-50%);font-family:var(--display);font-size:70px;color:rgba(255,255,255,.05);pointer-events:none;letter-spacing:-2px}
    .pat-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;opacity:.7;margin-bottom:4px}
    .pat-valor{font-family:var(--display);font-size:38px;letter-spacing:2px;line-height:1;margin-bottom:2px}
    .pat-rentab{font-family:var(--mono);font-size:11px;margin-bottom:14px}
    .pat-rentab.pos{color:#88ffbb}.pat-rentab.neg{color:#ffaaaa}
    .pat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding-top:12px;border-top:1px solid rgba(255,255,255,.15)}
    .pat-item .pat-label{margin-bottom:2px}
    .pat-item-val{font-family:var(--mono);font-size:11px;font-weight:500}
    .resultado-banner{border-radius:16px;padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;animation:fadeUp .35s ease}
    .resultado-banner.pos{background:linear-gradient(135deg,#d4f5e2,#b8f0d0);border:1.5px solid #1a8a4a30}
    .resultado-banner.neg{background:linear-gradient(135deg,#ffd5ce,#ffc2b8);border:1.5px solid #cc220030}
    .rb-left .rb-label{font-family:var(--mono);font-size:8px;letter-spacing:2px;margin-bottom:4px}
    .rb-left .rb-label.pos{color:var(--green)}.rb-left .rb-label.neg{color:var(--red)}
    .rb-valor{font-family:var(--display);font-size:30px;letter-spacing:1px}
    .rb-valor.pos{color:var(--green)}.rb-valor.neg{color:var(--red)}
    .rb-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
    .rb-pct{font-family:var(--display);font-size:26px;letter-spacing:1px}
    .rb-pct.pos{color:var(--green)}.rb-pct.neg{color:var(--red)}
    .chart-card{background:var(--card);border:1.5px solid var(--shore);border-radius:var(--radius);padding:18px;margin-bottom:14px;animation:fadeUp .35s ease}
    .chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .chart-title{font-family:var(--display);font-size:16px;letter-spacing:2px;color:var(--ink)}
    .chart-periods{display:flex;gap:4px}
    .period-btn{font-family:var(--mono);font-size:8px;letter-spacing:1px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--shore);background:none;color:var(--muted);cursor:pointer;transition:all .2s}
    .period-btn.on{background:var(--wave);color:white;border-color:var(--wave)}
    .chart-wrap{position:relative;height:140px;margin-bottom:12px}
    canvas#perf-chart{width:100%;height:140px}
    .chart-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .cs-item{background:var(--sand);border-radius:10px;padding:10px;text-align:center}
    .cs-label{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;color:var(--muted);margin-bottom:3px}
    .cs-val{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--ink)}
    .cs-val.pos{color:var(--green)}.cs-val.neg{color:var(--red)}
    .chart-note{font-family:var(--mono);font-size:8px;color:var(--muted);text-align:center;margin-top:8px;letter-spacing:.5px}
    .tabs{display:flex;gap:8px;margin-bottom:14px}
    .tab-btn{flex:1;height:36px;font-family:var(--mono);font-size:9px;letter-spacing:1px;border-radius:20px;border:1.5px solid var(--shore);background:var(--card);color:var(--muted);cursor:pointer;transition:all .2s}
    .tab-btn.on{background:var(--wave);color:white;border-color:var(--wave)}
    .pos-card{background:var(--card);border:1.5px solid var(--shore);border-radius:var(--radius);padding:16px;margin-bottom:10px;animation:fadeUp .3s ease;transition:border-color .2s}
    .pos-card:hover{border-color:var(--foam)}
    .pos-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .pos-left .pos-ticker{font-family:var(--display);font-size:22px;letter-spacing:2px;color:var(--wave)}
    .pos-left .pos-tipo{font-family:var(--mono);font-size:8px;letter-spacing:1px;background:var(--foam);color:var(--wave);border-radius:20px;padding:2px 8px;display:inline-block;margin-top:3px}
    .pos-right{text-align:right}
    .pos-valor{font-family:var(--display);font-size:20px;letter-spacing:1px;color:var(--ink)}
    .pos-rentab{font-family:var(--mono);font-size:11px;font-weight:500;margin-top:2px}
    .pos-rentab.pos{color:var(--green)}.pos-rentab.neg{color:var(--red)}
    .pos-resultado{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:12px;margin-bottom:10px}
    .pos-resultado.pos{background:linear-gradient(135deg,#d4f5e2,#c8f0da);border:1px solid #1a8a4a20}
    .pos-resultado.neg{background:linear-gradient(135deg,#ffd5ce,#ffc8bf);border:1px solid #cc220020}
    .pr-left .pr-label{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;margin-bottom:4px}
    .pr-label.pos{color:var(--green)}.pr-label.neg{color:var(--red)}
    .pr-valor{font-family:var(--display);font-size:22px;letter-spacing:1px}
    .pr-valor.pos{color:var(--green)}.pr-valor.neg{color:var(--red)}
    .pr-right{text-align:right}
    .pr-pct{font-family:var(--display);font-size:20px;letter-spacing:1px}
    .pr-pct.pos{color:var(--green)}.pr-pct.neg{color:var(--red)}
    .pr-desde{font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:2px}
    .pos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding-top:10px;border-top:1px solid var(--shore);margin-bottom:10px}
    .pos-stat{display:flex;flex-direction:column;gap:2px}
    .pos-stat-lbl{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;color:var(--muted)}
    .pos-stat-val{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--ink)}
    .pos-actions{display:flex;gap:6px}
    .btn-rel{flex:1;height:34px;background:var(--wave);color:white;border:none;border-radius:20px;font-family:var(--mono);font-size:9px;letter-spacing:1px;cursor:pointer;transition:all .2s}
    .btn-buy{flex:1;height:34px;background:var(--green);color:white;border:none;border-radius:20px;font-family:var(--mono);font-size:9px;letter-spacing:1px;cursor:pointer}
    .btn-sell{flex:1;height:34px;background:none;color:var(--red);border:1.5px solid var(--red);border-radius:20px;font-family:var(--mono);font-size:9px;letter-spacing:1px;cursor:pointer;transition:all .2s}
    .btn-sell:hover{background:var(--red);color:white}
    .hist-card{background:var(--card);border:1.5px solid var(--shore);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;animation:fadeUp .3s ease}
    .hist-row{display:flex;justify-content:space-between;align-items:center}
    .hist-left{display:flex;align-items:center;gap:10px}
    .hist-pill{font-family:var(--mono);font-size:8px;letter-spacing:1px;border-radius:20px;padding:3px 9px}
    .hist-pill.c{background:#d4f5e2;color:var(--green)}.hist-pill.v{background:#ffd5ce;color:var(--red)}
    .hist-ticker{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--wave)}
    .hist-info{font-size:10px;color:var(--muted);margin-top:2px}
    .hist-total{font-family:var(--mono);font-size:13px;font-weight:500;text-align:right}
    .hist-data{font-size:9px;color:var(--muted);text-align:right;margin-top:2px}
    .hist-warn{font-family:var(--mono);font-size:8px;color:var(--muted);background:var(--shore);border-radius:4px;padding:1px 5px;margin-left:4px}
    .skel{background:var(--card);border:1.5px solid var(--shore);border-radius:var(--radius);padding:16px;margin-bottom:10px}
    .sk-line{height:12px;border-radius:4px;background:var(--shore);animation:shimmer 1.4s infinite;margin-bottom:8px}
    .empty{text-align:center;padding:50px 20px;color:var(--muted);font-family:var(--mono);font-size:10px;letter-spacing:1px}
    .empty-ico{font-size:38px;margin-bottom:12px;display:block}
    .nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(240,235,227,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1.5px solid var(--shore);display:flex;justify-content:space-around;align-items:center;z-index:100}
    .ni{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 12px;border-radius:10px;transition:all .2s;text-decoration:none;color:inherit;-webkit-tap-highlight-color:transparent}
    .ni:hover{background:var(--shore)}
    .ni-ico{font-size:20px;line-height:1}
    .ni-lbl{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--muted)}
    .ni.on .ni-lbl{color:var(--wave);font-weight:500}
  </style>
</head>
<body>
  <header class="hdr">
    <button class="btn-back" onclick="history.back()">←</button>
    <div class="hdr-title">CARTEIRA</div>
    <button class="hdr-edit" onclick="location.href='corrigir-carteira.html'">✏️ EDITAR</button>
  </header>

  <div class="container">
    <div class="pat-card">
      <p class="pat-label">PATRIMÔNIO TOTAL</p>
      <p class="pat-valor" id="pat-total">R$ ···</p>
      <p class="pat-rentab" id="pat-rentab">···</p>
      <div class="pat-grid">
        <div class="pat-item"><p class="pat-label">DISPONÍVEL</p><p class="pat-item-val" id="pat-disp">···</p></div>

      </div>

    <div class="chart-card" id="chart-card" style="display:none">

        <div class="chart-periods">
          <button class="period-btn on" onclick="mudarPeriodo(30,this)">1M</button>

          <button class="period-btn" onclick="mudarPeriodo(180,this)">6M</button>

      <div class="chart-wrap"><canvas id="perf-chart"></canvas></div>
      <div class="chart-stats">
        <div class="cs-item"><p class="cs-label">MÍNIMO</p><p class="cs-val" id="cs-min">···</p></div>

    <div class="tabs">

    <div id="sec-posicoes">

        <div class="skel"><div class="sk-line" style="width:40%;height:20px"></div><div class="sk-line"></div><div class="sk-line" style="width:70%"></div></div>

      </div>
      <div id="hist-list"></div>

  </div>

  <nav class="nav">
    <a class="ni" href="feed.html"><span class="ni-ico">🏠</span><span class="ni-lbl">FEED</span></a>
    <a class="ni" href="investir.html"><span class="ni-ico">📈</span><span class="ni-lbl">INVESTIR</span></a>
    <a class="ni on" href="carteira.html"><span class="ni-ico">💼</span><span class="ni-lbl">CARTEIRA</span></a>
    <a class="ni" href="perfil.html"><span class="ni-ico">👤</span><span class="ni-lbl">PERFIL</span></a>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="mercado-api.js"></script>
  <script>
  'use strict';

  const CAPITAL = 500000;
  let db, meuUID;
  let posicoes = [], cotacoes = {}, ordensValidas = [];
  let periodoGraficoDias = 30;

  // ─────────────────────────────────────────────
  //  parseData: suporta Firestore Timestamp, {seconds}, string ISO, Date
  // ─────────────────────────────────────────────
  function parseData(v) {
    if (!v) return null;
    if (typeof v.toDate === 'function') return v.toDate();
    if (typeof v.seconds === 'number')  return new Date(v.seconds * 1000);
    if (typeof v === 'string')          return new Date(v);
    if (v instanceof Date)              return v;
    return null;
  }

  function fmtData(v) {
    const d = parseData(v);
    if (!d || isNaN(d.getTime())) return '—';
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function toKey(d) { return d.toISOString().slice(0, 10); }

  const R$  = v => 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const pct = v => (v >= 0 ? '+' : '') + Number(v).toFixed(2) + '%';

  function showTab(t) {
    document.getElementById('sec-posicoes').style.display  = t === 'posicoes'  ? 'block' : 'none';
    document.getElementById('sec-historico').style.display = t === 'historico' ? 'block' : 'none';
    document.getElementById('tab-pos').classList.toggle('on',  t === 'posicoes');
    document.getElementById('tab-hist').classList.toggle('on', t === 'historico');
  }

  firebase.auth().onAuthStateChanged(async user => {
    if (!user) { location.href = 'invite.html'; return; }
    meuUID = user.uid;
    db     = window.db || firebase.firestore();
    MercadoAPI.onPrecioFallback = async () => null; // sem fallback PM
    await carregar();
  });

  async function carregar() {
    try {
      const [uS, cS, ordSnap] = await Promise.all([
        db.collection('usuarios').doc(meuUID).get(),
        db.collection('carteiras').doc(meuUID).get(),
        db.collection('ordens').where('uid', '==', meuUID).get()
          .catch(() => db.collection('ordens').where('uid', '==', meuUID).limit(200).get())
      ]);

      const u = uS.data() || {};
      const c = cS.exists ? cS.data() : {};

      // ── Deduplicação de posições (Bug USIM5 duplicado) ──
      // O array posicoes no Firestore pode ter duplicatas do mesmo ticker.
      // Mesclamos pelo PM ponderado.
      const posicoesRaw = c.posicoes || [];
      const posMap = {};
      for (const p of posicoesRaw) {
        const t = p.ticker;
        if (!posMap[t]) {
          posMap[t] = { ...p };
        } else {
          // Mescla: PM ponderado, soma quantidades
          const qtdAntes  = posMap[t].quantidade || 0;
          const pmAntes   = posMap[t].preco_medio || 0;
          const qtdNova   = p.quantidade || 0;
          const pmNovo    = p.preco_medio || 0;
          const qtdTotal  = qtdAntes + qtdNova;
          posMap[t].quantidade  = qtdTotal;
          posMap[t].preco_medio = qtdTotal > 0
            ? (qtdAntes * pmAntes + qtdNova * pmNovo) / qtdTotal
            : 0;
          // Mantém a data mais antiga
          const dAntes = parseData(posMap[t].data_compra);
          const dNova  = parseData(p.data_compra);
          if (dNova && dAntes && dNova < dAntes) posMap[t].data_compra = p.data_compra;
          console.warn(`[Posições] Duplicata mesclada: ${t} (${qtdAntes}+${qtdNova}=${qtdTotal} cotas)`);
        }
      }
      posicoes = Object.values(posMap);

      // ── Filtra ordens válidas ──
      // FIX Bug 1: descarta ordens com preco=0 ou total=0 (dirty orders)
      // FIX Bug 3: aceita status "agendada" e "executada"
      const todasOrdens = ordSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      
      ordensValidas = todasOrdens
        .filter(o => {
          const d = parseData(o.data);
          if (!d || isNaN(d.getTime())) return false; // sem data válida
          const total = o.total > 0 ? o.total : (o.preco || 0) * (o.quantidade || 0);
          if (total <= 0) {
            console.warn(`[Ordens] Descartada ordem sujo: ${o.ticker} preco=${o.preco} total=${o.total}`);
            return false; // dirty order — preco/total zero
          }
          if (!o.lado) return false;
          // Aceita qualquer status exceto cancelada
          if (o.status === 'cancelada') return false;
          return true;
        })
        .sort((a, b) => parseData(a.data) - parseData(b.data));

      console.log(`[Ordens] ${todasOrdens.length} total, ${ordensValidas.length} válidas`);
      ordensValidas.forEach(o => {
        const total = o.total > 0 ? o.total : o.preco * o.quantidade;
        console.log(`  ${o.lado.padEnd(6)} ${o.ticker.padEnd(6)} ${o.quantidade}×R$${o.preco} = R$${total.toFixed(2)} @ ${fmtData(o.data)} [${o.status}]`);
      });

      // ── Saldo recalculado a partir das ordens válidas ──
      let saldoRecalc = CAPITAL;
      for (const o of ordensValidas) {
        const total = o.total > 0 ? o.total : (o.preco || 0) * (o.quantidade || 0);
        if (o.lado === 'compra') saldoRecalc -= total;
        if (o.lado === 'venda')  saldoRecalc += total;
      }

      const saldoFirestore = c.saldo_disponivel ?? u.saldo_disponivel ?? CAPITAL;
      console.log(`[Saldo] Recalculado: R$${saldoRecalc.toFixed(2)} | Firestore: R$${saldoFirestore.toFixed(2)} | Diff: R$${Math.abs(saldoRecalc-saldoFirestore).toFixed(2)}`);

      const saldoDisp = Math.max(0, saldoRecalc);

      // ── Cotações de mercado ──
      const tickers = posicoes
        .filter(p => p.tipo === 'acoes' || p.tipo === 'fiis' || !p.tipo)
        .map(p => p.ticker);

      if (tickers.length) {
        try {
          const dados = await MercadoAPI.buscarMultiplos(tickers);
          dados.forEach(d => { if (d.preco > 0) cotacoes[d.ticker] = d.preco; });
        } catch (e) { console.warn('buscarMultiplos:', e); }

        const faltam = tickers.filter(t => !cotacoes[t]);
        if (faltam.length) {
          await Promise.allSettled(faltam.map(async ticker => {
            try {
              const d = await MercadoAPI.buscarAtivo(ticker);
              if (d?.preco > 0) cotacoes[ticker] = d.preco;
            } catch (_) {}
          }));
        }
      }

      console.log('[Cotações]', cotacoes);

      // ── Cálculo do patrimônio ──
      // Valor investido = PM × qtd (custo de aquisição real, do Firestore)
      const totalInvestido = posicoes.reduce((acc, p) =>
        acc + (p.quantidade || 0) * (p.preco_medio || 0), 0);

      // Valor de mercado = cotação real × qtd (ou PM como fallback display)
      const valorMercado = posicoes.reduce((acc, p) => {
        const preco = cotacoes[p.ticker] || p.preco_medio || 0;
        return acc + (p.quantidade || 0) * preco;
      }, 0);

      const patrimonioDisplay = saldoDisp + valorMercado;
      const resultado         = patrimonioDisplay - CAPITAL;
      const rentab            = (resultado / CAPITAL) * 100;
      const isPos             = resultado >= 0;

      document.getElementById('pat-total').textContent = R$(patrimonioDisplay);
      document.getElementById('pat-disp').textContent  = R$(saldoDisp);
      document.getElementById('pat-inv').textContent   = R$(valorMercado);

      const rentEl = document.getElementById('pat-rentab');
      rentEl.textContent = pct(rentab) + ' desde o início';
      rentEl.className   = 'pat-rentab ' + (isPos ? 'pos' : 'neg');

      const banner = document.getElementById('resultado-banner');
      banner.className     = 'resultado-banner ' + (isPos ? 'pos' : 'neg');
      banner.style.display = 'flex';
      document.getElementById('rb-label').textContent = isPos ? '📈 GANHO TOTAL' : '📉 PERDA TOTAL';
      document.getElementById('rb-label').className   = 'rb-label ' + (isPos ? 'pos' : 'neg');
      document.getElementById('rb-valor').textContent = (isPos ? '+' : '') + R$(resultado);
      document.getElementById('rb-valor').className   = 'rb-valor ' + (isPos ? 'pos' : 'neg');
      document.getElementById('rb-pct').textContent   = pct(rentab);
      document.getElementById('rb-pct').className     = 'rb-pct ' + (isPos ? 'pos' : 'neg');

      renderPosicoes();
      renderGrafico(periodoGraficoDias);
      renderHistorico();

    } catch (e) {
      console.error('carregar:', e);
      document.getElementById('pos-loading').innerHTML =
        `<div class="empty"><span class="empty-ico">⚠️</span>Erro ao carregar.<br><span style="opacity:.6">${e.message}</span></div>`;
    }
  }

  // ─────────────────────────────────────────────
  //  GRÁFICO DO PATRIMÔNIO TOTAL
  //  Usa ordensValidas (sem dirty orders, com status agendada/executada)
  // ─────────────────────────────────────────────
  function renderGrafico(dias) {
    if (!ordensValidas.length) {
      document.getElementById('chart-card').style.display = 'none';
      return;
    }

    const hoje    = new Date();
    const hojeKey = toKey(hoje);

    // Mapa ordens por dia (key YYYY-MM-DD)
    const ordemPorDia = {};
    for (const o of ordensValidas) {
      const k = toKey(parseData(o.data));
      if (!ordemPorDia[k]) ordemPorDia[k] = [];
      ordemPorDia[k].push(o);
    }

    // Data de início do período
    const dataInicio = new Date(hoje);
    dataInicio.setDate(dataInicio.getDate() - dias);
    dataInicio.setHours(0, 0, 0, 0);

    // Estado da carteira no início do período
    // (aplica todas as ordens ANTERIORES ao início)
    let saldo = CAPITAL;
    const qtds = {}; // { ticker: { qtd, pm } }

    for (const o of ordensValidas) {
      const d = parseData(o.data);
      // Compara: se a ordem é ANTES do início do período, aplica
      if (d >= dataInicio) break;
      const total = o.total > 0 ? o.total : (o.preco || 0) * (o.quantidade || 0);
      if (o.lado === 'compra') {
        saldo -= total;
        if (!qtds[o.ticker]) qtds[o.ticker] = { qtd: 0, pm: 0 };
        const prev = qtds[o.ticker];
        const nq   = prev.qtd + (o.quantidade || 0);
        qtds[o.ticker] = { qtd: nq, pm: nq > 0 ? (prev.qtd * prev.pm + (o.quantidade||0) * (o.preco||0)) / nq : 0 };
      } else if (o.lado === 'venda') {
        saldo += total;
        if (qtds[o.ticker]) qtds[o.ticker].qtd = Math.max(0, qtds[o.ticker].qtd - (o.quantidade||0));
      }
    }

    // Percorre dias úteis do período
    let saldoCorrendo = saldo;
    const qtdCorrendo = JSON.parse(JSON.stringify(qtds));
    const pontos = [];

    for (let i = 0; i <= dias; i++) {
      const d = new Date(dataInicio);
      d.setDate(d.getDate() + i);
      if (d > hoje) break;
      if (d.getDay() === 0 || d.getDay() === 6) continue;

      const k = toKey(d);

      // Aplica ordens deste dia
      if (ordemPorDia[k]) {
        for (const o of ordemPorDia[k]) {
          const total = o.total > 0 ? o.total : (o.preco||0) * (o.quantidade||0);
          if (o.lado === 'compra') {
            saldoCorrendo -= total;
            if (!qtdCorrendo[o.ticker]) qtdCorrendo[o.ticker] = { qtd: 0, pm: 0 };
            const prev = qtdCorrendo[o.ticker];
            const nq   = prev.qtd + (o.quantidade||0);
            qtdCorrendo[o.ticker] = { qtd: nq, pm: nq > 0 ? (prev.qtd * prev.pm + (o.quantidade||0) * (o.preco||0)) / nq : 0 };
          } else if (o.lado === 'venda') {
            saldoCorrendo += total;
            if (qtdCorrendo[o.ticker]) qtdCorrendo[o.ticker].qtd = Math.max(0, qtdCorrendo[o.ticker].qtd - (o.quantidade||0));
          }
        }
      }

      // Patrimônio deste dia
      const ehHoje = k === hojeKey;
      const valorAtivos = Object.entries(qtdCorrendo).reduce((acc, [ticker, { qtd, pm }]) => {
        const preco = ehHoje && cotacoes[ticker] ? cotacoes[ticker] : pm;
        return acc + qtd * preco;
      }, 0);

      const patrimonio = Math.max(0, saldoCorrendo) + valorAtivos;
      const [, mm, dd] = k.split('-');
      pontos.push({ label: `${dd}/${mm}`, valor: patrimonio });
    }

    console.log(`[Gráfico] ${pontos.length} pontos — primeiro: ${pontos[0]?.label} R$${pontos[0]?.valor?.toFixed(0)} | último: ${pontos[pontos.length-1]?.label} R$${pontos[pontos.length-1]?.valor?.toFixed(0)}`);

    if (pontos.length < 2) {
      document.getElementById('chart-card').style.display = 'none';
      return;
    }

    const valores = pontos.map(p => p.valor);
    const min     = Math.min(...valores);
    const max     = Math.max(...valores);
    const varPct  = pontos[0].valor > 0 ? ((valores[valores.length-1] - pontos[0].valor) / pontos[0].valor) * 100 : 0;
    const isPos   = varPct >= 0;

    document.getElementById('cs-min').textContent = R$(min);
    document.getElementById('cs-max').textContent = R$(max);
    const csVar = document.getElementById('cs-var');
    csVar.textContent = pct(varPct);
    csVar.className   = 'cs-val ' + (isPos ? 'pos' : 'neg');
    document.getElementById('chart-card').style.display = 'block';

    desenharGrafico(pontos.map(p => p.label), valores, isPos);
  }

  function desenharGrafico(labels, valores, isPos) {
    const canvas = document.getElementById('perf-chart');
    const ctx    = canvas.getContext('2d');
    const dpr    = window.devicePixelRatio || 1;
    const rect   = canvas.parentElement.getBoundingClientRect();
    canvas.width  = rect.width * dpr;
    canvas.height = 140 * dpr;
    canvas.style.width  = rect.width + 'px';
    canvas.style.height = '140px';
    ctx.scale(dpr, dpr);
    const W = rect.width, H = 140;
    const pad = { t: 10, r: 8, b: 28, l: 60 };
    const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;
    const minP = Math.min(...valores) * 0.998, maxP = Math.max(...valores) * 1.002;
    const range = maxP - minP || 1;
    const xOf = i => pad.l + (i / (valores.length - 1)) * cw;
    const yOf = v => pad.t + ch - ((v - minP) / range) * ch;
    ctx.clearRect(0, 0, W, H);
    // Linha R$500K
    if (CAPITAL >= minP && CAPITAL <= maxP) {
      const yK = yOf(CAPITAL);
      ctx.save(); ctx.setLineDash([4,4]);
      ctx.strokeStyle = '#8a8278'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(pad.l, yK); ctx.lineTo(W-pad.r, yK); ctx.stroke();
      ctx.fillStyle = '#8a8278'; ctx.font = '8px DM Mono,monospace'; ctx.textAlign = 'left';
      ctx.fillText('500K', pad.l+2, yK-3); ctx.restore();
    }
    // Grid
    ctx.strokeStyle = '#e2d9cd'; ctx.lineWidth = 1;
    [0, 0.5, 1].forEach(f => {
      const y = pad.t + f * ch;
      ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W-pad.r, y); ctx.stroke();
      ctx.fillStyle = '#8a8278'; ctx.font = '9px DM Mono,monospace'; ctx.textAlign = 'right';
      ctx.fillText('R$' + ((maxP - f*range)/1000).toFixed(0) + 'K', pad.l-4, y+3);
    });
    // Área
    const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t+ch);
    grad.addColorStop(0, isPos ? 'rgba(26,138,74,.25)' : 'rgba(204,34,0,.25)');
    grad.addColorStop(1, isPos ? 'rgba(26,138,74,.02)' : 'rgba(204,34,0,.02)');
    ctx.beginPath(); ctx.moveTo(xOf(0), yOf(valores[0]));
    valores.forEach((v,i) => { if (i>0) ctx.lineTo(xOf(i), yOf(v)); });
    ctx.lineTo(xOf(valores.length-1), pad.t+ch); ctx.lineTo(xOf(0), pad.t+ch);
    ctx.closePath(); ctx.fillStyle = grad; ctx.fill();
    // Linha
    ctx.beginPath(); ctx.strokeStyle = isPos ? '#1a8a4a' : '#cc2200';
    ctx.lineWidth = 2; ctx.lineJoin = 'round';
    ctx.moveTo(xOf(0), yOf(valores[0]));
    valores.forEach((v,i) => { if (i>0) ctx.lineTo(xOf(i), yOf(v)); });
    ctx.stroke();
    // Ponto final
    const lx = xOf(valores.length-1), ly = yOf(valores[valores.length-1]);
    ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI*2);
    ctx.fillStyle = isPos ? '#1a8a4a' : '#cc2200'; ctx.fill();
    ctx.strokeStyle = '#faf8f5'; ctx.lineWidth = 2; ctx.stroke();
    // Labels X
    ctx.fillStyle = '#8a8278'; ctx.font = '8px DM Mono,monospace'; ctx.textAlign = 'center';
    [0, Math.floor(valores.length/2), valores.length-1].forEach(i => {
      if (labels[i]) ctx.fillText(labels[i], xOf(i), H-6);
    });
  }

  async function mudarPeriodo(dias, btn) {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    periodoGraficoDias = dias;
    renderGrafico(dias);
  }

  // ─────────────────────────────────────────────
  //  POSIÇÕES
  // ─────────────────────────────────────────────
  function renderPosicoes() {
    document.getElementById('pos-loading').style.display = 'none';
    const list = document.getElementById('pos-list');

    if (!posicoes.length) {
      list.innerHTML = '<div class="empty"><span class="empty-ico">📭</span>Nenhuma posição ainda.</div>';
      return;
    }

    list.innerHTML = '';
    posicoes.forEach(pos => {
      const cotacao    = cotacoes[pos.ticker];
      const temCotacao = cotacao > 0;
      const pm         = pos.preco_medio || 0;
      const qtd        = pos.quantidade  || 0;
      // Valor pago = PM × qtd (dados do Firestore, confiáveis)
      const valorPago  = qtd * pm;
      const valorAtual = temCotacao ? qtd * cotacao : null;
      const resultado  = valorAtual !== null ? valorAtual - valorPago : null;
      const rentab     = resultado !== null && valorPago > 0 ? (resultado / valorPago) * 100 : null;
      const isPos      = resultado !== null ? resultado >= 0 : null;
      const unit       = pos.tipo === 'tesouro' ? 'títulos' : pos.tipo === 'cripto' ? 'unidades' : 'cotas';
      const tipo       = pos.tipo || 'acoes';
      const dataFmt    = fmtData(pos.data_compra || pos.ultima_atualizacao);

      let resultadoHtml;
      if (resultado !== null) {
        resultadoHtml = `
          <div class="pos-resultado ${isPos ? 'pos' : 'neg'}">
            <div class="pr-left">
              <p class="pr-label ${isPos ? 'pos' : 'neg'}">${isPos ? '📈 GANHO DESDE A COMPRA' : '📉 PERDA DESDE A COMPRA'}</p>
              <p class="pr-valor ${isPos ? 'pos' : 'neg'}">${resultado >= 0 ? '+' : ''}${R$(resultado)}</p>
            </div>
            <div class="pr-right">
              <p class="pr-pct ${isPos ? 'pos' : 'neg'}">${pct(rentab)}</p>
              <p class="pr-desde">desde ${dataFmt}</p>
            </div>
          </div>`;
      } else {
        resultadoHtml = `
          <div style="background:var(--shore);border-radius:10px;padding:10px 14px;margin-bottom:10px;
               font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.5px">
            ⚡ Cotação indisponível agora
          </div>`;
      }

      const precoAtualHtml = temCotacao
        ? `<span class="pos-stat-val">${R$(cotacao)}</span>`
        : `<span class="pos-stat-val" style="color:var(--muted);font-size:9px">—</span>`;

      const valorHojeHtml = valorAtual !== null
        ? `<span class="pos-stat-val">${R$(valorAtual)}</span>`
        : `<span class="pos-stat-val" style="color:var(--muted);font-size:9px">—</span>`;

      const headerValor  = valorAtual !== null ? R$(valorAtual) : R$(valorPago);
      const headerRentab = rentab !== null
        ? `<p class="pos-rentab ${isPos ? 'pos' : 'neg'}">${pct(rentab)} no período</p>`
        : `<p class="pos-rentab" style="color:var(--muted);font-size:9px">cotação indisponível</p>`;

      const precoParaOrdem = cotacao || pm;

      const card = document.createElement('div');
      card.className = 'pos-card';
      card.innerHTML = `
        <div class="pos-top">
          <div class="pos-left">
            <p class="pos-ticker">${pos.ticker}</p>
            <span class="pos-tipo">${tipo.toUpperCase()}</span>
          </div>
          <div class="pos-right">
            <p class="pos-valor">${headerValor}</p>
            ${headerRentab}
          </div>
        </div>
        ${resultadoHtml}
        <div class="pos-grid">
          <div class="pos-stat"><span class="pos-stat-lbl">QUANTIDADE</span><span class="pos-stat-val">${qtd} ${unit}</span></div>
          <div class="pos-stat"><span class="pos-stat-lbl">PREÇO MÉDIO</span><span class="pos-stat-val">${R$(pm)}</span></div>
          <div class="pos-stat"><span class="pos-stat-lbl">PREÇO ATUAL</span>${precoAtualHtml}</div>
          <div class="pos-stat"><span class="pos-stat-lbl">VALOR PAGO</span><span class="pos-stat-val">${R$(valorPago)}</span></div>
          <div class="pos-stat"><span class="pos-stat-lbl">VALOR HOJE</span>${valorHojeHtml}</div>
          <div class="pos-stat"><span class="pos-stat-lbl">DESDE</span><span class="pos-stat-val">${dataFmt}</span></div>
        </div>
        <div class="pos-actions">
          <button class="btn-rel"  onclick="location.href='relatorio.html?ticker=${pos.ticker}&tipo=${tipo}'">📊 RELATÓRIO</button>
          <button class="btn-buy"  onclick="location.href='ordem.html?ticker=${pos.ticker}&tipo=${tipo}&preco=${precoParaOrdem}&lado=compra'">+ COMPRAR</button>
          <button class="btn-sell" onclick="location.href='ordem.html?ticker=${pos.ticker}&tipo=${tipo}&preco=${precoParaOrdem}&lado=venda'">VENDER</button>
        </div>`;
      list.appendChild(card);
    });
  }

  // ─────────────────────────────────────────────
  //  HISTÓRICO
  // ─────────────────────────────────────────────
  function renderHistorico() {
    document.getElementById('hist-loading').style.display = 'none';
    const list = document.getElementById('hist-list');

    // Mostra TODAS as ordens (incluindo dirty) para auditoria, mais recente primeiro
    const todasParaHistorico = ordensValidas.slice().reverse();

    if (!todasParaHistorico.length) {
      list.innerHTML = '<div class="empty"><span class="empty-ico">📋</span>Nenhuma ordem ainda.</div>';
      return;
    }

    list.innerHTML = '';
    todasParaHistorico.forEach(o => {
      const isC  = o.lado === 'compra';
      const unit = o.tipo === 'tesouro' ? 'títulos' : o.tipo === 'cripto' ? 'und' : 'cotas';
      const total = o.total > 0 ? o.total : (o.preco||0) * (o.quantidade||0);

      const card = document.createElement('div');
      card.className = 'hist-card';
      card.innerHTML = `
        <div class="hist-row">
          <div class="hist-left">
            <span class="hist-pill ${isC ? 'c' : 'v'}">${isC ? 'COMPRA' : 'VENDA'}</span>
            <div>
              <p class="hist-ticker">${o.ticker}</p>
              <p class="hist-info">${o.quantidade} ${unit} · ${R$(o.preco||0)}/un</p>
            </div>
          </div>
          <div>
            <p class="hist-total" style="color:${isC ? 'var(--red)' : 'var(--green)'}">${isC ? '-' : '+'} ${R$(total)}</p>
            <p class="hist-data">${fmtData(o.data)}</p>
          </div>
        </div>`;
      list.appendChild(card);
    });
  }
  </script>
