<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Los Pombitos | Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ─────────────────────────────────────────
       TOKENS & RESET
    ───────────────────────────────────────── */
    :root {
      --ink:      #0d0d0d;
      --sand:     #f0ebe3;
      --shore:    #e2d9cd;
      --wave:     #1a4fff;
      --foam:     #c8d8ff;
      --sun:      #f5b800;
      --coral:    #ff5533;
      --muted:    #8a8278;
      --card:     #faf8f5;
      --radius:   14px;
      --mono:     'DM Mono', monospace;
      --sans:     'DM Sans', sans-serif;
      --display:  'Bebas Neue', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--sand);
      color: var(--ink);
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    /* ─────────────────────────────────────────
       GRAIN OVERLAY — dá textura de areia
    ───────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: .5;
    }

    /* ─────────────────────────────────────────
       HEADER
    ───────────────────────────────────────── */
    .feed-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--sand);
      border-bottom: 1.5px solid var(--shore);
      padding: 0 20px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .header-logo {
      font-family: var(--display);
      font-size: 26px;
      letter-spacing: 3px;
      color: var(--wave);
      line-height: 1;
    }

    .header-logo span {
      color: var(--sun);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #user-avatar-top {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid var(--wave);
      object-fit: cover;
      display: none;
      cursor: pointer;
    }

    .btn-sair {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 1.5px;
      color: var(--muted);
      background: none;
      border: 1px solid var(--shore);
      border-radius: 20px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-sair:hover { color: var(--coral); border-color: var(--coral); }

    /* ─────────────────────────────────────────
       LAYOUT
    ───────────────────────────────────────── */
    .app-container {
      padding: 20px 16px 90px;
      max-width: 640px;
      margin: 0 auto;
    }

    .section { display: none; animation: fadeUp .3s ease; }
    .section.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─────────────────────────────────────────
       POST BOX
    ───────────────────────────────────────── */
    .post-box {
      background: var(--card);
      border: 1.5px solid var(--shore);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 22px;
    }

    .post-box-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    #post-avatar-box {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--foam);
      flex-shrink: 0;
    }

    #post-text {
      width: 100%;
      border: none;
      background: transparent;
      font-family: var(--sans);
      font-size: 14px;
      color: var(--ink);
      resize: none;
      outline: none;
      min-height: 60px;
      line-height: 1.6;
    }

    #post-text::placeholder { color: var(--muted); }

    .post-box-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--shore);
    }

    #char-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    #char-count.quase { color: var(--sun); }
    #char-count.cheio { color: var(--coral); }

    .btn-postar {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1px;
      background: var(--wave);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 9px 22px;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-postar:hover:not(:disabled) { background: #0033cc; transform: translateY(-1px); }
    .btn-postar:disabled { opacity: .5; cursor: not-allowed; }

    /* ─────────────────────────────────────────
       POST CARDS
    ───────────────────────────────────────── */
    #feed-lista { display: flex; flex-direction: column; gap: 12px; }

    .post-card {
      background: var(--card);
      border: 1.5px solid var(--shore);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      transition: border-color .2s;
    }
    .post-card:hover { border-color: var(--foam); }

    .post-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid var(--foam);
    }

    .post-content { flex: 1; min-width: 0; }

    .post-info {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .post-author {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--wave);
    }

    .post-date {
      font-size: 11px;
      color: var(--muted);
    }

    .post-text {
      font-size: 14px;
      color: var(--ink);
      line-height: 1.6;
      word-break: break-word;
    }

    /* ─────────────────────────────────────────
       EMPTY / LOADING STATES
    ───────────────────────────────────────── */
    .estado-vazio {
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
      font-size: 13px;
      font-family: var(--mono);
    }

    .estado-vazio .icone { font-size: 36px; margin-bottom: 12px; }

    .skeleton {
      background: var(--card);
      border: 1.5px solid var(--shore);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      gap: 12px;
    }

    .sk-circle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--shore);
      flex-shrink: 0;
      animation: shimmer 1.4s infinite;
    }

    .sk-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }

    .sk-line {
      height: 10px;
      border-radius: 4px;
      background: var(--shore);
      animation: shimmer 1.4s infinite;
    }

    .sk-line:nth-child(1) { width: 40%; animation-delay: .1s; }
    .sk-line:nth-child(2) { width: 90%; animation-delay: .2s; }
    .sk-line:nth-child(3) { width: 70%; animation-delay: .3s; }

    @keyframes shimmer {
      0%,100% { opacity: 1; }
      50%      { opacity: .4; }
    }

    /* ─────────────────────────────────────────
       SEÇÃO SALDO / CARTEIRA
    ───────────────────────────────────────── */
    .section-title {
      font-family: var(--display);
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--ink);
      margin-bottom: 18px;
    }

    .crypto-card {
      background: var(--wave);
      background-image: linear-gradient(135deg, #1a4fff 0%, #0033cc 60%, #001a80 100%);
      padding: 24px;
      border-radius: 20px;
      color: white;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .crypto-card::before {
      content: 'POMB';
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--display);
      font-size: 90px;
      letter-spacing: -2px;
      color: rgba(255,255,255,.06);
      pointer-events: none;
    }

    .crypto-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      opacity: .7;
      margin-bottom: 6px;
    }

    #pombcoin-balance {
      font-family: var(--display);
      font-size: 42px;
      letter-spacing: 2px;
      line-height: 1;
    }

    /* ─────────────────────────────────────────
       CÓDIGOS DE CONVITE
    ───────────────────────────────────────── */
    .convites-titulo {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .convite-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
      border: 1.5px solid var(--shore);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      transition: border-color .2s;
    }

    .convite-item:hover { border-color: var(--foam); }

    .convite-item.usado {
      opacity: .45;
      border-style: dashed;
    }

    .convite-codigo {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--wave);
      letter-spacing: 2px;
    }

    .convite-item.usado .convite-codigo {
      color: var(--muted);
      text-decoration: line-through;
    }

    .badge-usado {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1px;
      background: var(--shore);
      color: var(--muted);
      border-radius: 20px;
      padding: 4px 10px;
    }

    .btn-copiar {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 1px;
      background: var(--foam);
      color: var(--wave);
      border: none;
      border-radius: 20px;
      padding: 7px 14px;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-copiar:hover { background: var(--wave); color: white; }
    .btn-copiar.copiado { background: #d4f5e2; color: #1a8a4a; }

    /* ─────────────────────────────────────────
       PRAIA & GALERIA — placeholders bonitos
    ───────────────────────────────────────── */
    .em-breve {
      min-height: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px dashed var(--shore);
      border-radius: 20px;
      color: var(--muted);
      gap: 10px;
    }

    .em-breve .emoji { font-size: 40px; }

    .em-breve p {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1px;
    }

    /* ─────────────────────────────────────────
       TOAST de feedback
    ───────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: white;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .5px;
      padding: 10px 22px;
      border-radius: 20px;
      opacity: 0;
      transition: all .3s;
      pointer-events: none;
      z-index: 9000;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─────────────────────────────────────────
       BOTTOM NAV
    ───────────────────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(240,235,227,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1.5px solid var(--shore);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 10px;
      transition: all .2s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-item:hover { background: var(--shore); }

    .nav-icon { font-size: 20px; line-height: 1; }

    .nav-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--muted);
      transition: color .2s;
    }

    .nav-item.active-link .nav-label { color: var(--wave); font-weight: 500; }

    .nav-item.active-link .nav-icon {
      filter: drop-shadow(0 0 6px rgba(26,79,255,.4));
    }

    /* ─────────────────────────────────────────
       RESPONSIVO
    ───────────────────────────────────────── */
    @media (min-width: 640px) {
      .app-container { padding-top: 28px; }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="feed-header">
    <div class="header-logo">LOS <span>POMBITOS</span></div>
    <div class="header-right">
      <img id="user-avatar-top" src="" alt="Avatar">
      <button class="btn-sair" onclick="sairDaOrdem()">SAIR</button>
    </div>
  </header>

  <!-- ── CONTEÚDO ── -->
  <div class="app-container">

    <!-- TIMELINE -->
    <section id="timeline" class="section active">

      <!-- Caixa de postagem -->
      <div class="post-box">
        <div class="post-box-header">
          <img id="post-avatar-box" src="https://api.dicebear.com/7.x/identicon/svg?seed=default" alt="Avatar">
          <textarea
            id="post-text"
            maxlength="500"
            placeholder="O que você está pensando, Pombito?"
            oninput="atualizarContador(this)"
            rows="2"
          ></textarea>
        </div>
        <div class="post-box-footer">
          <span id="char-count">0 / 500</span>
          <button id="btn-postar" class="btn-postar" onclick="postarMensagem()">POSTAR</button>
        </div>
      </div>

      <!-- Skeletons de carregamento -->
      <div id="feed-loading">
        <div class="skeleton"><div class="sk-circle"></div><div class="sk-lines"><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div></div></div>
        <div class="skeleton" style="margin-top:12px"><div class="sk-circle"></div><div class="sk-lines"><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div></div></div>
        <div class="skeleton" style="margin-top:12px"><div class="sk-circle"></div><div class="sk-lines"><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div></div></div>
      </div>

      <!-- Posts reais -->
      <div id="feed-lista"></div>
    </section>

    <!-- PRAIA -->
    <section id="praia" class="section">
      <p class="section-title">PRAIA</p>
      <div class="em-breve">
        <div class="emoji">🌊</div>
        <p>EM CONSTRUÇÃO</p>
        <p style="font-size:10px; opacity:.6">A maré está trazendo novidades...</p>
      </div>
    </section>

    <!-- GALERIA -->
    <section id="galeria" class="section">
      <p class="section-title">GALERIA</p>
      <div class="em-breve">
        <div class="emoji">🖼️</div>
        <p>EM CONSTRUÇÃO</p>
        <p style="font-size:10px; opacity:.6">Suas fotos vão aparecer aqui...</p>
      </div>
    </section>

    <!-- SALDO -->
    <section id="saldo" class="section">
      <p class="section-title">CARTEIRA</p>

      <div class="crypto-card">
        <p class="crypto-label">SALDO ATUAL</p>
        <p id="pombcoin-balance">— $POMB</p>
      </div>

      <p class="convites-titulo">SEMENTES DA LINHAGEM</p>
      <div id="lista-convites">
        <div class="skeleton"><div class="sk-circle" style="width:32px;height:32px"></div><div class="sk-lines"><div class="sk-line" style="width:60%"></div></div></div>
      </div>
    </section>

  </div>

  <!-- ── BOTTOM NAV ── -->
  <nav class="bottom-nav">
    <div class="nav-item active-link" onclick="showSection('timeline', this)">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">TIMELINE</span>
    </div>
    <div class="nav-item" onclick="showSection('praia', this)">
      <span class="nav-icon">🌊</span>
      <span class="nav-label">PRAIA</span>
    </div>
    <div class="nav-item" onclick="showSection('galeria', this)">
      <span class="nav-icon">🖼️</span>
      <span class="nav-label">GALERIA</span>
    </div>
    <div class="nav-item" onclick="showSection('saldo', this)">
      <span class="nav-icon">💰</span>
      <span class="nav-label">SALDO</span>
    </div>
  </nav>

  <!-- ── TOAST ── -->
  <div id="toast" class="toast"></div>

  <!-- ── FIREBASE ── -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="auth.js"></script>

  <script>
    // ─────────────────────────────────────────
    // TOAST — substitui todos os alert()
    // ─────────────────────────────────────────
    let toastTimer;
    function mostrarToast(msg, duracao = 2500) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), duracao);
    }

    // ─────────────────────────────────────────
    // CONTADOR DE CARACTERES
    // ─────────────────────────────────────────
    function atualizarContador(el) {
      const c = document.getElementById('char-count');
      const n = el.value.length;
      c.textContent = `${n} / 500`;
      c.className = n >= 500 ? 'cheio' : n >= 400 ? 'quase' : '';
    }

    // ─────────────────────────────────────────
    // NAVEGAÇÃO ENTRE SEÇÕES
    // ─────────────────────────────────────────
    function showSection(id, el) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-link'));
      document.getElementById(id).classList.add('active');
      el.classList.add('active-link');
    }

    // ─────────────────────────────────────────
    // COPIAR CÓDIGO — feedback visual no botão
    // ─────────────────────────────────────────
    async function copiar(codigo, btn) {
      try {
        await navigator.clipboard.writeText(codigo);
      } catch {
        // fallback para browsers antigos
        const inp = document.createElement('input');
        inp.value = codigo;
        document.body.appendChild(inp);
        inp.select();
        document.execCommand('copy');
        document.body.removeChild(inp);
      }
      btn.textContent = 'COPIADO ✓';
      btn.classList.add('copiado');
      mostrarToast('Código copiado: ' + codigo);
      setTimeout(() => {
        btn.textContent = 'COPIAR';
        btn.classList.remove('copiado');
      }, 2000);
    }

    // ─────────────────────────────────────────
    // RENDERIZAR CONVITES
    // ─────────────────────────────────────────
    async function renderizarConvites(uid, meusCodigos) {
      const lista = document.getElementById('lista-convites');

      if (!meusCodigos || meusCodigos.length === 0) {
        lista.innerHTML = `<p style="font-family:var(--mono);font-size:11px;color:var(--muted)">Nenhuma semente encontrada.</p>`;
        return;
      }

      // Busca status real de cada código no Firestore
      let html = '';
      for (const cod of meusCodigos) {
        let usado = false;
        try {
          const snap = await db.collection('convites').doc(cod).get();
          if (snap.exists) usado = snap.data().usado === true;
        } catch(e) { /* ignora erro pontual */ }

        if (usado) {
          html += `
            <div class="convite-item usado">
              <span class="convite-codigo">${cod}</span>
              <span class="badge-usado">FLORESCEU</span>
            </div>`;
        } else {
          html += `
            <div class="convite-item">
              <span class="convite-codigo">${cod}</span>
              <button class="btn-copiar" onclick="copiar('${cod}', this)">COPIAR</button>
            </div>`;
        }
      }
      lista.innerHTML = html;
    }

    // ─────────────────────────────────────────
    // POSTAR
    // ─────────────────────────────────────────
    async function postarMensagem() {
      const area = document.getElementById('post-text');
      const btn  = document.getElementById('btn-postar');
      const texto = area.value.trim();
      const user  = firebase.auth().currentUser;

      if (!texto) { mostrarToast('Escreva algo antes de postar.'); return; }
      if (!user)  { mostrarToast('Você precisa estar logado.'); return; }

      btn.disabled = true;
      btn.textContent = 'POSTANDO...';

      try {
        const userDoc  = await db.collection('usuarios').doc(user.uid).get();
        const userData = userDoc.data();

        await db.collection('posts').add({
          uid:         user.uid,
          username:    userData.username || 'Pombito',
          foto_perfil: userData.foto_perfil || `https://api.dicebear.com/7.x/identicon/svg?seed=${user.uid}`,
          texto:       texto,
          data_post:   firebase.firestore.FieldValue.serverTimestamp()
        });

        area.value = '';
        atualizarContador(area);
        mostrarToast('Post publicado! 🪶');
      } catch(e) {
        console.error('Erro ao postar:', e);
        mostrarToast('Erro ao publicar. Tente novamente.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'POSTAR';
      }
    }

    // ─────────────────────────────────────────
    // TIMELINE — realtime listener
    // ─────────────────────────────────────────
    let timelineListener = null;

    function carregarTimeline() {
      const feedLista   = document.getElementById('feed-lista');
      const feedLoading = document.getElementById('feed-loading');

      // Cancela listener anterior se existir
      if (timelineListener) timelineListener();

      timelineListener = db.collection('posts')
        .orderBy('data_post', 'desc')
        .limit(50)
        .onSnapshot((snapshot) => {

          feedLoading.style.display = 'none';

          if (snapshot.empty) {
            feedLista.innerHTML = `
              <div class="estado-vazio">
                <div class="icone">🪶</div>
                <p>Nenhum post ainda.</p>
                <p style="margin-top:4px;opacity:.6">Seja o primeiro a postar!</p>
              </div>`;
            return;
          }

          feedLista.innerHTML = '';
          snapshot.forEach((doc) => {
            const post = doc.data();

            // Formata data com segurança
            let tempo = '···';
            if (post.data_post?.seconds) {
              const d = new Date(post.data_post.seconds * 1000);
              const hoje = new Date();
              const mesmoDia = d.toDateString() === hoje.toDateString();
              tempo = mesmoDia
                ? d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
                : d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
            }

            // Sanitiza texto para evitar XSS
            const textoSafe = (post.texto || '')
              .replace(/&/g,'&amp;')
              .replace(/</g,'&lt;')
              .replace(/>/g,'&gt;')
              .replace(/\n/g,'<br>');

            const avatarFallback = `https://api.dicebear.com/7.x/identicon/svg?seed=${post.uid}`;

            feedLista.innerHTML += `
              <div class="post-card">
                <img
                  src="${post.foto_perfil || avatarFallback}"
                  class="post-avatar"
                  onerror="this.src='${avatarFallback}'"
                  alt="Avatar"
                >
                <div class="post-content">
                  <div class="post-info">
                    <span class="post-author">@${post.username || 'pombito'}</span>
                    <span class="post-date">· ${tempo}</span>
                  </div>
                  <p class="post-text">${textoSafe}</p>
                </div>
              </div>`;
          });
        }, (error) => {
          console.error('Erro na timeline:', error);
          feedLoading.style.display = 'none';
          feedLista.innerHTML = `
            <div class="estado-vazio">
              <div class="icone">⚠️</div>
              <p>Erro ao carregar o feed.</p>
            </div>`;
        });
    }

    // ─────────────────────────────────────────
    // INICIALIZAÇÃO — espera sessão do auth.js
    // ─────────────────────────────────────────
    // O auth.js já tem onAuthStateChanged global que redireciona
    // se não logado. Aqui fazemos só o carregamento dos dados de UI.
    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) return; // auth.js cuida do redirect

      try {
        const doc = await db.collection('usuarios').doc(user.uid).get();
        if (!doc.exists) return;

        const dados = doc.data();

        // Avatar no topo e na caixa de post
        const fotoUrl = dados.foto_perfil || `https://api.dicebear.com/7.x/identicon/svg?seed=${user.uid}`;
        const avatarTopo = document.getElementById('user-avatar-top');
        const avatarPost = document.getElementById('post-avatar-box');
        avatarTopo.src = fotoUrl;
        avatarTopo.style.display = 'block';
        avatarPost.src = fotoUrl;

        // Saldo
        document.getElementById('pombcoin-balance').textContent =
          (dados.pombcoins ?? 0) + ' $POMB';

        // Convites com status real
        await renderizarConvites(user.uid, dados.meus_codigos || []);

        // Timeline
        carregarTimeline();

      } catch(e) {
        console.error('Erro ao carregar dados do usuário:', e);
        mostrarToast('Erro ao carregar seu perfil.');
      }
    });

    // Limpa listener ao sair da página
    window.addEventListener('beforeunload', () => {
      if (timelineListener) timelineListener();
    });
  </script>
</body>
</html>
