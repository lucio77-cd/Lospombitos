<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Feed | Los Pombitos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink:    #0d0d0d;
      --sand:   #f0ebe3;
      --shore:  #e2d9cd;
      --wave:   #1a4fff;
      --foam:   #c8d8ff;
      --sun:    #f5b800;
      --coral:  #ff5533;
      --muted:  #8a8278;
      --card:   #faf8f5;
      --green:  #1a8a4a;
      --radius: 14px;
      --mono:   'DM Mono', monospace;
      --sans:   'DM Sans', sans-serif;
      --display:'Bebas Neue', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--sand);
      color: var(--ink);
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: .5;
    }

    .feed-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--sand); border-bottom: 1.5px solid var(--shore);
      padding: 0 20px; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }

    .header-logo { font-family: var(--display); font-size: 26px; letter-spacing: 3px; color: var(--wave); line-height: 1; }
    .header-logo span { color: var(--sun); }
    .header-right { display: flex; align-items: center; gap: 10px; }

    #user-avatar-top {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid var(--wave); object-fit: cover;
      display: none; cursor: pointer;
    }

    .btn-sair {
      font-family: var(--mono); font-size: 9px; font-weight: 500;
      letter-spacing: 1.5px; color: var(--muted);
      background: none; border: 1px solid var(--shore);
      border-radius: 20px; padding: 5px 12px; cursor: pointer; transition: all .2s;
    }
    .btn-sair:hover { color: var(--coral); border-color: var(--coral); }

    .app-container { padding: 20px 16px 90px; max-width: 640px; margin: 0 auto; }
    .section { display: none; animation: fadeUp .3s ease; }
    .section.active { display: block; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.4} }

    .post-box {
      background: var(--card); border: 1.5px solid var(--shore);
      border-radius: var(--radius); padding: 16px; margin-bottom: 22px;
    }

    .post-box-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    #post-avatar-box { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 2px solid var(--foam); flex-shrink: 0; }

    #post-text {
      width: 100%; border: none; background: transparent;
      font-family: var(--sans); font-size: 14px; color: var(--ink);
      resize: none; outline: none; min-height: 60px; line-height: 1.6;
    }
    #post-text::placeholder { color: var(--muted); }

    .post-box-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--shore);
    }

    #char-count { font-family: var(--mono); font-size: 10px; color: var(--muted); }
    #char-count.quase { color: var(--sun); }
    #char-count.cheio { color: var(--coral); }

    .btn-postar {
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      letter-spacing: 1px; background: var(--wave); color: white;
      border: none; border-radius: 20px; padding: 9px 22px;
      cursor: pointer; transition: all .2s;
    }
    .btn-postar:hover:not(:disabled) { background: #0033cc; transform: translateY(-1px); }
    .btn-postar:disabled { opacity: .5; cursor: not-allowed; }

    #feed-lista { display: flex; flex-direction: column; gap: 12px; }

    .post-card {
      background: var(--card); border: 1.5px solid var(--shore);
      border-radius: var(--radius); padding: 14px 16px;
      display: flex; gap: 12px; transition: border-color .2s;
    }
    .post-card:hover { border-color: var(--foam); }

    .post-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid var(--foam); }
    .post-content { flex: 1; min-width: 0; }
    .post-info { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
    .post-author { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--wave); }
    .post-date { font-size: 11px; color: var(--muted); }
