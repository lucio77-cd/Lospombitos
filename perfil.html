<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Perfil | Los Pombitos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#0d0d0d;--sand:#f0ebe3;--shore:#e2d9cd;--wave:#1a4fff;--foam:#c8d8ff;
      --sun:#f5b800;--muted:#8a8278;--card:#faf8f5;--green:#1a8a4a;--red:#cc2200;
      --radius:14px;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Bebas Neue',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--sand);color:var(--ink);min-height:100dvh;padding-bottom:90px;overscroll-behavior:none}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer{0%,100%{opacity:1}50%{opacity:.4}}

    .hdr{position:sticky;top:0;z-index:100;background:var(--sand);border-bottom:1.5px solid var(--shore);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(12px)}
    .hdr-title{font-family:var(--display);font-size:22px;letter-spacing:2px;color:var(--ink)}
    .btn-edit{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--wave);background:var(--foam);border:none;border-radius:20px;padding:5px 12px;cursor:pointer}
    .container{max-width:640px;margin:0 auto;padding:20px 16px}

    .hero{display:flex;gap:14px;align-items:flex-start;margin-bottom:16px;animation:fadeUp .3s ease}
    .avatar{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;border:3px solid white;box-shadow:0 0 0 2px var(--shore);flex-shrink:0;overflow:hidden;background:var(--wave)}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .hero-info{flex:1;min-width:0}
    .hero-nome{font-family:var(--display);font-size:26px;letter-spacing:2px;line-height:1;margin-bottom:2px}
    .hero-username{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:6px}
    .hero-bio{font-size:13px;line-height:1.5;color:var(--ink);opacity:.75}
    .perfil-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:8px;letter-spacing:1px;background:var(--foam);color:var(--wave);border-radius:20px;padding:3px 9px;margin-bottom:6px}

    .stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;animation:fadeUp .35s ease}
    .stat-box{background:var(--card);border:1.5px solid var(--shore);border-radius:12px;padding:12px;text-align:center}
    .stat-val{font-family:var(--display);font-size:17px;letter-spacing:1px;color:var(--ink);line-height:1;margin-bottom:3px}
    .stat-val.pos{color:var(--green)}.stat-val.neg{color:var(--red)}
    .stat-lbl{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;color:var(--muted)}

    .secao-lbl{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:8px}
    .treemap-card{background:var(--card);border:1.5px solid var(--shore);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;animation:fadeUp .4s ease}
    canvas.treemap{width:100%;display:block}
    .treemap-leg{display:flex;flex-wrap:wrap;gap:8px;padding:12px 14px;border-top:1px solid var(--shore)}
    .tl-item{display:flex;align-items:center;gap:5px}
    .tl-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
    .tl-info{font-family:var(--mono);font-size:9px}
    .tl-ticker{color:var(--ink);font-weight:500}
    .tl-pct{color:var(--muted)}

    .perf-card{background:var(--card);border:1.5px solid var(--shore);border-radius:var(--radius);padding:16px;margin-bottom:14px;animation:fadeUp .45s ease}
    .perf-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
    .perf-resultado{font-family:var(--display);font-size:22px;letter-spacing:1px}
    .perf-resultado.pos{color:var(--green)}.perf-resultado.neg{color:var(--red)}
    .perf-sub{font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:2px}
    .perf-pct{font-family:var(--mono);font-size:12px;font-weight:500}
    .perf-pct.pos{color:var(--green)}.perf-pct.neg{color:var(--red)}
    .perf-chart-wrap{height:90px;position:relative;margin-bottom:10px}
    canvas#perf-chart{width:100%;height:90px}

    /* ── Barras de ativo — redesenhadas ── */
    .ativo-rows{display:flex;flex-direction:column;gap:8px;padding-top:12px;border-top:1px solid var(--shore)}
    .ativo-row{display:flex;align-items:center;gap:8px;cursor:pointer;padding:2px 0}
    .ar-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .ar-ticker{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--wave);width:52px;flex-shrink:0}
    .ar-bar-track{flex:1;height:5px;background:var(--shore);border-radius:3px;overflow:hidden}
    .ar-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
    .ar-val{font-family:var(--mono);font-size:10px;font-weight:500;text-align:right;width:76px;flex-shrink:0}
    .ar-val.pos{color:var(--green)}.ar-val.neg{color:var(--red)}.ar-val.neu{color:var(--muted)}
    .ar-no-cot{font-family:var(--mono);font-size:8px;color:var(--muted);flex:1;text-align:right}

    /* Posts */
    .post-card{background:var(--card);border:1.5px solid var(--shore);border-radius:var(--radius);padding:14px;margin-bottom:8px;animation:fadeUp .3s ease}
    .post-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .post-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;overflow:hidden;background:var(--wave)}
    .post-av img{width:100%;height:100%;object-fit:cover}
    .post-nome{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--ink)}
    .post-data{font-family:var(--mono);font-size:9px;color:var(--muted)}
    .post-txt{font-size:14px;line-height:1.6;color:var(--ink);margin-bottom:10px}
    .post-likes{font-family:var(--mono);font-size:10px;color:var(--muted)}
    .trade-pill{font-family:var(--mono);font-size:8px;letter-spacing:1px;padding:3px 10px;border-radius:20px;display:inline-block;margin-left:auto}
    .trade-pill.c{background:#d4f5e2;color:var(--green)}.trade-pill.v{background:#ffd5ce;color:var(--red)}
    .trade-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;background:var(--shore);border-radius:8px;overflow:hidden}
    .tc{background:var(--sand);padding:8px 10px}
    .tg-lbl{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;color:var(--muted);margin-bottom:2px}
    .tg-val{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--ink)}
    .trade-total-row{background:var(--sand);border-radius:8px;padding:8px 10px;margin-bottom:8px}
    .ticker-big{font-family:var(--display);font-size:20px;letter-spacing:2px;color:var(--wave);margin-bottom:8px}
    .sk-line{height:11px;border-radius:4px;background:var(--shore);animation:shimmer 1.4s infinite;margin-bottom:8px}
    .empty{text-align:center;padding:28px 20px;color:var(--muted);font-family:var(--mono);font-size:10px}

    .nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(240,235,227,.92);backdrop-filter:blur(16px);border-top:1.5px solid var(--shore);display:flex;justify-content:space-around;align-items:center;z-index:100}
    .ni{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 12px;border-radius:10px;transition:all .2s;text-decoration:none;color:inherit;-webkit-tap-highlight-color:transparent}
    .ni:hover{background:var(--shore)}
    .ni-ico{font-size:20px;line-height:1}
    .ni-lbl{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--muted)}
    .ni.on .ni-lbl{color:var(--wave);font-weight:500}
  </style>
</head>
<body>
  <header class="hdr">
    <div class="hdr-title">PERFIL</div>
    <button class="btn-edit" onclick="location.href='editar-perfil.html'">✏️ EDITAR</button>
  </header>

  <div class="container">

      <div class="hero-info">
        <div class="perfil-badge" id="badge-perfil">⚖️ MODERADO</div>
        <p class="hero-nome" id="p-nome">···</p>

    <div class="stats-row">

  <nav class="nav">
    <a class="ni" href="feed.html"><span class="ni-ico">🏠</span><span class="ni-lbl">FEED</span></a>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="mercado-api.js"></script>
  <script>
  'use strict';

  const CAPITAL  = 500000;
  const CORES    = ['#1a4fff','#1a8a4a','#f5b800','#cc2200','#7c3aed','#0891b2','#ea580c','#db2777','#65a30d','#c2410c'];
  const COR_DISP = '#d4c9b8';

  const Rk = v => {
    const neg = v < 0, a = Math.abs(v);
    let str;
    if (a >= 10000)     str = Math.floor(a / 1000) + 'k';           // ≥10k → "34k"
    else if (a >= 1000) str = (a / 1000).toFixed(1) + 'k';          // 1k–9.9k → "2.6k"
    else                str = a.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    return (neg ? '-' : '') + 'R$ ' + str;
  };
  const RkSigned = v => (v >= 0 ? '+' : '') + Rk(v);
  const R$  = v => 'R$ ' + Number(v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const pct = v => (v >= 0 ? '+' : '') + Number(v).toFixed(2) + '%';

  let db, uid;
  let userData = {}, carteiraData = {};
  let posicoes = [], cotacoes = {};
  let saldoDisp = 0, patrimonioTotal = 0;

  firebase.auth().onAuthStateChanged(async user => {
    if (!user) { location.href = 'invite.html'; return; }
    uid = user.uid;
    db  = window.db || firebase.firestore();
    await carregar();
  });

  async function carregar() {
    const [uS, cS, ordSnap] = await Promise.all([
      db.collection('usuarios').doc(uid).get(),
      db.collection('carteiras').doc(uid).get(),
      db.collection('ordens').where('uid', '==', uid).get()
        .catch(() => db.collection('ordens').where('uid', '==', uid).limit(200).get())
    ]);

    userData     = uS.data() || {};
    carteiraData = cS.exists ? cS.data() : {};
    posicoes     = carteiraData.posicoes || [];

    // ── Recalcula saldo pelas ordens válidas (igual ao carteira.html) ──
    const todasOrdens = ordSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    const ordensValidas = todasOrdens.filter(o => {
      const total = o.total > 0 ? o.total : (o.preco || 0) * (o.quantidade || 0);
      return total > 0 && o.lado && o.status !== 'cancelada';
    });

    let saldoRecalc = CAPITAL;
    for (const o of ordensValidas) {
      const total = o.total > 0 ? o.total : (o.preco || 0) * (o.quantidade || 0);
      if (o.lado === 'compra') saldoRecalc -= total;
      if (o.lado === 'venda')  saldoRecalc += total;
    }
    saldoDisp = Math.max(0, saldoRecalc);

    // ── Cotações ──
    const tks = posicoes
      .filter(p => p.tipo === 'acoes' || p.tipo === 'fiis' || !p.tipo)
      .map(p => p.ticker);

    if (tks.length) {
      try {
        const d = await MercadoAPI.buscarMultiplos(tks);
        d.forEach(x => { if (x.preco > 0) cotacoes[x.ticker] = x.preco; });
      } catch (e) { console.warn('Cotações perfil:', e); }

      // Individual fallback para os que faltaram
      const faltam = tks.filter(t => !cotacoes[t]);
      if (faltam.length) {
        await Promise.allSettled(faltam.map(async ticker => {
          try {
            const d = await MercadoAPI.buscarAtivo(ticker);
            if (d?.preco > 0) cotacoes[ticker] = d.preco;
          } catch (_) {}
        }));
      }
    }

    // Patrimônio com cotações reais
    const valorAtivos = posicoes.reduce((s, p) => {
      const pr = cotacoes[p.ticker] || p.preco_medio || 0;
      return s + (p.quantidade || 0) * pr;
    }, 0);
    patrimonioTotal = saldoDisp + valorAtivos;

    renderHero();
    renderStats();
    renderTreemap();
    renderPerf();
    renderPosts();
  }

  function corPombito() {
    const m = {
      'azul':'#1a4fff','azul celeste':'#87ceeb','azul mar':'#006994',
      'verde':'#2d8a4e','verde mar':'#2e8b57','vermelho':'#cc2200',
      'rosa':'#e75480','roxo':'#6a0dad','laranja':'#e86a1a',
      'amarelo':'#f5b800','dourado':'#c9a84c','cinza':'#6b6b6b',
      'marrom':'#7a4e2d','ciano':'#00b4d8','violeta':'#7c3aed',
      'turquesa':'#40e0d0','coral':'#ff6b6b'
    };
    return m[(userData.cor || '').toLowerCase().trim()] || '#1a4fff';
  }

  function renderHero() {
    const cor = corPombito();
    document.getElementById('avatar-el').style.background = cor;
    document.getElementById('p-nome').textContent     = userData.nome     || 'Pombito';
    document.getElementById('p-username').textContent = '@' + (userData.username || '···');
    const bio = [
      userData.musica ? '🎵 ' + userData.musica : '',
      userData.filme  ? '🎬 ' + userData.filme  : ''
    ].filter(Boolean).join('  ·  ');
    document.getElementById('p-bio').textContent = bio || '—';
    const badges = { conservador:'🛡️ CONSERVADOR', moderado:'⚖️ MODERADO', arrojado:'🚀 ARROJADO' };
    document.getElementById('badge-perfil').textContent = badges[userData.perfil_investidor || 'moderado'];
  }

  function renderStats() {
    const resultado = patrimonioTotal - CAPITAL;
    const isPos     = resultado >= 0;
    document.getElementById('st-pat').textContent = Rk(patrimonioTotal);
    const resEl = document.getElementById('st-res');
    resEl.textContent = RkSigned(resultado);
    resEl.className   = 'stat-val ' + (isPos ? 'pos' : 'neg');
    document.getElementById('st-atv').textContent = posicoes.length;
  }

  // ── TREEMAP ──
  function renderTreemap() {
    if (!posicoes.length && saldoDisp <= 0) return;
    document.getElementById('treemap-card').style.display = 'block';

    const total = patrimonioTotal;
    if (total <= 0) return;

    const itens = posicoes.map((p, i) => {
      const pa  = cotacoes[p.ticker] || p.preco_medio || 0;
      const val = (p.quantidade || 0) * pa;
      return { label: p.ticker, val, pct: val / total * 100, cor: CORES[i % CORES.length] };
    });
    if (saldoDisp > 0) itens.push({ label: 'DISPONÍVEL', val: saldoDisp, pct: saldoDisp / total * 100, cor: COR_DISP });
    itens.sort((a, b) => b.val - a.val);

    const canvas = document.getElementById('treemap-canvas');
    const dpr = window.devicePixelRatio || 1;
    const W   = canvas.parentElement.offsetWidth;
    const H   = Math.round(W * 0.52);
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    squarify(ctx, itens, 0, 0, W, H);

    const leg = document.getElementById('treemap-leg');
    leg.innerHTML = '';
    itens.forEach(it => {
      const d = document.createElement('div'); d.className = 'tl-item';
      d.innerHTML = `<div class="tl-dot" style="background:${it.cor}"></div>
        <span class="tl-info"><span class="tl-ticker">${it.label}</span> <span class="tl-pct">${it.pct.toFixed(1)}%</span></span>`;
      leg.appendChild(d);
    });
  }

  function squarify(ctx, itens, x, y, w, h) {
    if (!itens.length) return;
    const total = itens.reduce((s, i) => s + i.pct, 0);
    let rx = x, ry = y, rw = w, rh = h, fila = [];
    const worst = (fila, side) => {
      const s = side * side, sum = fila.reduce((a, f) => a + f.pct, 0) * s / total;
      return Math.max(...fila.map(f => { const a = f.pct * s / total; return Math.max(sum * sum / a, a / sum * sum); }));
    };
    let idx = 0;
    while (idx < itens.length) {
      const side = rw >= rh ? rh : rw;
      const novo = [...fila, itens[idx]];
      if (!fila.length || worst(fila, side) >= worst(novo, side)) {
        fila = novo; idx++;
        if (idx === itens.length) flush();
      } else { flush(); }
    }
    function flush() {
      if (!fila.length) return;
      const fp = fila.reduce((s, f) => s + f.pct, 0);
      const hz = rw >= rh;
      const dim = hz ? (fp / total) * rw : (fp / total) * rh;
      let cur = hz ? ry : rx;
      fila.forEach(it => {
        const sz = (it.pct / fp) * (hz ? rh : rw);
        desenharBloco(ctx, hz ? rx : cur, hz ? cur : ry, hz ? dim : sz, hz ? sz : dim, it);
        cur += sz;
      });
      if (hz) { rx += dim; rw -= dim; } else { ry += dim; rh -= dim; }
      fila = [];
    }
  }

  function desenharBloco(ctx, x, y, w, h, it) {
    const g = 2;
    ctx.fillStyle = it.cor;
    ctx.fillRect(x + g, y + g, w - g * 2, h - g * 2);
    if (w > 44 && h > 24) {
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,.92)'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const fs = Math.min(12, w / 5.5);
      ctx.font = `600 ${fs}px DM Mono,monospace`;
      ctx.fillText(it.label, x + w / 2, h > 42 ? y + h / 2 - 7 : y + h / 2);
      if (h > 42) {
        ctx.font = `${Math.min(9, w / 7)}px DM Mono,monospace`;
        ctx.fillStyle = 'rgba(255,255,255,.65)';
        ctx.fillText(it.pct.toFixed(1) + '%', x + w / 2, y + h / 2 + 8);
      }
      ctx.restore();
    }
  }

  // ── DESEMPENHO ──
  // FIX: ganho por ativo só usa cotação REAL — se não tem cotação, mostra "—" na barra
  function renderPerf() {
    if (!posicoes.length) return;
    document.getElementById('perf-card').style.display = 'block';

    const resultado = patrimonioTotal - CAPITAL;
    const rentab    = (resultado / CAPITAL) * 100;
    const isPos     = resultado >= 0;

    const resEl = document.getElementById('perf-res');
    resEl.textContent = (isPos ? '+' : '') + R$(resultado);
    resEl.className   = 'perf-resultado ' + (isPos ? 'pos' : 'neg');
    const pctEl = document.getElementById('perf-pct');
    pctEl.textContent = pct(rentab);
    pctEl.className   = 'perf-pct ' + (isPos ? 'pos' : 'neg');

    // ── Barras por ativo: só com cotação real ──
    const porAtivo = posicoes.map((p, i) => {
      const cot  = cotacoes[p.ticker]; // undefined se não carregou
      const pm   = p.preco_medio || 0;
      const qtd  = p.quantidade  || 0;
      const vp   = qtd * pm;
      // ganho só calculado quando tem cotação real
      const ganho     = cot ? qtd * cot - vp : null;
      const ganhoAbs  = ganho !== null ? Math.abs(ganho) : 0;
      return {
        ticker: p.ticker, ganho, ganhoAbs,
        cor: CORES[i % CORES.length],
        tipo: p.tipo || 'acoes',
        temCotacao: !!cot,
      };
    }).sort((a, b) => {
      // Ordena: com cotação primeiro, depois por ganho decrescente
      if (a.temCotacao && !b.temCotacao) return -1;
      if (!a.temCotacao && b.temCotacao) return 1;
      return (b.ganho || 0) - (a.ganho || 0);
    });

    // Máximo absoluto só entre os que têm cotação
    const comCot = porAtivo.filter(p => p.temCotacao);
    const maxAbs = comCot.length ? Math.max(...comCot.map(p => p.ganhoAbs), 1) : 1;

    const ativoRows = document.getElementById('ativo-rows');
    ativoRows.innerHTML = '';

    porAtivo.forEach(p => {
      const row = document.createElement('div');
      row.className = 'ativo-row';
      row.onclick = () => location.href = `relatorio.html?ticker=${p.ticker}&tipo=${p.tipo}`;

      if (p.temCotacao && p.ganho !== null) {
        const ip   = p.ganho >= 0;
        const barW = (p.ganhoAbs / maxAbs * 100).toFixed(1);
        row.innerHTML = `
          <div class="ar-dot" style="background:${p.cor}"></div>
          <span class="ar-ticker">${p.ticker}</span>
          <div class="ar-bar-track">
            <div class="ar-bar-fill" style="width:${barW}%;background:${ip ? 'var(--green)' : 'var(--red)'}"></div>
          </div>
          <span class="ar-val ${ip ? 'pos' : 'neg'}">${ip ? '+' : ''}${Rk(p.ganho)}</span>`;
      } else {
        // Sem cotação — mostra só o ticker e dash
        row.innerHTML = `
          <div class="ar-dot" style="background:${p.cor}"></div>
          <span class="ar-ticker">${p.ticker}</span>
          <div class="ar-bar-track"><div class="ar-bar-fill" style="width:0%"></div></div>
          <span class="ar-val neu">—</span>`;
      }

      ativoRows.appendChild(row);
    });

    // Gráfico de histórico do ativo com maior posição
    const principal = comCot.length ? comCot[0] : posicoes[0];
    if (principal) carregarGraficoPerfil(principal.ticker, posicoes.find(p => p.ticker === principal.ticker)?.preco_medio || 0);
  }

  async function carregarGraficoPerfil(ticker, pm) {
    try {
      const hist = await MercadoAPI.buscarHistorico(ticker, '3mo');
      if (!hist?.historico?.length) return;
      desenharGraficoPerfil(hist.historico.map(h => h.preco), pm || hist.historico[0]?.preco);
    } catch (e) { console.warn('Histórico perfil:', e); }
  }

  function desenharGraficoPerfil(precos, pm) {
    const canvas = document.getElementById('perf-chart');
    const dpr    = window.devicePixelRatio || 1;
    const W      = canvas.parentElement.offsetWidth;
    const H      = 90;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const pad = { t: 6, r: 6, b: 6, l: 6 };
    const cw  = W - pad.l - pad.r, ch = H - pad.t - pad.b;
    const allV = [...precos, pm].filter(Boolean);
    const minV = Math.min(...allV) * 0.997, maxV = Math.max(...allV) * 1.003;
    const rng  = maxV - minV || 1;
    const xOf  = i => pad.l + (i / (precos.length - 1)) * cw;
    const yOf  = v => pad.t + ch - ((v - minV) / rng) * ch;

    ctx.clearRect(0, 0, W, H);

    const isPos = precos[precos.length - 1] >= precos[0];
    const grad  = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch);
    grad.addColorStop(0, isPos ? 'rgba(26,138,74,.2)' : 'rgba(204,34,0,.2)');
    grad.addColorStop(1, isPos ? 'rgba(26,138,74,.02)' : 'rgba(204,34,0,.02)');

    ctx.beginPath();
    ctx.moveTo(xOf(0), yOf(precos[0]));
    precos.forEach((p, i) => { if (i > 0) ctx.lineTo(xOf(i), yOf(p)); });
    ctx.lineTo(xOf(precos.length - 1), pad.t + ch);
    ctx.lineTo(xOf(0), pad.t + ch);
    ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();

    ctx.beginPath();
    ctx.strokeStyle = '#0d0d0d'; ctx.lineWidth = 1.8; ctx.lineJoin = 'round';
    ctx.moveTo(xOf(0), yOf(precos[0]));
    precos.forEach((p, i) => { if (i > 0) ctx.lineTo(xOf(i), yOf(p)); });
    ctx.stroke();

    if (pm && pm >= minV && pm <= maxV) {
      const yPM = yOf(pm);
      ctx.save(); ctx.setLineDash([4, 4]);
      ctx.strokeStyle = '#cc2200'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(pad.l, yPM); ctx.lineTo(W - pad.r, yPM); ctx.stroke();
      ctx.restore();
      ctx.fillStyle = '#cc2200'; ctx.font = '8px DM Mono,monospace';
      ctx.textAlign = 'left'; ctx.fillText('PM', pad.l + 4, yPM - 3);
    }

    const lx = xOf(precos.length - 1), ly = yOf(precos[precos.length - 1]);
    ctx.beginPath(); ctx.arc(lx, ly, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = '#0d0d0d'; ctx.fill();
    ctx.strokeStyle = '#faf8f5'; ctx.lineWidth = 1.5; ctx.stroke();
  }

  // ── POSTS ──
  // FIX: posts com preco=0 ou total=0 são PULADOS (não renderizados)
  async function renderPosts() {
    const listEl = document.getElementById('posts-list');
    try {
      let snap;
      try {
        snap = await db.collection('posts')
          .where('uid', '==', uid)
          .orderBy('data_post', 'desc')
          .limit(30)
          .get();
      } catch (e) {
        snap = await db.collection('posts').where('uid', '==', uid).limit(30).get();
      }

      const posts = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(p => {
          // FIX: filtra posts de trade inválidos (preco=0 ou total=0)
          if (p.tipo === 'trade') {
            const preco = p.preco ?? p.trade?.preco ?? 0;
            const total = p.total ?? p.trade?.total ?? 0;
            return preco > 0 && total > 0;
          }
          return true; // posts de texto sempre mostram
        })
        .sort((a, b) =>
          (b.data_post?.seconds || b.criadoEm?.seconds || 0) -
          (a.data_post?.seconds || a.criadoEm?.seconds || 0)
        );

      if (!posts.length) {
        listEl.innerHTML = '<div class="empty">📭 Nenhum post ainda.</div>';
        return;
      }

      listEl.innerHTML = '';
      const avBg = corPombito();
      const foto = userData.foto_perfil
        || `https://api.dicebear.com/7.x/identicon/svg?seed=${uid}`;

      posts.forEach(p => {
        const ts   = p.data_post || p.criadoEm;
        const data = ts?.toDate
          ? ts.toDate().toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' })
          : ts?.seconds
            ? new Date(ts.seconds * 1000).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' })
            : '—';

        const card = document.createElement('div');
        card.className = 'post-card';

        if (p.tipo === 'trade') {
          const ticker = p.ticker   || p.trade?.ticker   || '—';
          const lado   = p.lado     || p.trade?.lado     || 'compra';
          const qtd    = p.quantidade ?? p.trade?.quantidade ?? 0;
          const preco  = p.preco    ?? p.trade?.preco    ?? 0;
          const total  = p.total    ?? p.trade?.total    ?? 0;
          const isC    = lado === 'compra';

          card.innerHTML = `
            <div class="post-hdr">
              <div class="post-av" style="background:${avBg}">
                <img src="${foto}" alt="" onerror="this.style.display='none'">
              </div>
              <div>
                <p class="post-nome">@${userData.username || 'pombito'}</p>
                <p class="post-data">${data}</p>
              </div>
              <span class="trade-pill ${isC ? 'c' : 'v'}" style="margin-left:auto">
                ${isC ? '📈 COMPRA' : '📉 VENDA'}
              </span>
            </div>
            <p class="ticker-big">${ticker}</p>
            <div class="trade-grid">
              <div class="tc"><p class="tg-lbl">QUANTIDADE</p><p class="tg-val">${qtd}</p></div>
              <div class="tc"><p class="tg-lbl">PREÇO</p><p class="tg-val">R$ ${Number(preco).toFixed(2)}</p></div>
              <div class="tc"><p class="tg-lbl">TOTAL</p><p class="tg-val">${R$(total)}</p></div>
            </div>
            ${p.texto ? `<p style="font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:8px">${p.texto}</p>` : ''}
            <p class="post-likes">❤️ ${p.likes || 0}</p>`;
        } else {
          card.innerHTML = `
            <div class="post-hdr">
              <div class="post-av" style="background:${avBg}">
                <img src="${foto}" alt="" onerror="this.style.display='none'">
              </div>
              <div>
                <p class="post-nome">@${userData.username || 'pombito'}</p>
                <p class="post-data">${data}</p>
              </div>
            </div>
            <p class="post-txt">${p.texto || '—'}</p>
            <p class="post-likes">❤️ ${p.likes || 0}</p>`;
        }

        listEl.appendChild(card);
      });

    } catch (e) {
      console.error('renderPosts:', e);
      listEl.innerHTML = '<div class="empty">⚠️ Erro ao carregar posts.</div>';
    }
  }
  </script>
