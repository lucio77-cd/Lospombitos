<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Perfil | Los Pombitos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">

  <style>
    /* ══════════════════════════════════════════
       DESIGN SYSTEM — perfil.html
       Tema: editorial financeiro claro
       Herda paleta do feed mas tom creme/claro
    ══════════════════════════════════════════ */
    :root {
      --bg:       #f0ebe3;
      --bg2:      #faf8f4;
      --bg3:      #eee8de;
      --line:     #ddd6ca;
      --line2:    #cec7bb;
      --ink:      #0e0e10;
      --ink2:     #4a4642;
      --ink3:     #9a948e;
      --blue:     #2a5fff;
      --blue-dim: #dce6ff;
      --gold:     #d4a800;
      --green:    #1a9c4e;
      --green-bg: #e8f8ee;
      --red:      #d93030;
      --red-bg:   #fdeaea;
      --radius:   14px;
      --radius-sm:9px;
      --mono:     'DM Mono', monospace;
      --serif:    'Fraunces', serif;
      --display:  'Bebas Neue', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--ink);
      min-height: 100dvh;
      overscroll-behavior: none;
      padding-bottom: 80px;
    }

    /* Grain texture */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 9998; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp  { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
    @keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
    @keyframes shimmer { 0%,100%{opacity:.7} 50%{opacity:.3} }
    @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ══ HEADER ══ */
    .hdr {
      position: sticky; top: 0; z-index: 200;
      background: rgba(240,235,227,.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
      height: 52px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 16px;
    }
    .hdr-title { font-family: var(--display); font-size: 20px; letter-spacing: 3px; color: var(--ink); }
    .btn-editar {
      font-size: 8px; letter-spacing: 1.5px;
      padding: 5px 13px; border-radius: 20px;
      border: 1px solid var(--blue); background: var(--blue-dim);
      color: var(--blue); cursor: pointer; transition: all .2s;
    }
    .btn-editar:hover { background: var(--blue); color: #fff; }

    /* ══ CONTAINER ══ */
    .wrap { max-width: 640px; margin: 0 auto; padding: 16px 14px; }

    /* ══ HERO ══ */
    .hero {
      display: flex; gap: 14px; align-items: flex-start;
      margin-bottom: 14px; animation: fadeUp .3s ease;
    }

    .avatar-ring {
      width: 64px; height: 64px; border-radius: 50%;
      border: 3px solid var(--bg2);
      box-shadow: 0 0 0 2px var(--blue), 0 4px 16px rgba(0,0,0,.12);
      flex-shrink: 0; overflow: hidden; background: var(--blue);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .avatar-ring img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .hero-info { flex: 1; min-width: 0; padding-top: 2px; }

    .badge-perfil {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 7.5px; letter-spacing: 1.5px;
      background: var(--blue-dim); color: var(--blue);
      border-radius: 20px; padding: 2px 9px; margin-bottom: 5px;
    }

    .hero-nome {
      font-family: var(--display); font-size: 28px;
      letter-spacing: 2px; line-height: 1; margin-bottom: 2px;
      color: var(--ink);
    }
    .hero-handle { font-size: 10px; color: var(--ink3); margin-bottom: 5px; }
    .hero-meta   { font-size: 11px; color: var(--ink2); line-height: 1.5; }

    /* ══ STATS TRÍADE ══ */
    .stats {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 7px;
      margin-bottom: 18px; animation: fadeUp .35s ease;
    }
    .stat {
      background: var(--bg2); border: 1px solid var(--line);
      border-radius: var(--radius-sm); padding: 12px 10px; text-align: center;
    }
    .stat-v {
      font-family: var(--display); font-size: 18px; letter-spacing: 1px;
      color: var(--ink); line-height: 1; margin-bottom: 3px;
    }
    .stat-v.pos { color: var(--green); }
    .stat-v.neg { color: var(--red); }
    .stat-l { font-size: 7px; letter-spacing: 2px; color: var(--ink3); }

    /* ══ SECTION LABEL ══ */
    .sec-lbl {
      font-size: 8px; letter-spacing: 2.5px; color: var(--ink3);
      margin-bottom: 8px; margin-top: 2px;
    }

    /* ══ ALOCAÇÃO — barras horizontais empilhadas ══
       Muito mais legível que o treemap no mobile
    ══ */
    .aloc-card {
      background: var(--bg2); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 14px;
      margin-bottom: 14px; animation: fadeUp .4s ease;
    }

    /* Barra de stacked */
    .stacked-bar {
      display: flex; height: 28px; border-radius: 8px;
      overflow: hidden; margin-bottom: 12px; gap: 2px;
    }
    .sb-seg { flex-shrink: 0; transition: flex .5s ease; cursor: default; }
    .sb-seg:first-child { border-radius: 8px 0 0 8px; }
    .sb-seg:last-child  { border-radius: 0 8px 8px 0; }
    .sb-seg:only-child  { border-radius: 8px; }

    /* Itens de legenda com barra */
    .aloc-rows { display: flex; flex-direction: column; gap: 8px; }
    .aloc-row {
      display: flex; align-items: center; gap: 8px;
    }
    .aloc-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .aloc-ticker { font-size: 10px; font-weight: 500; color: var(--blue); width: 56px; flex-shrink: 0; }
    .aloc-bar-wrap { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .aloc-bar { height: 100%; border-radius: 3px; transition: width .6s ease; }
    .aloc-pct { font-size: 9.5px; color: var(--ink3); width: 38px; text-align: right; flex-shrink: 0; }
    .aloc-val { font-size: 9.5px; color: var(--ink2); width: 68px; text-align: right; flex-shrink: 0; }

    /* ══ PERFORMANCE ══ */
    .perf-card {
      background: var(--bg2); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 14px;
      margin-bottom: 14px; animation: fadeUp .45s ease;
    }
    .perf-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 14px;
    }
    .perf-valor { font-family: var(--display); font-size: 26px; letter-spacing: 1px; line-height: 1; }
    .perf-valor.pos { color: var(--green); }
    .perf-valor.neg { color: var(--red); }
    .perf-sub { font-size: 8px; color: var(--ink3); margin-top: 3px; }
    .perf-pct  { font-size: 13px; font-weight: 500; }
    .perf-pct.pos { color: var(--green); }
    .perf-pct.neg { color: var(--red); }

    /* Mini lista resultado por ativo */
    .perf-rows { display: flex; flex-direction: column; gap: 7px; }
    .perf-row {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; border-radius: 8px; padding: 4px 6px;
      transition: background .15s;
    }
    .perf-row:hover { background: var(--bg3); }
    .pr-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .pr-tick { font-size: 10.5px; font-weight: 500; color: var(--blue); width: 54px; flex-shrink: 0; }
    .pr-bar-wrap { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
    .pr-bar { height: 100%; border-radius: 2px; }
    .pr-ganho { font-size: 10px; font-weight: 500; width: 68px; text-align: right; flex-shrink: 0; }
    .pr-ganho.pos { color: var(--green); }
    .pr-ganho.neg { color: var(--red); }

    /* Estado vazio de performance */
    .perf-empty {
      text-align: center; padding: 24px 0;
      font-size: 10px; color: var(--ink3); letter-spacing: 1px;
    }

    /* ══ CONVITES ══ */
    .conv-card {
      background: var(--bg2); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 14px;
      margin-bottom: 14px; animation: fadeUp .48s ease;
    }
    .conv-title { font-size: 8px; letter-spacing: 2px; color: var(--ink3); margin-bottom: 10px; }
    .conv-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--line); margin-bottom: 7px;
      background: var(--bg); transition: border-color .2s;
    }
    .conv-row:last-child { margin-bottom: 0; }
    .conv-row:hover:not(.usado) { border-color: var(--blue); }
    .conv-row.usado { opacity: .45; border-style: dashed; }
    .conv-cod { font-size: 13px; letter-spacing: 2px; color: var(--blue); }
    .conv-row.usado .conv-cod { color: var(--ink3); text-decoration: line-through; }
    .btn-copy {
      font-size: 7.5px; letter-spacing: 1px; padding: 5px 12px;
      border-radius: 20px; border: 1px solid var(--line2);
      background: none; color: var(--ink3); cursor: pointer;
      transition: all .2s;
    }
    .btn-copy:hover { border-color: var(--blue); color: var(--blue); }
    .btn-copy.ok { border-color: var(--green); color: var(--green); background: var(--green-bg); }
    .badge-usado {
      font-size: 8px; letter-spacing: 1px; color: var(--ink3);
      background: var(--bg3); border-radius: 20px; padding: 4px 9px;
    }

    /* ══ POSTS ══ */
    .posts-list { display: flex; flex-direction: column; gap: 7px; }
    .post-card {
      background: var(--bg2); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 13px 14px;
      animation: fadeUp .3s ease;
    }
    /* Posts com texto vazio ficam invisíveis — não renderizamos */

    .post-hdr { display: flex; align-items: center; gap: 9px; margin-bottom: 8px; }
    .post-av  {
      width: 30px; height: 30px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0; background: var(--blue);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; border: 1.5px solid var(--line);
    }
    .post-av img { width: 100%; height: 100%; object-fit: cover; }
    .post-autor { font-size: 10px; font-weight: 500; color: var(--ink); }
    .post-data  { font-size: 8.5px; color: var(--ink3); }

    .post-mood  { font-size: 14px; margin-left: auto; }
    .post-txt {
      font-family: var(--serif); font-style: italic;
      font-size: 13.5px; line-height: 1.7; color: var(--ink2);
      margin-bottom: 9px; white-space: pre-wrap; word-break: break-word;
    }
    .post-footer { display: flex; align-items: center; gap: 10px; }
    .post-likes { font-size: 9px; color: var(--ink3); }

    /* Trade post */
    .trade-pill {
      font-size: 7.5px; letter-spacing: 1px; padding: 2px 8px;
      border-radius: 20px; font-weight: 500; margin-left: auto;
    }
    .trade-pill.c { background: var(--green-bg); color: var(--green); }
    .trade-pill.v { background: var(--red-bg);   color: var(--red); }
    .trade-ticker { font-family: var(--display); font-size: 18px; letter-spacing: 2px; color: var(--blue); margin-bottom: 7px; }
    .trade-grid   { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 6px; }
    .tg-l { font-size: 7px; letter-spacing: 1.5px; color: var(--ink3); margin-bottom: 2px; }
    .tg-v { font-size: 11px; font-weight: 500; color: var(--ink); }

    /* ══ SKELETON ══ */
    .skel-card {
      background: var(--bg2); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 13px 14px;
      display: flex; gap: 10px; margin-bottom: 7px;
    }
    .sk-c { width: 30px; height: 30px; border-radius: 50%; background: var(--bg3); flex-shrink: 0; animation: shimmer 1.6s infinite; }
    .sk-b { flex: 1; display: flex; flex-direction: column; gap: 7px; padding-top: 4px; }
    .sk-l { height: 9px; border-radius: 4px; background: var(--bg3); animation: shimmer 1.6s infinite; }
    .sk-l:nth-child(1) { width: 40%; animation-delay:.1s }
    .sk-l:nth-child(2) { width: 80%; animation-delay:.2s }
    .sk-l:nth-child(3) { width: 55%; animation-delay:.3s }

    /* ══ EMPTY / ERRO ══ */
    .empty {
      text-align: center; padding: 28px; font-size: 10px;
      color: var(--ink3); letter-spacing: 1px;
    }

    /* ══ BTN SAIR ══ */
    .btn-sair {
      width: 100%; height: 46px; border-radius: 25px;
      margin-top: 4px; margin-bottom: 18px;
      font-size: 8.5px; letter-spacing: 2px;
      background: none; border: 1px solid var(--line2);
      color: var(--ink3); cursor: pointer;
      transition: border-color .2s, color .2s;
      font-family: var(--mono);
    }
    .btn-sair:hover { border-color: var(--red); color: var(--red); }

    /* ══ TOAST ══ */
    #toast {
      position: fixed; bottom: 84px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--ink); color: var(--bg);
      font-size: 10.5px; letter-spacing: .4px;
      padding: 9px 20px; border-radius: 20px;
      opacity: 0; pointer-events: none; z-index: 9000;
      white-space: nowrap; transition: opacity .22s, transform .22s;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ══ NAV ══ */
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: 62px;
      background: rgba(240,235,227,.94);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--line);
      display: flex; justify-content: space-around; align-items: center; z-index: 100;
    }
    .ni {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      text-decoration: none; color: inherit;
      padding: 5px 16px; border-radius: 12px; cursor: pointer;
      transition: background .18s; -webkit-tap-highlight-color: transparent;
    }
    .ni:hover { background: var(--bg3); }
    .ni-ico { font-size: 18px; line-height: 1; }
    .ni-lbl { font-size: 7.5px; letter-spacing: 1.5px; color: var(--ink3); }
    .ni.on .ni-lbl { color: var(--blue); font-weight: 500; }

    /* ══ COTAÇÕES BADGE ══ */
    .cot-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 8px; letter-spacing: 1px; color: var(--ink3);
      background: var(--bg3); border-radius: 20px; padding: 3px 9px;
      margin-bottom: 12px;
    }
    .cot-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ink3); }
    .cot-badge.live { color: var(--green); }
    .cot-badge.live .cot-dot { background: var(--green); animation: pulse 1.5s infinite; }
    .cot-badge.offline { color: var(--red); }
    .cot-badge.offline .cot-dot { background: var(--red); }
  </style>
</head>

<div class="wrap">

<script>
'use strict';

/* ════════════════════════════════════════════════
   PERFIL.HTML — reescrito
   Fixes:
   1. Treemap → Stacked bar + rows (legível no mobile)
   2. Cotações → brapi + awesomeapi + coingecko (sem CORS)
   3. Patrimônio → disp + valor_atual_real das posições
   4. Posts → filtra vazios, usa data_post OU criadoEm
   5. Resultado por ativo → só mostra quando tem cotação
════════════════════════════════════════════════ */

const CAPITAL   = 500_000;
const PAL_CORES = ['#2a5fff','#1a9c4e','#d4a800','#d93030','#7c3aed','#0891b2','#ea580c','#db2777'];
const PAL_DISP  = '#cec7bb';

// ── formatadores ──
const BRL  = v => 'R$\u202f' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits:2, maximumFractionDigits:2 });
const BRLk = v => { const a=Math.abs(v); const s=v<0?'-':''; return s+'R$\u202f'+(a>=1000?(a/1000).toFixed(0)+'k':a.toLocaleString('pt-BR',{maximumFractionDigits:0})); };
const Pct  = v => (v>=0?'+':'')+Number(v).toFixed(2)+'%';

function tempoRel(sec) {
  if (!sec) return '—';
  const diff = Math.floor(Date.now()/1000 - sec);
  if (diff<60)    return 'agora';
  if (diff<3600)  return Math.floor(diff/60)+'m';
  if (diff<86400) return Math.floor(diff/3600)+'h';
  return new Date(sec*1000).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── toast ──
let _tt;
function toast(msg, dur=2600) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),dur);
}

/* ════════════════════════
   ESTADO
════════════════════════ */
let db, uid;
let userData = {}, posicoes = [], cotacoes = {};
let cotacoesStatus = 'loading'; // 'loading' | 'live' | 'offline'

/* ════════════════════════
   COTAÇÕES
   FIX: sem Yahoo Finance (CORS)
   Ordem: brapi → awesomeapi → coingecko → fallback
════════════════════════ */
async function buscarCotacoes(tickers) {
  const result = {};
  if (!tickers.length) return result;

  const acoes = tickers.filter(t => !['BTC','ETH','BNB','SOL'].includes(t));
  const crypto= tickers.filter(t =>  ['BTC','ETH','BNB','SOL'].includes(t));

  // ── ações via brapi ──
  if (acoes.length) {
    try {
      const r = await fetch(
        `https://brapi.dev/api/quote/${acoes.join(',')}?range=1d&interval=1d`,
        { signal: AbortSignal.timeout(7000) }
      );
      const d = await r.json();
      (d.results || []).forEach(q => {
        if (q.regularMarketPrice > 0) result[q.symbol] = q.regularMarketPrice;
      });
    } catch(e) { console.warn('[brapi]', e.message); }
  }

  // ── cripto via coingecko ──
  if (crypto.length) {
    const map = { BTC:'bitcoin', ETH:'ethereum', BNB:'binancecoin', SOL:'solana' };
    const ids  = crypto.map(t=>map[t]).filter(Boolean);
    if (ids.length) {
      try {
        const r = await fetch(
          `https://api.coingecko.com/api/v3/simple/price?ids=${ids.join(',')}&vs_currencies=usd`,
          { signal: AbortSignal.timeout(7000) }
        );
        const d = await r.json();
        // pega USD e converte por câmbio
        const usd2brl = await getUSD();
        const rmap = { bitcoin:'BTC', ethereum:'ETH', binancecoin:'BNB', solana:'SOL' };
        Object.entries(d).forEach(([id,v]) => {
          const sym = rmap[id];
          if (sym) result[sym] = v.usd * usd2brl;
        });
      } catch(e) { console.warn('[coingecko]', e.message); }
    }
  }

  cotacoesStatus = Object.keys(result).length > 0 ? 'live' : 'offline';
  atualizarCotBadge();
  return result;
}

let _usdCache = null;
async function getUSD() {
  if (_usdCache) return _usdCache;
  try {
    const r = await fetch('https://economia.awesomeapi.com.br/last/USD-BRL', { signal: AbortSignal.timeout(5000) });
    const d = await r.json();
    _usdCache = parseFloat(d.USDBRL?.bid) || 5.70;
  } catch(e) { _usdCache = 5.70; }
  return _usdCache;
}

function atualizarCotBadge() {
  const el  = document.getElementById('cot-badge');
  const txt = document.getElementById('cot-txt');
  el.className  = 'cot-badge ' + (cotacoesStatus === 'live' ? 'live' : cotacoesStatus === 'offline' ? 'offline' : '');
  txt.textContent = cotacoesStatus === 'live' ? 'cotações ao vivo' : cotacoesStatus === 'offline' ? 'cotações offline' : 'carregando cotações...';
}

/* ════════════════════════
   CÁLCULO DE PATRIMÔNIO
   FIX: disp = saldo real (após compras)
        inv  = valor_atual de cada posição
        total = disp + inv
════════════════════════ */
function calcPatrimonio(cartData) {
  // Saldo disponível: pode estar em usuarios.saldo_disponivel
  // ou em carteiras.saldo_disponivel. Usa o disponível real.
  const dispFirestore = cartData?.saldo_disponivel ?? CAPITAL;
  const pos = posicoes;

  let totalPago = 0;
  let valorAtual = 0;

  pos.forEach(p => {
    const qtd      = p.quantidade || 0;
    const pm       = p.preco_medio || p.preco || 0;
    const cotAtual = cotacoes[p.ticker] || 0;
    const va       = cotAtual > 0 ? qtd * cotAtual : qtd * pm; // usa cot se tiver
    totalPago  += qtd * pm;
    valorAtual += va;
  });

  // Se cotações não carregaram, patrimônio = disponível + custo (sem ganho/perda)
  const patrimonio = dispFirestore + valorAtual;
  const resultado  = patrimonio - CAPITAL;
  const rentab     = CAPITAL > 0 ? (resultado / CAPITAL) * 100 : 0;

  return { patrimonio, dispFirestore, valorAtual, totalPago, resultado, rentab };
}

/* ════════════════════════
   HELPERS DE COR
════════════════════════ */
function corPombito() {
  const MAP = {
    'azul':'#2a5fff','azul celeste':'#87ceeb','azul mar':'#006994',
    'verde':'#2d8a4e','verde mar':'#2e8b57','vermelho':'#d93030',
    'rosa':'#e75480','roxo':'#6a0dad','laranja':'#e86a1a',
    'amarelo':'#d4a800','dourado':'#c9a84c','cinza':'#6b6b6b',
    'marrom':'#7a4e2d','ciano':'#00b4d8','violeta':'#7c3aed',
    'turquesa':'#40e0d0','coral':'#ff6b6b'
  };
  return MAP[(userData.cor || '').toLowerCase().trim()] || '#2a5fff';
}

/* ════════════════════════
   RENDER STATS
════════════════════════ */
function renderStats(cartData) {
  const { patrimonio, resultado, rentab } = calcPatrimonio(cartData);
  const isPos = resultado >= 0;

  document.getElementById('st-pat').textContent = BRLk(patrimonio);
  const resEl = document.getElementById('st-res');

}

/* ════════════════════════
   RENDER ALOCAÇÃO
   FIX: stacked bar + rows, sem treemap
════════════════════════ */
function renderAloc(cartData) {
  if (!posicoes.length) return;
  document.getElementById('aloc-card').style.display = 'block';

  const { patrimonio, dispFirestore } = calcPatrimonio(cartData);

  // Monta itens
  const itens = posicoes.map((p, i) => {
    const cotAtual = cotacoes[p.ticker] || p.preco_medio || 0;
    const val = (p.quantidade || 0) * cotAtual;
    const pct = patrimonio > 0 ? (val / patrimonio) * 100 : 0;
    return { ticker: p.ticker, val, pct, cor: PAL_CORES[i % PAL_CORES.length] };
  });

  if (dispFirestore > 0) {
    const pct = patrimonio > 0 ? (dispFirestore / patrimonio) * 100 : 0;
    itens.push({ ticker: 'DISPONÍVEL', val: dispFirestore, pct, cor: PAL_DISP });
  }

  itens.sort((a, b) => b.val - a.val);

  // Stacked bar
  const bar = document.getElementById('stacked-bar');
  bar.innerHTML = '';
  itens.forEach(it => {
    const seg = document.createElement('div');
    seg.className = 'sb-seg';
    seg.style.flex    = it.pct.toFixed(2);
    seg.style.background = it.cor;
    seg.title = `${it.ticker}: ${it.pct.toFixed(1)}%`;
    bar.appendChild(seg);
  });

  // Rows com mini barra
  const rows = document.getElementById('aloc-rows');
  rows.innerHTML = '';
  const maxVal = itens[0]?.val || 1;

  itens.forEach(it => {
    const barW = ((it.val / maxVal) * 100).toFixed(1);
    const row  = document.createElement('div');
    row.className = 'aloc-row';
    row.innerHTML = `
      <div class="aloc-dot" style="background:${it.cor}"></div>
      <span class="aloc-ticker">${esc(it.ticker)}</span>
      <div class="aloc-bar-wrap">
        <div class="aloc-bar" style="width:${barW}%;background:${it.cor}"></div>
      </div>
      <span class="aloc-pct">${it.pct.toFixed(1)}%</span>
      <span class="aloc-val">${BRLk(it.val)}</span>`;
    rows.appendChild(row);
  });
}

/* ════════════════════════
   RENDER DESEMPENHO
   FIX: só mostra ganho/perda se tem cotação real
════════════════════════ */
function renderPerf(cartData) {
  if (!posicoes.length) return;
  document.getElementById('perf-card').style.display = 'block';

  const { resultado, rentab } = calcPatrimonio(cartData);
  const isPos = resultado >= 0;

  const vEl = document.getElementById('perf-valor');
  vEl.textContent = (isPos?'+':'') + BRL(resultado);
  vEl.className   = 'perf-valor ' + (isPos ? 'pos' : 'neg');

  const pEl = document.getElementById('perf-pct');
  pEl.textContent = Pct(rentab);
  pEl.className   = 'perf-pct ' + (isPos ? 'pos' : 'neg');

  // Por ativo
  const rows = document.getElementById('perf-rows');

  const porAtivo = posicoes.map((p, i) => {
    const cotAtual = cotacoes[p.ticker] || 0;
    const pm       = p.preco_medio || p.preco || 0;
    const qtd      = p.quantidade  || 0;
    const temCot   = cotAtual > 0 && cotAtual !== pm;

    const va    = temCot ? qtd * cotAtual : qtd * pm;
    const vp    = qtd * pm;
    const ganho = va - vp;
    const ganhoP= vp > 0 ? (ganho / vp) * 100 : 0;

    return { ticker: p.ticker, ganho, ganhoP, temCot, cor: PAL_CORES[i % PAL_CORES.length] };
  }).sort((a, b) => b.ganho - a.ganho);

  // Se nenhum tem cotação, mostra aviso
  const algumTemCot = porAtivo.some(p => p.temCot);

  if (!algumTemCot) {
    rows.innerHTML = `
      <div class="perf-empty">
        ⚡ Aguardando cotações ao vivo<br>
        <span style="opacity:.6">desempenho por ativo aparece após carregar</span>
      </div>`;
    return;
  }

  const maxAbs = Math.max(...porAtivo.map(p => Math.abs(p.ganho)), 1);

  porAtivo.forEach(p => {
    const ip   = p.ganho >= 0;
    const barW = ((Math.abs(p.ganho) / maxAbs) * 100).toFixed(0);
    const ganhoStr = p.temCot
      ? (ip?'+':'') + BRLk(p.ganho)
      : '···';

    const row = document.createElement('div');
    row.className = 'perf-row';
    row.onclick   = () => location.href = `relatorio.html?ticker=${encodeURIComponent(p.ticker)}`;
    row.innerHTML = `
      <div class="pr-dot" style="background:${p.cor}"></div>
      <span class="pr-tick">${esc(p.ticker)}</span>
      <div class="pr-bar-wrap">
        <div class="pr-bar" style="width:${p.temCot?barW:0}%;background:${ip?'var(--green)':'var(--red)'}"></div>
      </div>
      <span class="pr-ganho ${p.temCot?(ip?'pos':'neg'):''}">${ganhoStr}</span>`;
    rows.appendChild(row);
  });
}

/* ════════════════════════
   RENDER CONVITES
════════════════════════ */
async function renderConvites(codigos) {
  const el = document.getElementById('conv-list');
  if (!codigos?.length) {
    el.innerHTML = `<div class="empty">Nenhum convite disponível.</div>`;
    return;
  }

  let html = '';
  for (const cod of codigos) {
    let usado = false;
    try {
      const s = await db.collection('convites').doc(cod).get();
      if (s.exists) usado = s.data()?.usado === true;
    } catch(e) {}

    html += usado
      ? `<div class="conv-row usado"><span class="conv-cod">${cod}</span><span class="badge-usado">FLORESCEU 🌸</span></div>`
      : `<div class="conv-row"><span class="conv-cod">${cod}</span><button class="btn-copy" onclick="copiar('${cod}',this)">COPIAR</button></div>`;
  }
  el.innerHTML = html;
}

async function copiar(cod, btn) {
  try { await navigator.clipboard.writeText(cod); }
  catch {
    const i = document.createElement('input');
    i.value = cod; document.body.appendChild(i); i.select();
    document.execCommand('copy'); document.body.removeChild(i);
  }
  btn.textContent = '✓ COPIADO'; btn.classList.add('ok');
  toast('🪶 Código copiado: ' + cod);
  setTimeout(() => { btn.textContent = 'COPIAR'; btn.classList.remove('ok'); }, 2000);
}

/* ════════════════════════
   RENDER POSTS
   FIX:
   - filtra posts sem texto
   - usa data_post OU criadoEm (os dois campos existem)
   - avatar real do usuário
════════════════════════ */
async function renderPosts() {
  const skel = document.getElementById('posts-skel');
  const list = document.getElementById('posts-list');

  let snap;
  try {
    // Tenta orderBy data_post (campo usado no feed.html)
    snap = await db.collection('posts')
      .where('uid', '==', uid)
      .orderBy('data_post', 'desc')
      .limit(30)
      .get();
  } catch(e) {
    try {
      // Fallback: orderBy criadoEm (campo antigo)
      snap = await db.collection('posts')
        .where('uid', '==', uid)
        .orderBy('criadoEm', 'desc')
        .limit(30)
        .get();
    } catch(e2) {
      // Último recurso: sem orderBy
      try {
        snap = await db.collection('posts')
          .where('uid', '==', uid)
          .limit(30)
          .get();
      } catch(e3) {
        skel.style.display = 'none';
        list.innerHTML = `<div class="empty">⚠️ Erro ao carregar posts.</div>`;
        return;
      }
    }
  }

  skel.style.display = 'none';

  // Mapeia e ordena pelo campo de data que existir
  const posts = snap.docs
    .map(d => ({ id: d.id, ...d.data() }))
    .filter(p => {
      // FIX: filtra posts SEM texto e sem dados úteis
      if (p.tipo === 'trade') return !!(p.ticker || p.trade?.ticker);
      return !!(p.texto?.trim());
    })
    .sort((a, b) => {
      const sa = a.data_post?.seconds || a.criadoEm?.seconds || 0;
      const sb = b.data_post?.seconds || b.criadoEm?.seconds || 0;
      return sb - sa;
    });

  if (!posts.length) {
    list.innerHTML = `<div class="empty">📭 Nenhum post ainda.</div>`;
    return;
  }

  const foto = userData.foto_perfil
    || `https://api.dicebear.com/7.x/identicon/svg?seed=${uid}`;
  const cor  = corPombito();

  posts.forEach(p => {
    const sec  = p.data_post?.seconds || p.criadoEm?.seconds || 0;
    const data = tempoRel(sec);
    const card = document.createElement('div');
    card.className = 'post-card';

    /* Trade post */
    if (p.tipo === 'trade') {
      const ticker = p.ticker || p.trade?.ticker || '—';
      const lado   = p.lado || p.trade?.lado || 'compra';
      const qtd    = p.quantidade || p.trade?.quantidade || '—';
      const preco  = p.preco || p.trade?.preco || 0;
      const total  = p.total || p.trade?.total || 0;
      const isBuy  = lado === 'compra';

      card.innerHTML = `
        <div class="post-hdr">
          <div class="post-av" style="background:${cor}">
            ${foto ? `<img src="${esc(foto)}" alt="">` : '🐦'}
          </div>
          <div>
            <p class="post-autor">@${esc(userData.username||'eu')}</p>
            <p class="post-data">${data}</p>
          </div>
          <span class="trade-pill ${isBuy?'c':'v'}">${isBuy?'📈 COMPRA':'📉 VENDA'}</span>
        </div>
        <p class="trade-ticker">${esc(ticker)}</p>
        <div class="trade-grid">
          <div><p class="tg-l">QUANTIDADE</p><p class="tg-v">${qtd}</p></div>
          <div><p class="tg-l">PREÇO</p><p class="tg-v">R$${Number(preco).toFixed(2)}</p></div>
          <div><p class="tg-l">TOTAL</p><p class="tg-v">${BRL(total)}</p></div>
        </div>
        ${p.texto?.trim() ? `<p class="post-txt">${esc(p.texto)}</p>` : ''}
        <div class="post-footer">
          <span class="post-likes">❤️ ${p.likes||0}</span>
        </div>`;
      list.appendChild(card);
      return;
    }

    /* Post de texto */
    const moodIco = p.mood ? `<span class="post-mood">${p.mood}</span>` : '';
    card.innerHTML = `
      <div class="post-hdr">
        <div class="post-av" style="background:${cor}">
          ${foto ? `<img src="${esc(foto)}" alt="">` : '🐦'}
        </div>
        <div>
          <p class="post-autor">@${esc(userData.username||'eu')}</p>
          <p class="post-data">${data}</p>
        </div>
        ${moodIco}
      </div>
      <p class="post-txt">${esc(p.texto||'').replace(/\n/g,'<br>')}</p>
      <div class="post-footer">
        <span class="post-likes">❤️ ${p.likes||0}</span>
      </div>`;
    list.appendChild(card);
  });
}

async function sair() {
  if (!confirm('Sair do Ninho?')) return;
  try {
    await firebase.auth().signOut();
    location.href = 'invite.html';
  } catch(e) { toast('Erro ao sair.'); }

/* ════════════════════════
   INIT
════════════════════════ */
firebase.auth().onAuthStateChanged(async user => {
  if (!user) { location.href = 'invite.html'; return; }
  uid = user.uid;
  db  = firebase.firestore();

  try {
    const [uSnap, cSnap] = await Promise.all([
      db.collection('usuarios').doc(uid).get(),
      db.collection('carteiras').doc(uid).get(),
    ]);

    if (!uSnap.exists || !uSnap.data()?.perfil_completo) {
      location.href = 'setup-perfil.html'; return;
    }

    userData = uSnap.data() || {};
    const cartData = cSnap.exists ? cSnap.data() : {};
    posicoes = cartData.posicoes || [];

    // Render estático imediato (sem cotações)
    renderHero();
    renderStats(cartData);

    // Busca cotações e re-renderiza
    const tickers = posicoes.map(p => p.ticker).filter(Boolean);
    cotacoes = await buscarCotacoes(tickers);

    // Re-render com cotações
    renderStats(cartData);
    renderAloc(cartData);
    renderPerf(cartData);

    // Posts e convites (paralelo)
    renderPosts();
    renderConvites(userData.meus_codigos || []);

  } catch(e) {
    console.error('Init:', e);
    toast('Erro ao carregar perfil. Recarregue.');
  }
});
