<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O Ninho Secreto | Los Pombitos</title>
    <link rel="stylesheet" href="style-invite.css">
    <style>
        /* Ajuste para aceitar o formato POMB-XXXX */
        .input-group { display: flex; align-items: center; justify-content: center; gap: 5px; }
        .code-box-text { 
            width: 100%; 
            max-width: 250px; 
            height: 50px; 
            text-align: center; 
            font-size: 20px; 
            font-family: 'Courier New', monospace; 
            border: 2px solid #0B57D0; 
            border-radius: 8px; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .cta-button-google {
            width: 100%;
            padding: 15px;
            background: #0B57D0;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="secret-container">
        <div class="mason-symbol">
            <svg width="120" height="120" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 4L3 19H21L12 4Z" stroke="#0B57D0" stroke-width="1" stroke-linejoin="round"/>
                <rect x="10" y="11" width="4" height="4" fill="#4285F4"/>
                <rect x="11" y="12" width="2" height="2" fill="black"/>
                <rect x="12" y="12" width="1" height="1" fill="white"/>
            </svg>
        </div>

        <header class="secret-header">
            <h2>A ORDEM DOS POMBITOS</h2>
            <p class="encrypted-text">Insira sua semente de linhagem (POMB-XXXX)</p>
        </header>

        <div class="code-entry">
            <div class="input-group">
                <input type="text" id="input-convite" class="code-box-text" placeholder="POMB-XXXX" maxlength="9">
            </div>
            
            <button class="cta-button-google" id="btn-entrar" onclick="executarEntrada()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                <span>GERMINAR SEMENTE</span>
            </button>
        </div>

        <footer class="security-footer" style="margin-top: 30px;">
            <p>Conexão Criptografada via Praia-Protocol</p>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <script src="auth.js"></script>

    <script>
        async function executarEntrada() {
            const btn = document.getElementById('btn-entrar');
            const originalText = btn.innerHTML;
            
            // Desativa o botão para evitar múltiplos cliques
            btn.disabled = true;
            btn.innerHTML = "VALIDANDO COM A MARÉ...";

            try {
                // Chama a função que criamos no auth.js que já faz a validação e o login
                await validarEEntrar();
            } catch (error) {
                console.error(error);
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        // Atalho: pressionar Enter também envia
        document.getElementById('input-convite').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') executarEntrada();
        });
    </script>
</body>
</html>
