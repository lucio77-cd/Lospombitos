<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Ninho Secreto | Los Pombitos</title>
    <link rel="stylesheet" href="style-invite.css">
</head>
<body>

    <div class="secret-container">
        <div class="mason-symbol">
            <svg width="120" height="120" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 4L3 19H21L12 4Z" stroke="#0B57D0" stroke-width="1" stroke-linejoin="round"/>
                <rect x="10" y="11" width="4" height="4" fill="#4285F4"/>
                <rect x="11" y="12" width="2" height="2" fill="black"/>
                <rect x="12" y="12" width="1" height="1" fill="white"/>
                <rect x="11" y="8" width="2" height="1" fill="#0B57D0"/>
                <rect x="11" y="16" width="2" height="1" fill="#0B57D0"/>
            </svg>
        </div>

        <header class="secret-header">
            <h2>A ORDEM DOS POMBITOS</h2>
            <p class="encrypted-text">Decifre o segredo para entrar no ninho.</p>
        </header>

        <div class="code-entry">
            <div class="input-group">
                <input type="text" maxlength="1" class="code-box" placeholder="0">
                <input type="text" maxlength="1" class="code-box" placeholder="0">
                <input type="text" maxlength="1" class="code-box" placeholder="0">
                <span class="separator">-</span>
                <input type="text" maxlength="1" class="code-box" placeholder="0">
                <input type="text" maxlength="1" class="code-box" placeholder="0">
                <input type="text" maxlength="1" class="code-box" placeholder="0">
            </div>
        </div>

        <footer class="security-footer">
            <div id="google-login-area" style="display: none; margin-bottom: 20px;">
                <button class="cta-button-google" onclick="handleGoogleLogin()" style="cursor:pointer; padding: 12px 25px; border-radius: 25px; border: 1px solid #ddd; background: white; display: flex; align-items: center; gap: 10px; margin: 0 auto; font-family: inherit; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                    <span>ENTRAR NA LINHAGEM</span>
                </button>
            </div>

            <p>Conexão Criptografada via Praia-Protocol</p>
            <div class="security-lock">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="#bdc3c7">
                    <path d="M12 17a2 2 0 100-4 2 2 0 000 4z"/>
                    <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6z"/>
                </svg>
                <span>SÓ PARA INICIADOS</span>
            </div>
        </footer>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script src="auth.js"></script>

    <script>
        const inputs = document.querySelectorAll('.code-box');
        const loginArea = document.getElementById('google-login-area');
        const codeEntryArea = document.querySelector('.code-entry');
        const instructionText = document.querySelector('.encrypted-text');
        
        let typedCode = "";

        // Focar no primeiro campo ao carregar
        window.onload = () => inputs[0].focus();

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                
                typedCode = "";
                inputs.forEach(i => typedCode += i.value);
                
                if (typedCode.length === 6) {
                    // O código mestre que você definiu
                    if (typedCode === "131213") {
                        codeEntryArea.style.display = 'none';
                        loginArea.style.display = 'block';
                        instructionText.innerHTML = "CÓDIGO ACEITO. BEM-VINDO À ORDEM.";
                        instructionText.style.color = "#2ecc71";
                    } else {
                        alert("CÓDIGO DESCONHECIDO.");
                        inputs.forEach(i => i.value = "");
                        inputs[0].focus();
                    }
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        async function handleGoogleLogin() {
            const btn = document.querySelector('.cta-button-google');
            
            // GARANTIA: Se o Firebase não inicializou pelo auth.js, inicializamos aqui de novo
            // Isso evita o erro de "[DEFAULT] not created"
            if (!firebase.apps.length) {
                console.log("Reinicializando Firebase por segurança...");
                firebase.initializeApp(firebaseConfig); 
            }

            btn.disabled = true;
            btn.innerHTML = "VALIDANDO LINHAGEM...";

            const provider = new firebase.auth.GoogleAuthProvider();

            try {
                // Forçamos o uso do firebase.auth() global
                const result = await firebase.auth().signInWithPopup(provider);
                const user = result.user;

                console.log("Autenticado:", user.displayName);

                // Chama a função que está no seu auth.js
                await finalizarCadastroPombito(user, typedCode);

            } catch (error) {
                console.error("Erro detalhado:", error);
                alert("A Ordem recusou sua entrada: " + error.message);
                btn.disabled = false;
                btn.innerHTML = "ENTRAR COM GOOGLE";
            }
        }
    </script>

</body>
</html>
