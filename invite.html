<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O Ninho Secreto | Los Pombitos</title>
    <link rel="stylesheet" href="style-invite.css">
</head>
<body>

    <div class="secret-container">
        <div class="mason-symbol">
            <svg width="120" height="120" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 4L3 19H21L12 4Z" stroke="#0B57D0" stroke-width="1" stroke-linejoin="round"/>
                <rect x="10" y="11" width="4" height="4" fill="#4285F4"/>
                <rect x="11" y="12" width="2" height="2" fill="black"/>
                <rect x="12" y="12" width="1" height="1" fill="white"/>
            </svg>
        </div>

        <header class="secret-header">
            <h2>A ORDEM DOS POMBITOS</h2>
            <p class="encrypted-text">Decifre o segredo para entrar no ninho.</p>
        </header>

        <div class="code-entry">
            <div class="input-group">
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" class="code-box" placeholder="0">
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" class="code-box" placeholder="0">
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" class="code-box" placeholder="0">
                <span class="separator">-</span>
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" class="code-box" placeholder="0">
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" class="code-box" placeholder="0">
                <input type="number" pattern="\d*" inputmode="numeric" maxlength="1" class="code-box" placeholder="0">
            </div>
        </div>

        <footer class="security-footer">
            <div id="google-login-area" style="display: none; margin-bottom: 20px;">
                <button class="cta-button-google" onclick="handleGoogleLogin()">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                    <span>ENTRAR NA LINHAGEM</span>
                </button>
            </div>
            <p>Conexão Criptografada via Praia-Protocol</p>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <script src="auth.js"></script>

    <script>
        const inputs = document.querySelectorAll('.code-box');
        const loginArea = document.getElementById('google-login-area');
        const codeEntryArea = document.querySelector('.code-entry');
        const instructionText = document.querySelector('.encrypted-text');

        // Focar no primeiro campo ao carregar
        window.addEventListener('load', () => inputs[0].focus());

        inputs.forEach((input, index) => {
            // Lógica de digitação e pulo automático
            input.addEventListener('input', (e) => {
                const value = e.target.value;
                
                // Se o usuário digitou algo, pula para o próximo
                if (value.length >= 1) {
                    e.target.value = value.slice(-1); // Garante apenas 1 dígito
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                }

                // Verifica se todos os campos estão preenchidos
                let currentCode = "";
                inputs.forEach(i => currentCode += i.value);

                if (currentCode.length === 6) {
                    if (currentCode === "131213") {
                        // SUCESSO: Troca a interface
                        codeEntryArea.style.display = 'none';
                        loginArea.style.display = 'block';
                        instructionText.innerHTML = "ACESSO CONCEDIDO. BEM-VINDO.";
                        instructionText.style.color = "#2ecc71";
                    } else {
                        // ERRO: Limpa e reinicia
                        alert("CÓDIGO DESCONHECIDO PELA ORDEM.");
                        inputs.forEach(i => i.value = "");
                        inputs[0].focus();
                    }
                }
            });

            // Lógica do Backspace (Apagar e voltar)
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        async function handleGoogleLogin() {
            const btn = document.querySelector('.cta-button-google');
            btn.disabled = true;
            btn.innerHTML = "VALIDANDO LINHAGEM...";

            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await firebase.auth().signInWithPopup(provider);
                
                // Captura o código usado para o registro no banco
                let finalCode = "";
                inputs.forEach(i => finalCode += i.value);

                // Executa a função do auth.js
                await finalizarCadastroPombito(result.user, finalCode);

            } catch (error) {
                console.error("Erro no login:", error);
                alert("A maré recusou: " + error.message);
                btn.disabled = false;
                btn.innerHTML = "ENTRAR NA LINHAGEM";
            }
        }
    </script>
</body>
</html>
