<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Relatório | Los Pombitos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink:     #0d0d0d;
      --sand:    #f0ebe3;
      --shore:   #e2d9cd;
      --wave:    #1a4fff;
      --foam:    #c8d8ff;
      --sun:     #f5b800;
      --coral:   #ff5533;
      --muted:   #8a8278;
      --card:    #faf8f5;
      --green:   #1a8a4a;
      --red:     #cc2200;
      --radius:  14px;
      --mono:    'DM Mono', monospace;
      --sans:    'DM Sans', sans-serif;
      --display: 'Bebas Neue', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--sand);
      color: var(--ink);
      min-height: 100dvh;
      padding-bottom: 100px;
      overscroll-behavior: none;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: .5;
    }

    /* ── HEADER ── */
    .feed-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--sand); border-bottom: 1.5px solid var(--shore);
      padding: 0 20px; height: 58px;
      display: flex; align-items: center; gap: 14px;
      backdrop-filter: blur(12px);
    }

    .btn-voltar {
      background: none; border: none; font-size: 22px;
      cursor: pointer; color: var(--ink); padding: 4px;
      display: flex; align-items: center;
    }

    .header-titulo {
      font-family: var(--display); font-size: 22px;
      letter-spacing: 2px; color: var(--ink); flex: 1;
    }

    .header-tipo {
      font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px;
      color: var(--muted); background: var(--shore);
      border-radius: 20px; padding: 4px 10px;
    }

    /* ── CONTAINER ── */
    .container { padding: 20px 16px; max-width: 640px; margin: 0 auto; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HERO DO ATIVO ── */
    .ativo-hero {
      background: var(--card); border: 1.5px solid var(--shore);
      border-radius: var(--radius); padding: 20px;
      margin-bottom: 16px; animation: fadeUp .3s ease;
    }

    .ativo-hero-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 14px;
    }

    .ativo-ticker {
      font-family: var(--display); font-size: 32px;
      letter-spacing: 3px; color: var(--wave); line-height: 1;
    }

    .ativo-nome {
      font-size: 13px; color: var(--muted); margin-top: 3px;
    }

    .ativo-preco-wrap { text-align: right; }

    .ativo-preco {
      font-family: var(--display); font-size: 28px;
      letter-spacing: 2px; color: var(--ink); line-height: 1;
    }

    .ativo-var {
      font-family: var(--mono); font-size: 12px;
      font-weight: 500; margin-top: 3px;
    }
    .ativo-var.pos { color: var(--green); }
    .ativo-var.neg { color: var(--red); }

    /* Mini stats */
    .ativo-stats {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 10px; padding-top: 14px;
      border-top: 1px solid var(--shore);
    }

    .stat-item { display: flex; flex-direction: column; gap: 3px; }
    .stat-label {
      font-family: var(--mono); font-size: 8px;
      letter-spacing: 1.5px; color: var(--muted);
    }
    .stat-valor {
      font-family: var(--mono); font-size: 12px;
      font-weight: 500; color: var(--ink);
    }
    .stat-valor.pos { color: var(--green); }
    .stat-valor.neg { color: var(--red); }

    /* ── SEÇÕES DO RELATÓRIO ── */
    .relatorio-secao {
      background: var(--card); border: 1.5px solid var(--shore);
      border-radius: var(--radius); padding: 18px;
      margin-bottom: 12px; animation: fadeUp .3s ease;
    }

    .secao-titulo {
      font-family: var(--display); font-size: 16px;
      letter-spacing: 2px; color: var(--ink);
      margin-bottom: 14px; display: flex;
      align-items: center; gap: 8px;
    }

    .secao-icone { font-size: 18px; }

    /* Itens do relatório */
    .relatorio-item {
      display: flex; justify-content: space-between;
      align-items: baseline; padding: 8px 0;
      border-bottom: 1px solid var(--shore);
    }
    .relatorio-item:last-child { border-bottom: none; }

    .item-label {
      font-family: var(--mono); font-size: 10px;
      letter-spacing: .5px; color: var(--muted);
      flex: 1;
    }

    .item-valor {
      font-family: var(--mono); font-size: 11px;
      font-weight: 500; color: var(--ink);
      text-align: right;
    }
    .item-valor.pos { color: var(--green); }
    .item-valor.neg { color: var(--red); }
    .item-valor.destaque { color: var(--wave); }

    /* Concorrentes */
    .concorrentes-grid {
      display: flex; flex-direction: column; gap: 8px;
    }

    .concorrente-item {
      display: flex; align-items: center;
      justify-content: space-between; padding: 8px 0;
      border-bottom: 1px solid var(--shore);
    }
    .concorrente-item:last-child { border-bottom: none; }

    .conc-ticker {
      font-family: var(--mono); font-size: 11px;
      font-weight: 500; color: var(--wave);
      background: var(--foam); border-radius: 6px;
      padding: 2px 8px; flex-shrink: 0;
    }
    .conc-nome { font-size: 12px; color: var(--ink); flex: 1; margin: 0 10px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conc-preco { font-family: var(--mono); font-size: 11px; color: var(--ink); }
    .conc-var   { font-family: var(--mono); font-size: 10px; font-weight: 500; }
    .conc-var.pos { color: var(--green); }
    .conc-var.neg { color: var(--red); }

    /* Analistas */
    .analistas-bar {
      display: flex; border-radius: 6px; overflow: hidden;
      height: 10px; margin: 10px 0 6px;
    }
    .bar-compra  { background: var(--green); }
    .bar-neutro  { background: var(--sun); }
    .bar-venda   { background: var(--red); }

    .analistas-legenda {
      display: flex; gap: 14px;
    }
    .leg-item {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--mono); font-size: 9px; color: var(--muted);
    }
    .leg-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* Simulação renda fixa */
    .simulacao-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 10px; margin-top: 6px;
    }
    .sim-item {
      background: var(--sand); border-radius: 10px;
      padding: 10px; text-align: center;
    }
    .sim-prazo {
      font-family: var(--mono); font-size: 8px;
      letter-spacing: 1px; color: var(--muted); margin-bottom: 5px;
    }
    .sim-valor {
      font-family: var(--display); font-size: 15px;
      letter-spacing: 1px; color: var(--ink);
    }
    .sim-rend {
      font-family: var(--mono); font-size: 9px;
      color: var(--green); margin-top: 2px;
    }

    /* ── ANÁLISE GEMINI ── */
    .gemini-card {
      background: linear-gradient(135deg, #f0f3ff, var(--card));
      border: 1.5px solid var(--foam);
      border-radius: var(--radius); padding: 18px;
      margin-bottom: 12px; animation: fadeUp .3s ease;
    }

    .gemini-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }

    .gemini-badge {
      font-family: var(--mono); font-size: 8px; letter-spacing: 2px;
      background: var(--wave); color: white;
      border-radius: 20px; padding: 3px 10px;
    }

    .gemini-titulo {
      font-family: var(--display); font-size: 16px;
      letter-spacing: 2px; color: var(--wave);
    }

    .gemini-texto {
      font-size: 14px; line-height: 1.7; color: var(--ink);
      margin-bottom: 14px;
    }

    .gemini-lista { display: flex; flex-direction: column; gap: 8px; }

    .gemini-item {
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 13px; line-height: 1.5; color: var(--ink);
    }
    .gemini-item-icon { flex-shrink: 0; font-size: 15px; margin-top: 1px; }

    .gemini-loading {
      display: flex; flex-direction: column; gap: 8px;
    }
    .gemini-sk {
      height: 12px; border-radius: 4px;
      background: var(--foam); animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.4} }

    .gemini-aviso {
      font-family: var(--mono); font-size: 9px; letter-spacing: .5px;
      color: var(--muted); margin-top: 12px; line-height: 1.6;
      padding-top: 10px; border-top: 1px solid var(--foam);
    }

    /* ── BOTÃO INVESTIR ── */
    .btn-investir-wrap {
      position: fixed; bottom: 72px; left: 0; right: 0;
      padding: 10px 16px;
      background: linear-gradient(to top, var(--sand) 60%, transparent);
      z-index: 50;
    }

    .btn-investir {
      width: 100%; max-width: 640px; margin: 0 auto;
      height: 52px; display: flex;
      background: var(--wave); color: white;
      border: none; border-radius: 25px;
      font-family: var(--mono); font-size: 13px;
      font-weight: 500; letter-spacing: 1.5px;
      cursor: pointer; transition: all .2s;
      align-items: center; justify-content: center; gap: 10px;
    }
    .btn-investir:hover { background: #0033cc; transform: translateY(-1px); }
    .btn-investir:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 140px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink); color: white;
      font-family: var(--mono); font-size: 12px;
      letter-spacing: .5px; padding: 10px 22px;
      border-radius: 20px; opacity: 0; transition: all .3s;
      pointer-events: none; z-index: 9000; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── SKELETON GERAL ── */
    .sk-bloco {
      background: var(--card); border: 1.5px solid var(--shore);
      border-radius: var(--radius); padding: 18px; margin-bottom: 12px;
    }
    .sk-line {
      height: 12px; border-radius: 4px;
      background: var(--shore); animation: shimmer 1.4s infinite;
      margin-bottom: 10px;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: 64px;
      background: rgba(240,235,227,.92);
      backdrop-filter: blur(16px); border-top: 1.5px solid var(--shore);
      display: flex; justify-content: space-around; align-items: center;
      z-index: 100;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; cursor: pointer; padding: 6px 12px;
      border-radius: 10px; transition: all .2s;
      text-decoration: none; color: inherit;
    }
    .nav-item:hover { background: var(--shore); }
    .nav-icon { font-size: 20px; line-height: 1; }
    .nav-label {
      font-family: var(--mono); font-size: 9px;
      letter-spacing: 1.5px; color: var(--muted);
    }
    .nav-item.active-link .nav-label { color: var(--wave); font-weight: 500; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="feed-header">
    <button class="btn-voltar" onclick="history.back()">←</button>
    <div class="header-titulo" id="header-titulo">RELATÓRIO</div>
    <span class="header-tipo" id="header-tipo">···</span>
  </header>

  <div class="container" id="container-relatorio">

    <!-- Skeleton inicial -->
    <div id="skeleton-wrap">
      <div class="sk-bloco">
        <div class="sk-line" style="width:40%;height:30px"></div>
        <div class="sk-line" style="width:70%"></div>
        <div class="sk-line" style="width:50%"></div>
      </div>
      <div class="sk-bloco">
        <div class="sk-line" style="width:60%"></div>
        <div class="sk-line"></div>
        <div class="sk-line" style="width:80%"></div>
        <div class="sk-line" style="width:70%"></div>
      </div>
    </div>

    <!-- Conteúdo real (preenchido pelo JS) -->
    <div id="relatorio-conteudo" style="display:none"></div>

  </div>

  <!-- BOTÃO INVESTIR (fixo no rodapé) -->
  <div class="btn-investir-wrap" id="btn-investir-wrap" style="display:none">
    <button class="btn-investir" id="btn-investir" onclick="irParaOrdem()">
      📊 INVESTIR NESTE ATIVO
    </button>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a class="nav-item" href="feed.html">
      <span class="nav-icon">🏠</span><span class="nav-label">FEED</span>
    </a>
    <a class="nav-item active-link" href="investir.html">
      <span class="nav-icon">📈</span><span class="nav-label">INVESTIR</span>
    </a>
    <a class="nav-item" href="carteira.html">
      <span class="nav-icon">💼</span><span class="nav-label">CARTEIRA</span>
    </a>
    <a class="nav-item" href="feed.html#perfil">
      <span class="nav-icon">👤</span><span class="nav-label">PERFIL</span>
    </a>
  </nav>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="auth.js"></script>
  <script src="mercado-api.js"></script>

  <script>
    const GEMINI_KEY = "AIzaSyCdQ1MThqZ5Y1Ciir99U8u3vgLuSBJMj5Q";

    // Lê parâmetros da URL
    const params  = new URLSearchParams(window.location.search);
    const TICKER  = (params.get('ticker') || '').toUpperCase();
    const TIPO    = params.get('tipo') || 'acoes';

    // Estado global do relatório
    let dadosAtivo    = null;
    let dadosDetalhe  = null;
    let dadosHist1y   = null;
    let dadosHist6m   = null;
    let perfilUsuario = null;

    // ── TOAST ──
    let toastTimer;
    function mostrarToast(msg, dur = 3000) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), dur);
    }

    // ── INIT ──
    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) { window.location.href = 'invite.html'; return; }

      // Pega perfil do investidor
      const snap = await db.collection('usuarios').doc(user.uid).get();
      perfilUsuario = snap.data()?.perfil_investidor || 'moderado';

      // Se não tem ticker, mostra lista da categoria
      if (!TICKER) {
        await carregarListaCategoria();
        return;
      }

      // Tem ticker — carrega relatório completo
      await carregarRelatorio();
    });

    // ──────────────────────────────────────────
    //  LISTA DE CATEGORIA (sem ticker na URL)
    // ──────────────────────────────────────────
    async function carregarListaCategoria() {
      document.getElementById('header-titulo').textContent = nomeTipo(TIPO);
      document.getElementById('header-tipo').textContent = 'CATEGORIA';

      document.getElementById('skeleton-wrap').style.display = 'none';
      const conteudo = document.getElementById('relatorio-conteudo');
      conteudo.style.display = 'block';

      if (TIPO === 'tesouro') {
        await renderizarTesouro(conteudo);
      } else if (TIPO === 'cripto') {
        await renderizarListaCripto(conteudo);
      } else if (TIPO === 'cdb' || TIPO === 'lci') {
        renderizarRendaFixaInfo(conteudo);
      } else {
        await renderizarListaAcoes(conteudo);
      }
    }

    // ──────────────────────────────────────────
    //  RELATÓRIO COMPLETO DO ATIVO
    // ──────────────────────────────────────────
    async function carregarRelatorio() {
      document.getElementById('header-titulo').textContent = TICKER;
      document.getElementById('header-tipo').textContent = nomeTipo(TIPO);

      try {
        // Busca dados em paralelo
        [dadosAtivo, dadosDetalhe, dadosHist1y, dadosHist6m] = await Promise.all([
          MercadoAPI.buscarAtivo(TICKER),
          MercadoAPI.buscarDetalhadoAtivo(TICKER),
          MercadoAPI.buscarHistorico(TICKER, '1y'),
          MercadoAPI.buscarHistorico(TICKER, '6mo'),
        ]);

        // Esconde skeleton
        document.getElementById('skeleton-wrap').style.display = 'none';
        const conteudo = document.getElementById('relatorio-conteudo');
        conteudo.style.display = 'block';

        // Renderiza seções
        conteudo.innerHTML = '';
        conteudo.appendChild(renderizarHero());
        conteudo.appendChild(renderizarPrecoHistorico());
        conteudo.appendChild(renderizarFundamentos());

        if (TIPO === 'acoes' || TIPO === 'fiis') {
          const { setor, concorrentes } = MercadoAPI.obterConcorrentes(TICKER);
          if (concorrentes.length > 0) {
            conteudo.appendChild(await renderizarConcorrentes(setor, concorrentes));
          }
          conteudo.appendChild(renderizarAnalistas());
        }

        conteudo.appendChild(renderizarRiscos());

        // Gemini — análise inteligente
        const geminiEl = criarGeminiLoading();
        conteudo.appendChild(geminiEl);
        gerarAnaliseGemini(geminiEl);

        // Mostra botão de investir
        document.getElementById('btn-investir-wrap').style.display = 'block';

      } catch(e) {
        console.error('[Relatório]', e);
        document.getElementById('skeleton-wrap').innerHTML = `
          <div class="relatorio-secao">
            <p style="font-family:var(--mono);font-size:11px;color:var(--muted)">
              ⚠️ Não foi possível carregar os dados de ${TICKER}.<br>
              Verifique o ticker e tente novamente.
            </p>
          </div>`;
      }
    }

    // ──────────────────────────────────────────
    //  HERO — preço e variação
    // ──────────────────────────────────────────
    function renderizarHero() {
      const preco = dadosAtivo?.preco || dadosDetalhe?.preco || 0;
      const var_  = dadosAtivo?.variacao_pct || 0;
      const pos   = var_ >= 0;

      const hist1m = dadosHist1y?.historico?.slice(-22) || [];
      const var1m  = hist1m.length > 1
        ? ((hist1m[hist1m.length-1].preco - hist1m[0].preco) / hist1m[0].preco) * 100 : 0;

      const el = document.createElement('div');
      el.className = 'ativo-hero';
      el.innerHTML = `
        <div class="ativo-hero-top">
          <div>
            <p class="ativo-ticker">${TICKER}</p>
            <p class="ativo-nome">${dadosDetalhe?.descricao?.substring(0,80) || dadosAtivo?.nome || ''}</p>
          </div>
          <div class="ativo-preco-wrap">
            <p class="ativo-preco">R$ ${preco.toFixed(2)}</p>
            <p class="ativo-var ${pos ? 'pos' : 'neg'}">${MercadoAPI.pct(var_)} hoje</p>
          </div>
        </div>
        <div class="ativo-stats">
          <div class="stat-item">
            <span class="stat-label">MÍN 52 SEM</span>
            <span class="stat-valor">R$ ${(dadosDetalhe?.min_52s || 0).toFixed(2)}</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">MÁX 52 SEM</span>
            <span class="stat-valor">R$ ${(dadosDetalhe?.max_52s || 0).toFixed(2)}</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">1 MÊS</span>
            <span class="stat-valor ${var1m >= 0 ? 'pos' : 'neg'}">${MercadoAPI.pct(var1m)}</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">MÍN 6 MESES</span>
            <span class="stat-valor">R$ ${(dadosHist6m?.min_periodo || 0).toFixed(2)}</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">MÁX 6 MESES</span>
            <span class="stat-valor">R$ ${(dadosHist6m?.max_periodo || 0).toFixed(2)}</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">1 ANO</span>
            <span class="stat-valor ${(dadosHist1y?.variacao_periodo||0) >= 0 ? 'pos' : 'neg'}">${MercadoAPI.pct(dadosHist1y?.variacao_periodo || 0)}</span>
          </div>
        </div>`;
      return el;
    }

    // ──────────────────────────────────────────
    //  HISTÓRICO DE PREÇOS
    // ──────────────────────────────────────────
    function renderizarPrecoHistorico() {
      const hist = dadosHist1y?.historico || [];
      const preco_atual = dadosAtivo?.preco || 0;
      const media_50d   = dadosDetalhe?.media_50d || 0;
      const media_200d  = dadosDetalhe?.media_200d || 0;
      const acima_200   = preco_atual > media_200d;

      const el = document.createElement('div');
      el.className = 'relatorio-secao';
      el.innerHTML = `
        <p class="secao-titulo"><span class="secao-icone">📊</span> HISTÓRICO DE PREÇOS</p>
        ${itemRelatorio('Preço atual', MercadoAPI.R$(preco_atual))}

      window.location.href = `ordem.html?ticker=${encodeURIComponent(nome)}&tipo=tesouro&taxa=${taxa}&preco=${preco}`;

    // ──────────────────────────────────────────
    //  HELPERS
    // ──────────────────────────────────────────
    function itemRelatorio(label, valor, classe = '') {
      return `<div class="relatorio-item">
        <span class="item-label">${label}</span>
        <span class="item-valor ${classe}">${valor}</span>
      </div>`;
    }

    function nomeTipo(tipo) {
      const map = { acoes:'AÇÕES', fiis:'FIIs', cdb:'CDB', lci:'LCI/LCA', tesouro:'TESOURO DIRETO', cripto:'CRIPTO' };
      return map[tipo] || tipo.toUpperCase();
    }

    function iconeTesouro(tipo) {
      return tipo === 'selic' ? '📈' : tipo === 'ipca' ? '🏛️' : '🔒';
    }

    function traduzirRec(rec) {
      const map = { buy:'Compra', strongBuy:'Compra Forte', sell:'Venda', strongSell:'Venda Forte', hold:'Neutro' };
      return map[rec] || rec || '—';
    }
