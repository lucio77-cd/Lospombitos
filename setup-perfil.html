<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Perfil | Los Pombitos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#0d0d0d;--sand:#f0ebe3;--shore:#e2d9cd;--wave:#1a4fff;--foam:#c8d8ff;
      --sun:#f5b800;--muted:#8a8278;--card:#faf8f5;--green:#1a8a4a;--red:#cc2200;
      --radius:14px;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Bebas Neue',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--sand);color:var(--ink);min-height:100dvh;padding-bottom:90px;overscroll-behavior:none}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}

    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer{0%,100%{opacity:1}50%{opacity:.4}}

    /* HEADER */
    .hdr{position:sticky;top:0;z-index:100;background:var(--sand);border-bottom:1.5px solid var(--shore);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(12px)}
    .hdr-title{font-family:var(--display);font-size:22px;letter-spacing:2px;color:var(--ink)}
    .btn-edit{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--wave);background:var(--foam);border:none;border-radius:20px;padding:5px 12px;cursor:pointer}

    .container{padding:0;max-width:640px;margin:0 auto}

    /* ── HERO DO PERFIL ── */
    .perfil-hero{padding:24px 20px 0;animation:fadeUp .3s ease}
    .perfil-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px}

    /* Avatar */
    .avatar-wrap{position:relative;flex-shrink:0}
    .avatar{width:72px;height:72px;border-radius:50%;background:var(--wave);display:flex;align-items:center;justify-content:center;font-size:28px;border:3px solid var(--sand);box-shadow:0 0 0 2px var(--shore);overflow:hidden}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .avatar-perfil-badge{position:absolute;bottom:-2px;right:-2px;font-family:var(--mono);font-size:7px;letter-spacing:1px;background:var(--wave);color:white;border-radius:20px;padding:2px 6px;white-space:nowrap}

    /* Info */
    .perfil-info{flex:1;min-width:0}
    .perfil-nome{font-family:var(--display);font-size:24px;letter-spacing:2px;color:var(--ink);line-height:1;margin-bottom:2px}
    .perfil-username{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:8px}
    .perfil-bio{font-size:13px;color:var(--ink);line-height:1.5;opacity:.8}

    /* Stats linha */
    .perfil-stats{display:flex;gap:20px;padding:14px 0;border-top:1px solid var(--shore);border-bottom:1px solid var(--shore);margin-bottom:20px}
    .ps-item{display:flex;flex-direction:column;gap:2px}
    .ps-val{font-family:var(--display);font-size:18px;letter-spacing:1px;color:var(--ink)}
    .ps-val.pos{color:var(--green)}.ps-val.neg{color:var(--red)}
    .ps-label{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;color:var(--muted)}

    /* ── SEÇÃO ── */
    .secao{padding:0 20px;margin-bottom:20px;animation:fadeUp .3s ease}
    .secao-titulo{font-family:var(--display);font-size:14px;letter-spacing:2px;color:var(--muted);margin-bottom:12px}

    /* ── TREEMAP ALOCAÇÃO ── */
    .treemap-wrap{border-radius:var(--radius);overflow:hidden;background:var(--card);border:1.5px solid var(--shore)}
    .treemap-canvas{width:100%;display:block;border-radius:calc(var(--radius) - 2px)}
    .treemap-legend{display:flex;flex-wrap:wrap;gap:8px;padding:12px 14px;border-top:1px solid var(--shore)}
    .tl-item{display:flex;align-items:center;gap:5px}
    .tl-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
    .tl-label{font-family:var(--mono);font-size:9px;color:var(--muted)}
    .tl-pct{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--ink)}

    /* ── GRÁFICO GANHO/PERDA ── */
    .ganho-card{background:var(--card);border:1.5px solid var(--shore);border-radius:var(--radius);padding:16px}
    .ganho-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .ganho-total{font-family:var(--display);font-size:22px;letter-spacing:1px}
    .ganho-total.pos{color:var(--green)}.ganho-total.neg{color:var(--red)}
    .ganho-sub{font-family:var(--mono);font-size:8px;color:var(--muted)}
    .ganho-chart-wrap{height:80px;position:relative;margin-bottom:10px}
    canvas#ganho-chart{width:100%;height:80px}

    .pos-lista{display:flex;flex-direction:column;gap:6px;margin-top:10px}
    .pos-row{display:flex;align-items:center;gap:8px}
    .pos-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .pos-ticker-lbl{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--wave);flex:1}
    .pos-ganho{font-family:var(--mono);font-size:10px;font-weight:500}
    .pos-ganho.pos{color:var(--green)}.pos-ganho.neg{color:var(--red)}
    .pos-bar-wrap{flex:2;height:4px;background:var(--shore);border-radius:2px;overflow:hidden}
    .pos-bar-fill{height:100%;border-radius:2px}

    /* ── POSTS ── */
    .post-card{background:var(--card);border:1.5px solid var(--shore);border-radius:var(--radius);padding:16px;margin-bottom:10px;animation:fadeUp .3s ease}
    .post-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .post-avatar{width:32px;height:32px;border-radius:50%;background:var(--wave);display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden;flex-shrink:0}
    .post-avatar img{width:100%;height:100%;object-fit:cover}
    .post-meta-nome{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--ink)}
    .post-meta-data{font-family:var(--mono);font-size:9px;color:var(--muted)}
    .post-texto{font-size:14px;line-height:1.6;color:var(--ink);margin-bottom:10px}
    .post-likes{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--muted);cursor:pointer}

    /* Trade post */
    .trade-card{background:var(--card);border:1.5px solid var(--shore);border-radius:var(--radius);padding:16px;margin-bottom:10px;animation:fadeUp .3s ease}
    .trade-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .trade-lado{font-family:var(--mono);font-size:9px;letter-spacing:1px;padding:3px 10px;border-radius:20px}
    .trade-lado.c{background:#d4f5e2;color:var(--green)}.trade-lado.v{background:#ffd5ce;color:var(--red)}
    .trade-ticker{font-family:var(--display);font-size:20px;letter-spacing:2px;color:var(--wave)}
    .trade-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
    .tg-item{display:flex;flex-direction:column;gap:2px}
    .tg-label{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;color:var(--muted)}
    .tg-val{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--ink)}
    .trade-likes{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--muted);cursor:pointer;margin-top:4px}

    /* EMPTY */
    .empty{text-align:center;padding:30px 20px;color:var(--muted);font-family:var(--mono);font-size:10px;letter-spacing:1px}

    /* SKELETON */
    .sk-line{height:12px;border-radius:4px;background:var(--shore);animation:shimmer 1.4s infinite;margin-bottom:8px}

    /* NAV */
    .nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(240,235,227,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1.5px solid var(--shore);display:flex;justify-content:space-around;align-items:center;z-index:100}
    .ni{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 12px;border-radius:10px;transition:all .2s;text-decoration:none;color:inherit;-webkit-tap-highlight-color:transparent}
    .ni:hover{background:var(--shore)}
    .ni-ico{font-size:20px;line-height:1}
    .ni-lbl{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--muted)}
    .ni.on .ni-lbl{color:var(--wave);font-weight:500}
  </style>
</head>
<body>

    <div class="hdr-title">PERFIL</div>
    <button class="btn-edit" onclick="location.href='editar-perfil.html'">✏️ EDITAR</button>
  </header>

  <div class="container">

    <!-- HERO -->

          <span class="avatar-perfil-badge" id="badge-perfil">···</span>
        </div>

      <div class="perfil-stats" id="perfil-stats">

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="mercado-api.js"></script>
  <script>
  const CAPITAL = 500000;
  const CORES_ATIVOS = [
    '#1a4fff','#1a8a4a','#f5b800','#cc2200','#7c3aed',
    '#0891b2','#ea580c','#db2777','#65a30d','#c2410c'
  ];

  const R$ = v => 'R$ ' + (v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const Rk = v => {
    const a = Math.abs(v);
    if (a >= 1000) return (v<0?'-':'') + 'R$ ' + (a/1000).toFixed(0) + 'k';
    return R$(v);
  };
  const pct = v => (v>=0?'+':'')+v.toFixed(2)+'%';

  let db, meuUID, cotacoes = {}, posicoes = [], userData = {};

  firebase.auth().onAuthStateChanged(async user => {
    if (!user) { location.href = 'invite.html'; return; }
    meuUID = user.uid;
    db = window.db || firebase.firestore();
    await carregar();
  });

  async function carregar() {
    try {
      const [uSnap, cSnap] = await Promise.all([
        db.collection('usuarios').doc(meuUID).get(),
        db.collection('carteiras').doc(meuUID).get()
      ]);

      userData  = uSnap.data() || {};
      const c   = cSnap.exists ? cSnap.data() : {};
      posicoes  = c.posicoes || [];

      // Busca cotações
      const tickers = posicoes.filter(p=>p.tipo==='acoes'||p.tipo==='fiis'||!p.tipo).map(p=>p.ticker);
      if (tickers.length) {
        try {
          const dados = await MercadoAPI.buscarMultiplos(tickers);
          dados.forEach(d => { if(d.preco>0) cotacoes[d.ticker]=d.preco; });
        } catch(e){}
      }

      renderHero();
      renderAlocacao();
      renderGanho();
      renderPosts();

    } catch(e) {
      console.error(e);
    }
  }

  // ── HERO ──
  function renderHero() {
    const nome   = userData.nome     || 'Pombito';
    const user   = userData.username || '···';
    const musica = userData.musica   || '';
    const filme  = userData.filme    || '';
    const perfil = userData.perfil_investidor || 'moderado';
    const cor    = resolverCor(userData.cor || '');

    document.getElementById('p-nome').textContent     = nome;
    document.getElementById('p-username').textContent = '@' + user;

    // Bio montada a partir dos campos
    const bioPartes = [];
    if (musica) bioPartes.push('🎵 ' + musica);
    if (filme)  bioPartes.push('🎬 ' + filme);
    document.getElementById('p-bio').textContent = bioPartes.join('  ·  ') || '—';

    // Avatar com cor do pombito
    const avatarEl = document.getElementById('avatar-el');
    avatarEl.style.background = cor || 'var(--wave)';
    avatarEl.innerHTML = `<span style="font-size:28px">🐦</span>`;

    // Badge perfil
    const badges = {conservador:'🛡️ CONSERV.', moderado:'⚖️ MODERADO', arrojado:'🚀 ARROJADO'};
    document.getElementById('badge-perfil').textContent = badges[perfil] || perfil.toUpperCase();

    // Stats
    const totalPago      = posicoes.reduce((acc,p) => acc+(p.quantidade||0)*(p.preco_medio||0), 0);
    const investidoReal  = posicoes.reduce((acc,p) => {
      const pa = cotacoes[p.ticker] || p.preco_medio || 0;
      return acc + (p.quantidade||0)*pa;
    }, 0);
    const saldo      = CAPITAL - totalPago;
    const patrimonio = saldo + investidoReal;
    const resultado  = patrimonio - CAPITAL;
    const rentab     = (resultado/CAPITAL)*100;
    const isPos      = resultado >= 0;

    document.getElementById('st-patrimonio').textContent = Rk(patrimonio);
    const resEl = document.getElementById('st-resultado');
    resEl.textContent  = (isPos?'+':'')+Rk(resultado);
    resEl.className    = 'ps-val ' + (isPos?'pos':'neg');
    document.getElementById('st-ativos').textContent = posicoes.length;
    // posts serão preenchidos depois
  }

  // ── TREEMAP ALOCAÇÃO ──
  function renderAlocacao() {
    if (!posicoes.length) return;
    document.getElementById('sec-alocacao').style.display = 'block';

    const totalPago     = posicoes.reduce((acc,p)=>acc+(p.quantidade||0)*(p.preco_medio||0),0);
    const investidoReal = posicoes.reduce((acc,p)=>{
      const pa=cotacoes[p.ticker]||p.preco_medio||0;
      return acc+(p.quantidade||0)*pa;
    },0);
    const saldo = CAPITAL - totalPago;
    const patrimonio = saldo + investidoReal;

    // Itens para treemap: cada posição + disponível
    const itens = posicoes.map((p,i) => {
      const pa  = cotacoes[p.ticker] || p.preco_medio || 0;
      const val = (p.quantidade||0) * pa;
      return { label: p.ticker, valor: val, pct: val/patrimonio*100, cor: CORES_ATIVOS[i % CORES_ATIVOS.length] };
    });
    if (saldo > 0) {
      itens.push({ label:'DISPONÍVEL', valor: saldo, pct: saldo/patrimonio*100, cor: '#e2d9cd' });
    }
    itens.sort((a,b) => b.valor - a.valor);

    const canvas = document.getElementById('treemap-canvas');
    const dpr    = window.devicePixelRatio || 1;
    const W      = canvas.parentElement.offsetWidth;
    const H      = Math.max(140, Math.min(200, W * 0.5));
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    desenharTreemap(ctx, itens, 0, 0, W, H);

    // Legenda
    const leg = document.getElementById('treemap-legend');
    leg.innerHTML = '';
    itens.forEach(it => {
      const div = document.createElement('div');
      div.className = 'tl-item';
      div.innerHTML = `<div class="tl-dot" style="background:${it.cor}"></div><span class="tl-label">${it.label}</span><span class="tl-pct">${it.pct.toFixed(1)}%</span>`;
      leg.appendChild(div);
    });
  }

  // Algoritmo squarified treemap simplificado
  function desenharTreemap(ctx, itens, x, y, w, h) {
    if (!itens.length) return;
    const total = itens.reduce((s,i)=>s+i.pct, 0);
    let restX = x, restY = y, restW = w, restH = h;

    let fila = [];
    const itensOrdenados = [...itens];

    function areaItem(it) { return (it.pct / total) * (w * h); }
    function aspecto(fila, tamanho) {
      const totalPct = fila.reduce((s,i)=>s+i.pct,0);
      return fila.map(it => {
        const area = (it.pct/totalPct)*tamanho;
        const lado = Math.sqrt(area);
        return Math.max(tamanho/lado, lado/tamanho);
      });
    }

    let i = 0;
    while (i < itensOrdenados.length) {
      const horizontal = restW >= restH;
      const tamanho    = horizontal ? restW * restH : restH * restW;
      const novaPct    = itensOrdenados[i].pct;

      fila.push(itensOrdenados[i]);
      i++;

      // Verifica se melhor parar
      const aspAtual  = Math.max(...aspecto(fila, tamanho));
      const proxFila  = i < itensOrdenados.length ? [...fila, itensOrdenados[i]] : null;
      const aspProx   = proxFila ? Math.max(...aspecto(proxFila, tamanho)) : Infinity;

      if (aspProx >= aspAtual || i >= itensOrdenados.length) {
        // Renderiza fila
        const filaTotalPct = fila.reduce((s,f)=>s+f.pct,0);
        let cx = restX, cy = restY;

        if (horizontal) {
          const colW = (filaTotalPct / total) * restW;
          fila.forEach(it => {
            const ih = (it.pct / filaTotalPct) * restH;
            desenharCelula(ctx, cx, cy, colW, ih, it);
            cy += ih;
          });
          restX += colW; restW -= colW;
        } else {
          const rowH = (filaTotalPct / total) * restH;
          fila.forEach(it => {
            const iw = (it.pct / filaTotalPct) * restW;
            desenharCelula(ctx, cx, cy, iw, rowH, it);
            cx += iw;
          });
          restY += rowH; restH -= rowH;
        }
        fila = [];
      }
    }
  }

  function desenharCelula(ctx, x, y, w, h, it) {
    const gap = 2;
    ctx.fillStyle = it.cor;
    ctx.fillRect(x+gap, y+gap, w-gap*2, h-gap*2);

    // Label se tiver espaço
    if (w > 40 && h > 22) {
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.font = `bold ${Math.min(11, w/5)}px DM Mono, monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const cx = x + w/2, cy = y + h/2;
      ctx.fillText(it.label, cx, h > 36 ? cy - 6 : cy);
      if (h > 36) {
        ctx.font = `${Math.min(9, w/6)}px DM Mono, monospace`;
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillText(it.pct.toFixed(1)+'%', cx, cy + 9);
      }
    }
  }

  // ── GANHO / PERDA POR ATIVO ──
  function renderGanho() {
    if (!posicoes.length) return;
    document.getElementById('sec-ganho').style.display = 'block';

    const totalPago     = posicoes.reduce((acc,p)=>acc+(p.quantidade||0)*(p.preco_medio||0),0);
    const investidoReal = posicoes.reduce((acc,p)=>{
      const pa=cotacoes[p.ticker]||p.preco_medio||0;
      return acc+(p.quantidade||0)*pa;
    },0);
    const saldo     = CAPITAL - totalPago;
    const patrimonio = saldo + investidoReal;
    const resultado  = patrimonio - CAPITAL;
    const rentab     = (resultado/CAPITAL)*100;
    const isPos      = resultado >= 0;

    const totalEl = document.getElementById('ganho-total');
    totalEl.textContent = (isPos?'+':'')+R$(resultado);
    totalEl.className   = 'ganho-total ' + (isPos?'pos':'neg');
    const pctEl = document.getElementById('ganho-pct');
    pctEl.textContent = pct(rentab);
    pctEl.style.color = isPos ? 'var(--green)' : 'var(--red)';

    // Por ativo
    const lista = document.getElementById('pos-lista');
    lista.innerHTML = '';

    const porAtivo = posicoes.map((p,i) => {
      const pa      = cotacoes[p.ticker] || p.preco_medio || 0;
      const valAtual = (p.quantidade||0)*pa;
      const valPago  = (p.quantidade||0)*(p.preco_medio||0);
      const ganho    = valAtual - valPago;
      const ganhoP   = valPago > 0 ? (ganho/valPago)*100 : 0;
      return { ticker:p.ticker, ganho, ganhoP, cor: CORES_ATIVOS[i % CORES_ATIVOS.length], valAtual };
    }).sort((a,b) => b.ganho - a.ganho);

    const maxAbs = Math.max(...porAtivo.map(p=>Math.abs(p.ganho)), 1);

    porAtivo.forEach(p => {
      const ip  = p.ganho >= 0;
      const row = document.createElement('div');
      row.className = 'pos-row';
      row.style.cursor = 'pointer';
      row.onclick = () => location.href = `relatorio.html?ticker=${p.ticker}`;
      const barPct = (Math.abs(p.ganho) / maxAbs * 100).toFixed(1);
      row.innerHTML = `
        <div class="pos-dot" style="background:${p.cor}"></div>
        <span class="pos-ticker-lbl">${p.ticker}</span>
        <div class="pos-bar-wrap">
          <div class="pos-bar-fill" style="width:${barPct}%;background:${ip?'var(--green)':'var(--red)'}"></div>
        </div>
        <span class="pos-ganho ${ip?'pos':'neg'}">${ip?'+':''}${Rk(p.ganho)}</span>`;
      lista.appendChild(row);
    });
  }

  // ── POSTS DO USUÁRIO ──
  async function renderPosts() {
    const listEl = document.getElementById('posts-list');
    try {
      const snap = await db.collection('posts')
        .where('uid','==',meuUID)
        .orderBy('criadoEm','desc')
        .limit(20)
        .get();

      document.getElementById('st-posts').textContent = snap.size;

      if (snap.empty) {
        listEl.innerHTML = '<div class="empty">📭 Nenhum post ainda.</div>';
        return;
      }

      listEl.innerHTML = '';
      snap.forEach(doc => {
        const p = doc.data();
        const data = p.criadoEm?.toDate
          ? p.criadoEm.toDate().toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})
          : '—';

        if (p.tipo === 'trade' && p.trade) {
          // Card de trade
          const isC = p.trade.lado === 'compra';
          const card = document.createElement('div');
          card.className = 'trade-card';
          card.innerHTML = `
            <div class="trade-header">
              <div style="display:flex;align-items:center;gap:10px">
                <div class="post-avatar" style="background:${resolverCor(userData.cor||'')||'var(--wave)'}">🐦</div>
                <div>
                  <p class="post-meta-nome">@${userData.username||'eu'}</p>
                  <p class="post-meta-data">${data}</p>
                </div>
              </div>
              <span class="trade-lado ${isC?'c':'v'}">${isC?'✅ COMPRA':'🔴 VENDA'}</span>
            </div>
            <p class="trade-ticker">${p.trade.ticker}</p>
            <div class="trade-grid">
              <div class="tg-item"><span class="tg-label">QUANTIDADE</span><span class="tg-val">${p.trade.quantidade}</span></div>
              <div class="tg-item"><span class="tg-label">PREÇO</span><span class="tg-val">R$ ${(p.trade.preco||0).toFixed(2)}</span></div>
              <div class="tg-item"><span class="tg-label">TOTAL</span><span class="tg-val">${R$(p.trade.total||0)}</span></div>
            </div>
            ${p.texto ? `<p style="font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:8px">${p.texto}</p>` : ''}
            <div class="trade-likes">❤️ ${p.likes||0}</div>`;
          listEl.appendChild(card);
        } else {
          // Post de texto
          const card = document.createElement('div');
          card.className = 'post-card';
          card.innerHTML = `
            <div class="post-header">
              <div class="post-avatar" style="background:${resolverCor(userData.cor||'')||'var(--wave)'}">🐦</div>
              <div>
                <p class="post-meta-nome">@${userData.username||'eu'}</p>
                <p class="post-meta-data">${data}</p>
              </div>
            </div>
            <p class="post-texto">${p.texto||''}</p>
            <div class="post-likes">❤️ ${p.likes||0}</div>`;
          listEl.appendChild(card);
        }
      });

    } catch(e) {
      // Fallback sem orderBy
      try {
        const snap = await db.collection('posts').where('uid','==',meuUID).limit(20).get();
        document.getElementById('st-posts').textContent = snap.size;
        if (snap.empty) { listEl.innerHTML = '<div class="empty">📭 Nenhum post ainda.</div>'; return; }
        listEl.innerHTML = '';
        const posts = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.criadoEm?.seconds||0)-(a.criadoEm?.seconds||0));
        posts.forEach(p => {
          const card = document.createElement('div');
          card.className = 'post-card';
          card.innerHTML = `
            <div class="post-header">
              <div class="post-avatar" style="background:${resolverCor(userData.cor||'')||'var(--wave)'}">🐦</div>
              <div><p class="post-meta-nome">@${userData.username||'eu'}</p></div>
            </div>
            <p class="post-texto">${p.texto||p.trade?.ticker||'—'}</p>
            <div class="post-likes">❤️ ${p.likes||0}</div>`;
          listEl.appendChild(card);
        });
      } catch(e2) {
        listEl.innerHTML = '<div class="empty">⚠️ Erro ao carregar posts.</div>';
        document.getElementById('st-posts').textContent = '—';
      }
    }
  }

  // ── COR TEXT → HEX ──
  function resolverCor(texto) {
    const mapa = {
      'azul':'#1a4fff','azul celeste':'#87ceeb','azul mar':'#006994',
      'verde':'#2d8a4e','verde mar':'#2e8b57','verde limão':'#9acd32',
      'vermelho':'#cc2200','rosa':'#e75480','roxo':'#6a0dad',
      'laranja':'#e86a1a','amarelo':'#f5b800','preto':'#1a1a2e',
      'branco':'#f2ead8','dourado':'#c9a84c','cinza':'#6b6b6b',
      'marrom':'#7a4e2d','bege':'#d4b896','ciano':'#00b4d8',
      'violeta':'#7c3aed','turquesa':'#40e0d0','coral':'#ff6b6b',
    };
    return mapa[texto.toLowerCase().trim()] || null;
  }
