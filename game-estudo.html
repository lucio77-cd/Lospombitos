<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Game | Los Pombitos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#170f28;--sand:#f5f2fb;--shore:#e3d9f5;--wave:#5b2a99;--foam:#ece0fa;
      --sun:#c9962e;--muted:#756c86;--card:#ffffff;--green:#128a55;--red:#c62828;
      --radius:14px;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Bebas Neue',sans-serif
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--sand);color:var(--ink);min-height:100dvh;padding-bottom:90px}

    .hdr{position:sticky;top:0;z-index:100;background:var(--sand);border-bottom:1.5px solid var(--shore);padding:0 20px;height:58px;display:flex;align-items:center;gap:14px}
    .hdr-title{font-family:var(--display);font-size:22px;letter-spacing:2px;flex:1}
    .hdr-sub{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--muted)}

    .container{padding:16px 14px;max-width:640px;margin:0 auto}

    .conquistas-card{background:linear-gradient(135deg,var(--wave),#3d1a70);border-radius:var(--radius);padding:18px 20px;margin-bottom:18px;color:#fff;position:relative;overflow:hidden}
    .conquistas-card::before{content:'POMBITOS';position:absolute;right:-14px;top:50%;transform:translateY(-50%);font-family:var(--display);font-size:56px;color:rgba(255,255,255,.06);pointer-events:none}
    .conquistas-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;opacity:.75;margin-bottom:8px}
    .conquistas-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;min-height:26px}
    .badge-pill{font-family:var(--mono);font-size:10px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:5px 12px}
    .conquistas-vazio{font-family:var(--sans);font-size:11.5px;opacity:.65}

    .trilha{display:flex;flex-direction:column;gap:0}
    .no-etapa{display:flex;gap:14px;position:relative;padding-bottom:22px}
    .no-etapa:last-child{padding-bottom:0}
    .no-etapa::before{content:'';position:absolute;left:23px;top:48px;bottom:0;width:2px;background:var(--shore)}
    .no-etapa:last-child::before{display:none}

    .no-selo{flex-shrink:0;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-family:var(--display);z-index:1;position:relative}
    .no-selo.concluida{background:var(--sun);color:#fff;box-shadow:0 0 0 4px #f5e6c4}
    .no-selo.disponivel{background:var(--wave);color:#fff;box-shadow:0 0 0 4px var(--foam);animation:pulso 2s ease-in-out infinite}
    .no-selo.bloqueada{background:var(--shore);color:var(--muted)}
    @keyframes pulso{0%,100%{box-shadow:0 0 0 4px var(--foam)}50%{box-shadow:0 0 0 8px var(--foam)}}

    .no-card{flex:1;background:var(--card);border:1.5px solid var(--shore);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:transform .15s,border-color .15s}
    .no-card.disponivel{border-color:var(--wave)}
    .no-card.bloqueada{opacity:.55;cursor:default}
    .no-card:active:not(.bloqueada){transform:scale(.98)}

    .no-titulo{font-family:var(--display);font-size:17px;letter-spacing:1px;margin-bottom:2px}
    .no-periodo{font-family:var(--mono);font-size:9.5px;color:var(--muted);letter-spacing:.5px;margin-bottom:8px}
    .no-resultado{font-family:var(--mono);font-size:11px;font-weight:500}
    .no-resultado.pos{color:var(--green)}
    .no-resultado.neg{color:var(--red)}
    .no-status{font-family:var(--mono);font-size:9.5px;letter-spacing:1px;color:var(--muted)}
    .no-cadeado{font-family:var(--mono);font-size:9.5px;letter-spacing:1px;color:var(--muted);display:flex;align-items:center;gap:5px}

    .skel{background:var(--card);border:1.5px solid var(--shore);border-radius:var(--radius);padding:16px;margin-bottom:12px}
    .sk-line{height:12px;background:var(--shore);border-radius:6px;margin-bottom:8px;animation:pulse 1.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

    .sidebar{display:none}
    .nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1.5px solid var(--shore);display:flex;z-index:100}
    .ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 0;text-decoration:none;color:var(--muted)}
    .ni.on{color:var(--wave)}
    .ni-ico{font-size:18px}
    .ni-lbl{font-family:var(--mono);font-size:8px;letter-spacing:1px}

    @media (min-width:1024px){
      body{padding-bottom:0;display:flex}
      .sidebar{display:flex;flex-direction:column;width:220px;background:var(--card);border-right:1.5px solid var(--shore);padding:20px 14px;height:100dvh;position:sticky;top:0}
      .sidebar-brand{font-family:var(--display);font-size:22px;letter-spacing:2px;margin-bottom:24px;padding:0 8px}
      .sidebar-nav{display:flex;flex-direction:column;gap:2px}
      .sni{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;text-decoration:none;color:var(--muted);font-family:var(--mono);font-size:12px;letter-spacing:.5px}
      .sni.on{background:var(--foam);color:var(--wave);font-weight:500}
      .app-main{flex:1;min-width:0}
      .nav{display:none}
      .container{max-width:720px;padding:24px 32px}
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand">POMBITOS</div>
    <nav class="sidebar-nav">
      <a class="sni" href="feed.html"><span class="sni-ico">🏠</span>FEED</a>
      <a class="sni" href="investir.html"><span class="sni-ico">📈</span>INVESTIR</a>
      <a class="sni" href="atlas.html"><span class="sni-ico">🔭</span>ATLAS</a>
      <a class="sni" href="carteira.html"><span class="sni-ico">💼</span>CARTEIRA</a>
      <a class="sni on" href="game-estudo.html"><span class="sni-ico">🎮</span>GAME</a>
      <a class="sni" href="perfil.html"><span class="sni-ico">👤</span>PERFIL</a>
    </nav>
  </aside>

  <div class="app-main">
  <header class="hdr">
    <div>
      <div class="hdr-title">GAME</div>
      <div class="hdr-sub">SIMULADOR HISTÓRICO · IBOVESPA 2015–2025</div>
    </div>
  </header>

  <div class="container">

    <div class="conquistas-card">
      <p class="conquistas-label">🏆 SUAS CONQUISTAS</p>
      <div class="conquistas-row" id="conquistas-row">
        <span class="conquistas-vazio">Ainda nenhuma — comece pela primeira etapa abaixo.</span>
      </div>
    </div>

    <div id="trilha-loading">
      <div class="skel"><div class="sk-line" style="width:50%"></div><div class="sk-line" style="width:70%"></div></div>
      <div class="skel"><div class="sk-line" style="width:50%"></div><div class="sk-line" style="width:70%"></div></div>
      <div class="skel"><div class="sk-line" style="width:50%"></div><div class="sk-line" style="width:70%"></div></div>
    </div>

    <div class="trilha" id="trilha" style="display:none"></div>

  </div>

  <nav class="nav">
    <a class="ni" href="feed.html"><span class="ni-ico">🏠</span><span class="ni-lbl">FEED</span></a>
    <a class="ni" href="investir.html"><span class="ni-ico">📈</span><span class="ni-lbl">INVESTIR</span></a>
    <a class="ni" href="atlas.html"><span class="ni-ico">🔭</span><span class="ni-lbl">ATLAS</span></a>
    <a class="ni" href="carteira.html"><span class="ni-ico">💼</span><span class="ni-lbl">CARTEIRA</span></a>
    <a class="ni on" href="game-estudo.html"><span class="ni-ico">🎮</span><span class="ni-lbl">GAME</span></a>
    <a class="ni" href="perfil.html"><span class="ni-ico">👤</span><span class="ni-lbl">PERFIL</span></a>
  </nav>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="auth.js"></script>
  <script>
    let db, meuUID;

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) return; // auth.js já cuida do redirect pra invite.html
      meuUID = user.uid;
      db = firebase.firestore();
      await carregarTrilha();
    });

    const NOMES_META = {
      retorno_pct: (v) => `Termine com retorno ≥ ${v}%`,
      perda_maxima: (v) => `Não perca mais que ${v}% do patrimônio`,
      bater_ibovespa: () => `Supere o retorno do Ibovespa no período`,
      retorno_pct_e_bater_ibovespa: (v) => `Retorno ≥ ${v}% E supere o Ibovespa`,
      livre: () => `Sem meta fixa — jogue pelo ranking geral`,
    };

    function formatarPeriodo(ini, fim) {
      const f = (iso) => {
        const [ano, mes] = iso.split('-');
        const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
        return `${meses[Number(mes) - 1]}/${ano}`;
      };
      return `${f(ini)} – ${f(fim)}`;
    }

    async function carregarTrilha() {
      try {
        const [etapasSnap, progressoSnap] = await Promise.all([
          db.collection('etapas').orderBy('ordem').get(),
          db.collection('progresso_jogo')
            .where('uid', '==', meuUID)
            .get()
            .catch(() => ({ docs: [] })),
        ]);

        const etapas = etapasSnap.docs.map(d => ({ id: d.id, ...d.data() }));

        const progressoPorEtapa = {};
        progressoSnap.docs.forEach(d => {
          const p = d.data();
          progressoPorEtapa[p.etapa_id] = p;
        });

        if (!etapas.length) {
          document.getElementById('trilha-loading').innerHTML =
            `<div class="skel">Nenhuma etapa encontrada ainda — rode o script <b>etl/05-seed-etapas.js</b> pra popular a coleção <b>etapas</b>.</div>`;
          return;
        }

        renderConquistas(etapas, progressoPorEtapa);
        renderTrilha(etapas, progressoPorEtapa);

      } catch (e) {
        console.error('[game-estudo]', e);
        document.getElementById('trilha-loading').innerHTML =
          `<div class="skel">⚠️ Erro ao carregar as etapas.<br><span style="opacity:.6">${e.message}</span></div>`;
      }
    }

    function renderConquistas(etapas, progressoPorEtapa) {
      const badges = [];
      etapas.forEach(e => {
        const p = progressoPorEtapa[e.id];
        if (p?.status === 'concluida' && e.premio) {
          if (e.premio.badge) badges.push(`🏅 ${e.premio.badge}`);
          if (e.premio.titulo) badges.push(`👑 ${e.premio.titulo}`);
        }
      });

      const row = document.getElementById('conquistas-row');
      row.innerHTML = badges.length
        ? badges.map(b => `<span class="badge-pill">${b}</span>`).join('')
        : `<span class="conquistas-vazio">Ainda nenhuma — comece pela primeira etapa abaixo.</span>`;
    }

    function renderTrilha(etapas, progressoPorEtapa) {
      document.getElementById('trilha-loading').style.display = 'none';
      const trilha = document.getElementById('trilha');
      trilha.style.display = 'flex';

      // Uma etapa está disponível se: é a primeira, OU a anterior (por
      // `ordem`) já foi concluída. "Modo Livre" tem regra própria
      // (requer_etapas_concluidas), verificada à parte.
      let anteriorConcluida = true;

      trilha.innerHTML = etapas.map((etapa, i) => {
        const p = progressoPorEtapa[etapa.id];
        const concluida = p?.status === 'concluida';

        let disponivel;
        if (etapa.requer_etapas_concluidas) {
          disponivel = etapa.requer_etapas_concluidas.every(
            id => progressoPorEtapa[id]?.status === 'concluida'
          );
        } else {
          disponivel = anteriorConcluida;
        }

        const estado = concluida ? 'concluida' : (disponivel ? 'disponivel' : 'bloqueada');
        anteriorConcluida = concluida; // pra próxima iteração (progressão sequencial)

        const selo = estado === 'concluida' ? '✓' : (estado === 'bloqueada' ? '🔒' : (i + 1));

        let statusHtml;
        if (estado === 'concluida') {
          const retorno = p.retorno_atual_pct ?? 0;
          const cls = retorno >= 0 ? 'pos' : 'neg';
          statusHtml = `<p class="no-resultado ${cls}">${retorno >= 0 ? '+' : ''}${retorno.toFixed(1)}% de retorno — concluída ✓</p>`;
        } else if (estado === 'disponivel') {
          statusHtml = p?.status === 'em_andamento'
            ? `<p class="no-status">▶ Em andamento — toque pra continuar</p>`
            : `<p class="no-status">Disponível — toque pra começar</p>`;
        } else {
          statusHtml = `<p class="no-cadeado">🔒 Conclua a etapa anterior pra destravar</p>`;
        }

        return `
          <div class="no-etapa">
            <div class="no-selo ${estado}">${selo}</div>
            <div class="no-card ${estado}" ${estado !== 'bloqueada' ? `onclick="location.href='etapa.html?id=${etapa.id}'"` : ''}>
              <p class="no-titulo">${etapa.nome}</p>
              <p class="no-periodo">${formatarPeriodo(etapa.data_inicio_simulada, etapa.data_fim_simulada)} · ${NOMES_META[etapa.meta_tipo]?.(etapa.meta_valor) || ''}</p>
              ${statusHtml}
            </div>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
