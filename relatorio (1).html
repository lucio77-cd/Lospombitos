<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Relatório | Los Pombitos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:#170f28; --sand:#f5f2fb; --shore:#e3d9f5; --wave:#5b2a99;
      --foam:#ece0fa; --sun:#c9962e; --coral:#ff5533; --muted:#756c86;
      --card:#ffffff; --green:#128a55; --red:#c62828; --radius:14px;
      --mono:'DM Mono',monospace; --sans:'DM Sans',sans-serif; --display:'Bebas Neue',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--sans);background:var(--sand);color:var(--ink);min-height:100dvh;padding-bottom:120px;overscroll-behavior:none}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}

    /* HEADER */
    .feed-header{position:sticky;top:0;z-index:100;background:var(--sand);border-bottom:1.5px solid var(--shore);padding:0 20px;height:58px;display:flex;align-items:center;gap:14px;backdrop-filter:blur(12px)}
    .btn-voltar{background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink);padding:4px;display:flex;align-items:center}
    .header-titulo{font-family:var(--display);font-size:22px;letter-spacing:2px;color:var(--ink);flex:1}
    .header-tipo{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--muted);background:var(--shore);border-radius:20px;padding:4px 10px}

    .container{padding:20px 16px;max-width:640px;margin:0 auto}

    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer{0%,100%{opacity:1}50%{opacity:.4}}

    /* SKELETON */
    .sk-bloco{background:var(--card);border:1.5px solid var(--shore);border-radius:var(--radius);padding:18px;margin-bottom:12px}
    .sk-line{height:12px;border-radius:4px;background:var(--shore);animation:shimmer 1.4s infinite;margin-bottom:10px}

    /* SEÇÃO GENÉRICA */
    .relatorio-secao{background:var(--card);border:1.5px solid var(--shore);border-radius:var(--radius);padding:18px;margin-bottom:12px;animation:fadeUp .3s ease}
    .relatorio-secao:hover{border-color:var(--foam)}
    .secao-titulo{font-family:var(--display);font-size:16px;letter-spacing:2px;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .relatorio-item{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--shore)}
    .relatorio-item:last-child{border-bottom:none}
    .item-label{font-family:var(--mono);font-size:10px;color:var(--muted);flex:1}
    .item-valor{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--ink);text-align:right}
    .item-valor.pos{color:var(--green)}.item-valor.neg{color:var(--red)}

    /* HERO */
    .ativo-hero{background:var(--card);border:1.5px solid var(--shore);border-radius:var(--radius);padding:20px;margin-bottom:12px;animation:fadeUp .3s ease}
    .ativo-hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
    .ativo-ticker{font-family:var(--display);font-size:36px;letter-spacing:3px;color:var(--wave);line-height:1}
    .ativo-nome{font-size:12px;color:var(--muted);margin-top:4px}
    .ativo-preco{font-family:var(--display);font-size:30px;letter-spacing:2px;color:var(--ink);line-height:1;text-align:right}
    .ativo-var{font-family:var(--mono);font-size:12px;font-weight:500;margin-top:4px;text-align:right;padding:3px 10px;border-radius:20px;display:inline-block}
    .ativo-var.pos{color:var(--green);background:#d4f5e2}.ativo-var.neg{color:var(--red);background:#ffd5ce}

    /* FAIXA 52 SEMANAS */
    .range-wrap{margin:16px 0 4px}
    .range-label-row{display:flex;justify-content:space-between;margin-bottom:6px}
    .range-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px}
    .range-bar{position:relative;height:6px;background:var(--shore);border-radius:3px;margin-bottom:4px}
    .range-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--sun))}
    .range-dot{position:absolute;top:50%;width:12px;height:12px;background:var(--wave);border:2px solid white;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 2px 4px rgba(0,0,0,.2)}
    .range-val-row{display:flex;justify-content:space-between}
    .range-val{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--ink)}

    /* GRID DE STATS */
    .stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding-top:14px;border-top:1px solid var(--shore)}
    .stat-bloco{background:var(--sand);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:3px}
    .stat-label{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;color:var(--muted)}
    .stat-valor{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--ink)}
    .stat-valor.pos{color:var(--green)}.stat-valor.neg{color:var(--red)}

    /* GRÁFICO MINI */
    .mini-chart-wrap{margin:14px 0 6px;height:70px;position:relative}
    canvas.mini-chart{width:100%;height:70px}

    /* FUNDAMENTOS — grade visual */
    .fund-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
    .fund-item{background:var(--sand);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:4px}
    .fund-label{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;color:var(--muted)}
    .fund-valor{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--ink)}
    .fund-valor.pos{color:var(--green)}.fund-valor.neg{color:var(--red)}
    .fund-sub{font-family:var(--mono);font-size:8px;color:var(--muted)}

    /* ANALISTAS */
    .analistas-bar{display:flex;border-radius:6px;overflow:hidden;height:10px;margin:10px 0 6px}
    .bar-c{background:var(--green)}.bar-n{background:var(--sun)}.bar-v{background:var(--red)}
    .analistas-leg{display:flex;gap:14px}
    .leg-item{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--muted)}
    .leg-dot{width:8px;height:8px;border-radius:50%}

    /* CONCORRENTES */
    .conc-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--shore);cursor:pointer;transition:opacity .2s}
    .conc-item:last-child{border-bottom:none}
    .conc-item:hover{opacity:.7}
    .conc-ticker{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--wave);background:var(--foam);border-radius:6px;padding:2px 8px;flex-shrink:0}
    .conc-nome{font-size:12px;color:var(--ink);flex:1;margin:0 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .conc-preco{font-family:var(--mono);font-size:11px;color:var(--ink)}
    .conc-var{font-family:var(--mono);font-size:10px;font-weight:500;margin-left:6px}
    .conc-var.pos{color:var(--green)}.conc-var.neg{color:var(--red)}

    /* IA CARD */
    .ia-card{background:linear-gradient(135deg,#eef2ff,var(--card));border:1.5px solid var(--foam);border-radius:var(--radius);padding:18px;margin-bottom:12px;animation:fadeUp .3s ease}
    .ia-badge{font-family:var(--mono);font-size:8px;letter-spacing:2px;background:var(--wave);color:white;border-radius:20px;padding:3px 10px}
    .ia-titulo{font-family:var(--display);font-size:16px;letter-spacing:2px;color:var(--wave)}
    .ia-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .ia-sk{height:12px;border-radius:4px;background:var(--foam);animation:shimmer 1.4s infinite;margin-bottom:8px}
    .ia-texto{font-size:14px;line-height:1.7;color:var(--ink);margin-bottom:14px}
    .ia-lista{display:flex;flex-direction:column;gap:8px}
    .ia-item{display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.5}
    .ia-aviso{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:12px;line-height:1.6;padding-top:10px;border-top:1px solid var(--foam)}

    /* RISCOS */
    .risco-item{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--shore);font-size:13px;line-height:1.5}
    .risco-item:last-child{border-bottom:none}

    /* SIMULAÇÃO */
    .sim-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:8px}
    .sim-item{background:var(--sand);border-radius:10px;padding:10px;text-align:center}
    .sim-prazo{font-family:var(--mono);font-size:8px;letter-spacing:1px;color:var(--muted);margin-bottom:5px}
    .sim-valor{font-family:var(--display);font-size:15px;letter-spacing:1px;color:var(--ink)}
    .sim-rend{font-family:var(--mono);font-size:9px;color:var(--green);margin-top:2px}

    /* LISTA ATIVOS */
    .lista-ativo{background:var(--card);border:1.5px solid var(--shore);border-radius:var(--radius);padding:16px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:border-color .2s,transform .2s}
    .lista-ativo:hover{border-color:var(--wave);transform:translateY(-1px)}
    .lista-ticker{font-family:var(--display);font-size:20px;letter-spacing:2px;color:var(--wave)}
    .lista-nome{font-size:11px;color:var(--muted);margin-top:2px}
    .lista-seg{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:1px;letter-spacing:1px}
    .lista-preco{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--ink);text-align:right}
    .lista-var{font-family:var(--mono);font-size:11px;font-weight:500;text-align:right;margin-top:2px}
    .lista-var.pos{color:var(--green)}.lista-var.neg{color:var(--red)}

    /* BTN INVESTIR */
    .btn-investir-wrap{position:fixed;bottom:68px;left:0;right:0;padding:10px 16px;background:linear-gradient(to top,var(--sand) 60%,transparent);z-index:50}
    .btn-investir{width:100%;max-width:640px;margin:0 auto;height:52px;display:flex;background:var(--wave);color:white;border:none;border-radius:25px;font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:1.5px;cursor:pointer;transition:all .2s;align-items:center;justify-content:center;gap:10px}
    .btn-investir:hover{background:#3d1a70;transform:translateY(-1px)}

    /* TOAST */
    .toast{position:fixed;bottom:140px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:white;font-family:var(--mono);font-size:12px;padding:10px 22px;border-radius:20px;opacity:0;transition:all .3s;pointer-events:none;z-index:9000;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* NAV */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(245,242,251,.92);backdrop-filter:blur(16px);border-top:1.5px solid var(--shore);display:flex;justify-content:space-around;align-items:center;z-index:100}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 12px;border-radius:10px;transition:all .2s;text-decoration:none;color:inherit}
    .nav-item:hover{background:var(--shore)}
    .nav-icon{font-size:20px;line-height:1}
    .nav-label{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--muted)}
    .nav-item.active-link .nav-label{color:var(--wave);font-weight:500}

    .info-dica{background:var(--foam);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--wave)}

    /* TAG DE POSIÇÃO */
    .minha-pos-banner{background:linear-gradient(135deg,#d4f5e2,#c8f0da);border:1.5px solid #128a5530;border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;animation:fadeUp .3s ease}
    .minha-pos-banner.neg{background:linear-gradient(135deg,#ffd5ce,#ffc8bf);border-color:#c6282830}
    .mpb-label{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--green);margin-bottom:3px}
    .minha-pos-banner.neg .mpb-label{color:var(--red)}
    .mpb-valor{font-family:var(--display);font-size:22px;letter-spacing:1px;color:var(--green)}
    .minha-pos-banner.neg .mpb-valor{color:var(--red)}
    .mpb-pct{font-family:var(--display);font-size:18px;color:var(--green)}
    .minha-pos-banner.neg .mpb-pct{color:var(--red)}

    /* ══════ RESPONSIVO — mobile (padrão acima) / tablet / desktop ══════ */
    .sidebar{display:none}
    .header-inner{max-width:640px;margin:0 auto;width:100%;display:flex;align-items:center;gap:14px}

    @media (min-width:640px){
      .container{max-width:760px;padding:26px 24px}
      .feed-header{padding:0 24px;height:64px}
      .header-inner{max-width:760px}
      .header-titulo{font-size:20px}
    }

    @media (min-width:1024px){
      body{padding-bottom:0}
      .sidebar{
        display:flex;flex-direction:column;gap:2px;
        position:fixed;top:0;left:0;bottom:0;width:212px;
        background:var(--card);border-right:1.5px solid var(--shore);
        padding:22px 14px;z-index:100
      }
      .sidebar-brand{font-family:var(--display);font-size:20px;letter-spacing:2px;padding:8px 12px 22px;color:var(--wave)}
      .sidebar-nav{display:flex;flex-direction:column;gap:2px}
      .sni{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:var(--muted);text-decoration:none;transition:background .15s,color .15s}
      .sni:hover{background:var(--shore);color:var(--ink)}
      .sni.on{background:var(--wave);color:#fff}
      .sni-ico{font-size:16px;line-height:1}
      .app-main{margin-left:212px}
      .bottom-nav{display:none}
      .feed-header{padding:0 40px;height:76px}
      .header-inner{max-width:820px}
      .container{max-width:820px;padding:32px 40px}
      .btn-investir-wrap{max-width:820px;margin-left:auto;margin-right:auto}
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">POMBITOS</div>
    <nav class="sidebar-nav">
      <a class="sni" href="feed.html"><span class="sni-ico">🏠</span>FEED</a>
      <a class="sni" href="investir.html"><span class="sni-ico">📈</span>INVESTIR</a>
      <a class="sni" href="atlas.html"><span class="sni-ico">🔭</span>ATLAS</a>
      <a class="sni" href="carteira.html"><span class="sni-ico">💼</span>CARTEIRA</a>
      <a class="sni" href="perfil.html"><span class="sni-ico">👤</span>PERFIL</a>
    </nav>
  </aside>

  <div class="app-main">
  <header class="feed-header">
    <div class="header-inner">
    <button class="btn-voltar" onclick="history.back()">←</button>
    <div class="header-titulo" id="header-titulo">RELATÓRIO</div>
    <span class="header-tipo" id="header-tipo">···</span>
    </div>
  </header>

  <div class="container">
    <div id="skeleton-wrap">
      <div class="sk-bloco"><div class="sk-line" style="width:40%;height:28px"></div><div class="sk-line" style="width:70%"></div><div class="sk-line" style="width:50%"></div></div>
      <div class="sk-bloco"><div class="sk-line" style="width:60%"></div><div class="sk-line"></div><div class="sk-line" style="width:80%"></div></div>
      <div class="sk-bloco"><div class="sk-line" style="width:50%"></div><div class="sk-line"></div></div>
    </div>
    <div id="conteudo" style="display:none"></div>
  </div>

  <div class="btn-investir-wrap" id="btn-investir-wrap" style="display:none">
    <button class="btn-investir" onclick="irParaOrdem()">📊 INVESTIR NESTE ATIVO</button>
  </div>

  <div id="toast" class="toast"></div>

  <nav class="bottom-nav">
    <a class="nav-item" href="feed.html"><span class="nav-icon">🏠</span><span class="nav-label">FEED</span></a>
    <a class="nav-item" href="investir.html"><span class="nav-icon">📈</span><span class="nav-label">INVESTIR</span></a>
    <a class="nav-item" href="atlas.html"><span class="nav-icon">🔭</span><span class="nav-label">ATLAS</span></a>
    <a class="nav-item" href="carteira.html"><span class="nav-icon">💼</span><span class="nav-label">CARTEIRA</span></a>
    <a class="nav-item" href="perfil.html"><span class="nav-icon">👤</span><span class="nav-label">PERFIL</span></a>
  </nav>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="mercado-api.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    // FIX: para cripto, o TICKER na URL é o ID do CoinGecko (ex: "bitcoin"), em minúsculas
    // Para ações/fiis, é o símbolo B3 em maiúsculas (ex: "PETR4")
    const TICKER_RAW = (params.get('ticker') || '').trim();
    const TIPO       = params.get('tipo') || 'acoes';
    // Display: cripto exibe em maiúsculas, ações já vêm em maiúsculas
    const TICKER     = TIPO === 'cripto' ? TICKER_RAW.toLowerCase() : TICKER_RAW.toUpperCase();
    const TICKER_DISPLAY = TICKER_RAW.toUpperCase();

    let dadosAtivo = null, dadosDetalhe = null, dadosHist1y = null, dadosHist6m = null;
    let perfilUsuario = 'moderado';
    let minhasPosicoes = [];

    // ── TOAST ──
    let toastTimer;
    function toast(msg, dur=3000) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(()=>t.classList.remove('show'), dur);
    }

    function esconderSkeleton() {
      document.getElementById('skeleton-wrap').style.display = 'none';
      document.getElementById('conteudo').style.display = 'block';
    }

    // ── HELPERS ──
    const R$ = v => 'R$ ' + (v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
    const pct = v => (v>=0?'+':'') + (v||0).toFixed(2) + '%';
    function item(label, valor, cls='') {
      return `<div class="relatorio-item"><span class="item-label">${label}</span><span class="item-valor ${cls}">${valor}</span></div>`;
    }
    function nomeTipo(t) {
      return {acoes:'AÇÕES',fiis:'FIIs',cdb:'CDB',lci:'LCI/LCA',tesouro:'TESOURO DIRETO',cripto:'CRIPTO'}[t] || t.toUpperCase();
    }
    function traduzirRec(r) {
      return {buy:'Compra',strongBuy:'Compra Forte',sell:'Venda',strongSell:'Venda Forte',hold:'Neutro'}[r] || r || '—';
    }

    // FIX: para cripto passa o ID do CoinGecko e o preço atual para a ordem
    function irParaOrdem() {
      if (!TICKER_RAW) return;
      const preco = dadosAtivo?.preco || 0;
      if (TIPO === 'cripto') {
        // ticker=bitcoin (ID CoinGecko), tipo=cripto, preco=valor atual
        window.location.href = `ordem.html?ticker=${encodeURIComponent(TICKER)}&tipo=cripto&preco=${preco}`;
      } else {
        window.location.href = `ordem.html?ticker=${encodeURIComponent(TICKER)}&tipo=${TIPO}&preco=${preco}`;
      }
    }

    // ── EXTRAI MIN/MAX DO HISTÓRICO ──
    function extrairMinMax(historico) {
      if (!historico?.length) return { min: 0, max: 0 };
      const precos = historico.map(h => h.preco).filter(Boolean);
      return { min: Math.min(...precos), max: Math.max(...precos) };
    }

    function extrairVariacao(historico) {
      if (!historico?.length || historico.length < 2) return 0;
      const inicio = historico[0].preco;
      const fim    = historico[historico.length - 1].preco;
      return inicio > 0 ? ((fim - inicio) / inicio) * 100 : 0;
    }

    // ── INIT ──
    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) { window.location.href = 'invite.html'; return; }

      try {
        const [snapUser, snapCarteira] = await Promise.all([
          firebase.firestore().collection('usuarios').doc(user.uid).get(),
          firebase.firestore().collection('carteiras').doc(user.uid).get()
        ]);
        perfilUsuario  = snapUser.data()?.perfil_investidor || 'moderado';
        minhasPosicoes = snapCarteira.exists ? (snapCarteira.data()?.posicoes || []) : [];
      } catch(e) {
        perfilUsuario  = 'moderado';
        minhasPosicoes = [];
      }

      if (TICKER_RAW) {
        await carregarRelatorio();
      } else {
        await carregarListaCategoria();
      }
    });

    async function carregarRelatorio() {
      document.getElementById('header-titulo').textContent = TICKER_DISPLAY;
      document.getElementById('header-tipo').textContent = nomeTipo(TIPO);
      const conteudo = document.getElementById('conteudo');

      try {
        if (TIPO === 'cripto') {
          // ── ROTA CRIPTO: usa CoinGecko via MercadoAPI.buscarCripto ──
          const cripto = await MercadoAPI.buscarCripto(TICKER); // TICKER = ID ex: "bitcoin"
          if (!cripto || cripto.preco <= 0) throw new Error('Dados de cripto indisponíveis.');

          dadosAtivo = {
            preco:        cripto.preco,
            variacao_pct: cripto.variacao_24h || 0,
            nome:         cripto.nome || TICKER_DISPLAY,
          };
          dadosDetalhe = {
            market_cap:   cripto.market_cap  || 0,
            min_52s:      cripto.low_24h     || 0,
            max_52s:      cripto.high_24h    || 0,
            setor:        'Criptomoedas',
            industria:    cripto.simbolo?.toUpperCase() || '',
          };
          // Histórico de cripto: tenta buscar se MercadoAPI suportar
          try {
            dadosHist1y = await MercadoAPI.buscarHistoricoCripto(TICKER, 365);
            dadosHist6m = await MercadoAPI.buscarHistoricoCripto(TICKER, 180);
          } catch(_) {
            dadosHist1y = null; dadosHist6m = null;
          }

        } else {
          // ── ROTA AÇÕES / FIIS / TESOURO: brapi ──
          [dadosAtivo, dadosDetalhe, dadosHist1y, dadosHist6m] = await Promise.all([
            MercadoAPI.buscarAtivo(TICKER),
            MercadoAPI.buscarDetalhadoAtivo(TICKER),
            MercadoAPI.buscarHistorico(TICKER, '1y'),
            MercadoAPI.buscarHistorico(TICKER, '6mo'),
          ]);
        }

        // ── ENRIQUECE COM DADOS DO HISTÓRICO SE API RETORNOU ZEROS ──
        const hist1y = dadosHist1y?.historico || [];
        const hist6m = dadosHist6m?.historico || [];

        if (!(dadosDetalhe?.min_52s > 0) && hist1y.length) {
          const mm = extrairMinMax(hist1y);
          if (!dadosDetalhe) dadosDetalhe = {};
          dadosDetalhe.min_52s = mm.min;
          dadosDetalhe.max_52s = mm.max;
        }
        if (!(dadosHist6m?.variacao_periodo) && hist6m.length) {
          if (!dadosHist6m) dadosHist6m = {};
          dadosHist6m.variacao_periodo = extrairVariacao(hist6m);
          const mm6m = extrairMinMax(hist6m);
          dadosHist6m.min_periodo = mm6m.min;
          dadosHist6m.max_periodo = mm6m.max;
        }
        if (!(dadosHist1y?.variacao_periodo) && hist1y.length) {
          if (!dadosHist1y) dadosHist1y = {};
          dadosHist1y.variacao_periodo = extrairVariacao(hist1y);
        }
        if (!(dadosDetalhe?.media_50d > 0) && hist1y.length >= 50) {
          const ult50 = hist1y.slice(-50).map(h => h.preco);
          dadosDetalhe.media_50d = ult50.reduce((a,b)=>a+b,0) / ult50.length;
        }
        if (!(dadosDetalhe?.media_200d > 0) && hist1y.length >= 30) {
          const precos = hist1y.map(h => h.preco);
          dadosDetalhe.media_200d = precos.reduce((a,b)=>a+b,0) / precos.length;
        }

        esconderSkeleton();
        conteudo.innerHTML = '';

        // Banner "minha posição"
        // FIX: para cripto a chave salva no Firestore é o ID em minúsculas
        const tickerBusca = TIPO === 'cripto' ? TICKER : TICKER;
        const posicao = minhasPosicoes.find(p => p.ticker === tickerBusca);
        if (posicao) {
          const precoAtual = dadosAtivo?.preco || posicao.preco_medio || 0;
          const valorAtual = (posicao.quantidade||0) * precoAtual;
          const valorPago  = (posicao.quantidade||0) * (posicao.preco_medio||0);
          const ganho      = valorAtual - valorPago;
          const ganhoP     = valorPago > 0 ? (ganho/valorPago)*100 : 0;
          const isPos      = ganho >= 0;
          const banner = document.createElement('div');
          banner.className = `minha-pos-banner ${isPos?'':'neg'}`;
          banner.innerHTML = `
            <div>
              <p class="mpb-label">${isPos?'📈 MINHA POSIÇÃO — GANHO':'📉 MINHA POSIÇÃO — PERDA'}</p>
              <p class="mpb-valor">${isPos?'+':''}${R$(ganho)}</p>
              <p style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px">${posicao.quantidade} ${TIPO==='cripto'?'unidades':'cotas'} · PM R$ ${(posicao.preco_medio||0).toFixed(2)}</p>
            </div>
            <p class="mpb-pct">${pct(ganhoP)}</p>`;
          conteudo.appendChild(banner);
        }

        conteudo.appendChild(renderizarHero());
        conteudo.appendChild(renderizarHistoricoPrecos());
        conteudo.appendChild(renderizarFundamentos());

        if (TIPO === 'acoes' || TIPO === 'fiis') {
          const {setor, concorrentes} = MercadoAPI.obterConcorrentes(TICKER);
          if (concorrentes.length > 0) conteudo.appendChild(renderizarConcorrentes(setor, concorrentes));
          conteudo.appendChild(renderizarAnalistas());
        }

        conteudo.appendChild(renderizarRiscos());

        // IA
        const iaEl = document.createElement('div');
        iaEl.className = 'ia-card';
        iaEl.innerHTML = `
          <div class="ia-header"><span class="ia-badge">IA</span><p class="ia-titulo">ANÁLISE INTELIGENTE</p></div>
          <div class="ia-sk" style="width:100%"></div>
          <div class="ia-sk" style="width:85%"></div>
          <div class="ia-sk" style="width:90%"></div>
          <div class="ia-sk" style="width:70%"></div>`;
        conteudo.appendChild(iaEl);
        gerarAnaliseIA(iaEl);

        document.getElementById('btn-investir-wrap').style.display = 'block';

      } catch(e) {
        console.error('[Relatório]', e);
        esconderSkeleton();
        conteudo.innerHTML = `
          <div class="relatorio-secao">
            <p style="font-family:var(--mono);font-size:11px;color:var(--muted)">
              ⚠️ Não foi possível carregar dados de <strong>${TICKER_DISPLAY}</strong>.<br><br>
              Possíveis causas:<br>· Ticker incorreto (ex: use PETR4, não PETR)<br>
              · API temporariamente indisponível<br><br>
              <a href="investir.html" style="color:var(--wave)">← Voltar e tentar outro ativo</a>
            </p>
          </div>`;
      }
    }

    function desenharMiniChart(canvas, precos, isPos) {
      const dpr  = window.devicePixelRatio || 1;
      const W    = canvas.parentElement.offsetWidth;
      const H    = 70;
      canvas.width        = W * dpr;
      canvas.height       = H * dpr;
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      const pad = {t:4, r:4, b:4, l:4};
      const cw  = W - pad.l - pad.r;
      const ch  = H - pad.t - pad.b;
      const min = Math.min(...precos) * 0.998;
      const max = Math.max(...precos) * 1.002;
      const rng = max - min || 1;

      const xOf = i => pad.l + (i / (precos.length-1)) * cw;
      const yOf = v => pad.t + ch - ((v-min)/rng)*ch;

      const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t+ch);
      grad.addColorStop(0, isPos ? 'rgba(26,138,74,.3)' : 'rgba(204,34,0,.3)');
      grad.addColorStop(1, isPos ? 'rgba(26,138,74,.02)' : 'rgba(204,34,0,.02)');

      ctx.beginPath();
      ctx.moveTo(xOf(0), yOf(precos[0]));
      precos.forEach((p,i) => { if(i>0) ctx.lineTo(xOf(i), yOf(p)); });
      ctx.lineTo(xOf(precos.length-1), pad.t+ch);
      ctx.lineTo(xOf(0), pad.t+ch);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.beginPath();
      ctx.strokeStyle = isPos ? '#128a55' : '#c62828';
      ctx.lineWidth = 1.5;
      ctx.lineJoin = 'round';
      ctx.moveTo(xOf(0), yOf(precos[0]));
      precos.forEach((p,i) => { if(i>0) ctx.lineTo(xOf(i), yOf(p)); });
      ctx.stroke();

      const lx = xOf(precos.length-1);
      const ly = yOf(precos[precos.length-1]);
      ctx.beginPath();
      ctx.arc(lx, ly, 3.5, 0, Math.PI*2);
      ctx.fillStyle = isPos ? '#128a55' : '#c62828';
      ctx.fill();
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

      el.innerHTML = `
        <p class="secao-titulo">🏢 SETOR: ${setor.toUpperCase()}</p>
        <p style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:10px">Comparação no mesmo setor</p>
        <div id="conc-lista"><p style="font-family:var(--mono);font-size:10px;color:var(--muted)">Carregando concorrentes...</p></div>`;

      MercadoAPI.buscarMultiplos(tickers.slice(0,5)).then(dados => {
        const lista = el.querySelector('#conc-lista');
        if (!dados?.length) { lista.innerHTML = `<p style="font-family:var(--mono);font-size:10px;color:var(--muted)">Indisponível</p>`; return; }
        lista.innerHTML = dados.map(d => `
          <div class="conc-item" onclick="location.href='relatorio.html?ticker=${d.ticker}&tipo=${TIPO}'">
            <span class="conc-ticker">${d.ticker}</span>
            <span class="conc-nome">${d.nome||d.ticker}</span>
            <span class="conc-preco">R$ ${(d.preco||0).toFixed(2)}</span>
            <span class="conc-var ${(d.variacao_pct||0)>=0?'pos':'neg'}">${MercadoAPI.pct(d.variacao_pct||0)}</span>
          </div>`).join('');
      }).catch(()=>{});
      return el;
    }

    function renderizarAnalistas() {
      const d = dadosDetalhe || {};
      const c = d.rec_compra || 0, n = d.rec_neutro || 0, v = d.rec_venda || 0;
      const t = c + n + v || 1;
      const temDados = (c + n + v) > 0;
      const preco = dadosAtivo?.preco || 0;
      const potencial = d.alvo_analistas && preco ? ((d.alvo_analistas - preco) / preco) * 100 : null;

      const el = document.createElement('div');
      el.className = 'relatorio-secao';
      el.innerHTML = `
        <p class="secao-titulo">👥 CONSENSO DE ANALISTAS</p>
        ${item('Total analistas',    d.n_analistas > 0 ? d.n_analistas : '—')}
        ${item('Preço-alvo médio',   d.alvo_analistas ? R$(d.alvo_analistas) : '—')}
        ${potencial !== null ? item('Potencial de alta', pct(potencial), potencial>=0?'pos':'neg') : ''}
        ${item('Recomendação', traduzirRec(d.recomendacao), d.recomendacao==='buy'||d.recomendacao==='strongBuy'?'pos':d.recomendacao==='sell'?'neg':'')}
        ${temDados ? `
        <div class="analistas-bar" style="margin-top:12px">
          <div class="bar-c" style="width:${Math.round(c/t*100)}%"></div>
          <div class="bar-n" style="width:${Math.round(n/t*100)}%"></div>
          <div class="bar-v" style="width:${Math.round(v/t*100)}%"></div>
        </div>
        <div class="analistas-leg">
          <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>Compra ${c}</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--sun)"></div>Neutro ${n}</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>Venda ${v}</div>
        </div>
        <p style="font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:8px">* Distribuição estimada com base na recomendação consolidada</p>
        ` : `<p style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:8px">Dados de analistas indisponíveis para este ativo no momento.</p>`}`;
      return el;
    }

    function renderizarRiscos() {
      const mapa = {
        acoes:  ['Volatilidade pode causar perdas significativas','Resultados podem frustrar expectativas','Mudanças regulatórias afetam o setor','Risco cambial para exportadoras/importadoras'],
        fiis:   ['Vacância reduz os dividendos','Alta de juros pressiona as cotas','Concentração em poucos imóveis','Risco do setor imobiliário específico'],
        cdb:    ['Risco de crédito do emissor (FGC até R$ 250k)','Risco de liquidez sem resgate antecipado','Inflação corrói ganhos em prazos longos','IR regressivo impacta curto prazo'],
        lci:    ['Carência mínima obrigatória','Risco de crédito do emissor','Rentabilidade menor que CDB bruto','Poucos produtos disponíveis'],
        tesouro:['Marcação a mercado em prefixados','Risco político/fiscal','Prazo longo pode não adequar ao objetivo','Risco de inflação para Tesouro Selic'],
        cripto: ['Altíssima volatilidade — quedas de 50%+ em semanas são comuns','Risco regulatório — governos podem proibir ou restringir','Risco de custódia nas exchanges — sem FGC','Mercado 24h com variações noturnas sem liquidez imediata'],
      };
      const riscos = mapa[TIPO] || mapa.acoes;
      const el = document.createElement('div');
      el.className = 'relatorio-secao';
      el.innerHTML = `
        <p class="secao-titulo">⚠️ RISCOS</p>
        ${riscos.map(r=>`<div class="risco-item"><span>⚠️</span><span>${r}</span></div>`).join('')}`;
      return el;
    }

    // ══════════════════════════════════════════
    //  ANÁLISE IA
    //  FIX: model string correto + header anthropic-dangerous-direct-browser-ipc
    // ══════════════════════════════════════════
    async function gerarAnaliseIA(el) {
      const d     = dadosDetalhe || {};
      const preco = dadosAtivo?.preco || 0;
      const var1y = dadosHist1y?.variacao_periodo || 0;
      const var6m = dadosHist6m?.variacao_periodo || 0;
      const min52 = d.min_52s || 0;
      const max52 = d.max_52s || 0;

      const nomeTipoStr = nomeTipo(TIPO);

      const prompt = `Você é um analista financeiro educacional da plataforma Los Pombitos Investimentos.
Analise o ativo ${TICKER_DISPLAY} (${nomeTipoStr}) e gere um relatório em português brasileiro para um investidor com perfil: ${perfilUsuario}.

DADOS DISPONÍVEIS:
- Preço atual: R$ ${preco.toFixed(2)} | Variação: ${pct(dadosAtivo?.variacao_pct||0)}
- Variação 6 meses: ${pct(var6m)} | Variação 1 ano: ${pct(var1y)}
- Mín período: R$ ${min52.toFixed(2)} | Máx período: R$ ${max52.toFixed(2)}
- Posição na faixa: ${min52>0?((preco-min52)/(max52-min52||1)*100).toFixed(0)+'%':'N/A'}
- Média 50 dias: R$ ${(d.media_50d||0).toFixed(2)} | Média 200 dias: R$ ${(d.media_200d||0).toFixed(2)}
- P/L: ${d.pl?.toFixed(2)||'N/A'} | P/VP: ${d.pvp?.toFixed(2)||'N/A'}
- Dividend Yield: ${pct(d.dy||0)} | ROE: ${pct(d.roe||0)}
- Margem Líquida: ${pct(d.margem_lucro||0)} | Setor: ${d.setor||nomeTipoStr}
- Recomendação analistas: ${traduzirRec(d.recomendacao)} | Preço-alvo: R$ ${d.alvo_analistas?.toFixed(2)||'N/A'}
- Market Cap: ${d.market_cap ? MercadoAPI.bigNum(d.market_cap) : 'N/A'}

Responda APENAS com JSON válido (sem markdown, sem texto fora do JSON):
{"resumo":"2-3 frases sobre o ativo e momento atual","positivos":["p1","p2","p3"],"atencao":["a1","a2","a3"],"perfil_ideal":"uma frase","horizonte":"curto/médio/longo prazo","contexto_macro":"uma frase sobre o contexto macroeconômico"}`;

      try {
        // A chamada à Anthropic agora passa pelo proxy serverless /api/analise-ia,
        // que guarda a chave no servidor (variável de ambiente ANTHROPIC_API_KEY
        // na Vercel). O client nunca vê a chave nem fala direto com api.anthropic.com.
        const res = await fetch('/api/analise-ia', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });

        if (!res.ok) {
          const err = await res.json().catch(()=>({error:'Erro desconhecido'}));
          throw new Error(err?.error || `HTTP ${res.status}`);
        }

        const data = await res.json();
        const limpo = (data.texto || '').replace(/```json|```/g, '').trim();
        const a = JSON.parse(limpo);

        el.innerHTML = `
          <div class="ia-header"><span class="ia-badge">IA</span><p class="ia-titulo">ANÁLISE INTELIGENTE</p></div>
          <p class="ia-texto">${a.resumo}</p>
          <p style="font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--green);margin-bottom:8px">✅ PONTOS POSITIVOS</p>
          <div class="ia-lista">${a.positivos.map(p=>`<div class="ia-item"><span>✅</span><span>${p}</span></div>`).join('')}</div>
          <p style="font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--coral);margin:14px 0 8px">⚠️ PONTOS DE ATENÇÃO</p>
          <div class="ia-lista">${a.atencao.map(x=>`<div class="ia-item"><span>⚠️</span><span>${x}</span></div>`).join('')}</div>
          <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--foam)">
            ${item('Perfil ideal',   a.perfil_ideal)}
            ${item('Horizonte',      a.horizonte)}
            ${item('Contexto macro', a.contexto_macro)}
          </div>
          <p class="ia-aviso">⚠️ Esta análise é educacional e não constitui recomendação de investimento. Consulte um assessor antes de investir.</p>`;

      } catch(e) {
        console.error('[IA]', e);
        // Fallback com dados reais disponíveis
        const var1yVal  = dadosHist1y?.variacao_periodo || 0;
        const var6mVal  = dadosHist6m?.variacao_periodo || 0;
        const pl        = dadosDetalhe?.pl || 0;
        const dy        = dadosDetalhe?.dy || 0;
        const posRange  = min52 > 0 ? ((preco-min52)/(max52-min52||1)*100).toFixed(0) : null;

        el.innerHTML = `
          <div class="ia-header"><span class="ia-badge">ANÁLISE</span><p class="ia-titulo">DADOS DO ATIVO</p></div>
          <p class="ia-texto">
            ${TICKER_DISPLAY} negocia a R$ ${preco.toFixed(2)}${var1yVal !== 0 ? `, com ${var1yVal>0?'valorização':'queda'} de ${Math.abs(var1yVal).toFixed(1)}% em 12 meses e ${Math.abs(var6mVal).toFixed(1)}% em 6 meses` : ''}.
            ${posRange !== null ? `Está a ${posRange}% da sua faixa de preços recente (mín R$ ${min52.toFixed(2)}, máx R$ ${max52.toFixed(2)}).` : ''}
            ${pl > 0 ? `P/L de ${pl.toFixed(1)}${pl<15?' indica valuation atrativo':pl>30?' está elevado':' está em linha com o setor'}.` : ''}
            ${dy > 4 ? `Dividend Yield de ${dy.toFixed(1)}% é um ponto positivo para renda passiva.` : ''}
          </p>
          ${item('Variação 6 meses', pct(var6mVal), var6mVal>=0?'pos':'neg')}
          ${item('Variação 1 ano', pct(var1yVal), var1yVal>=0?'pos':'neg')}
          ${posRange !== null ? item('Posição na faixa', posRange + '%') : ''}
          <p class="ia-aviso">⚠️ Análise automática temporariamente indisponível. Os dados acima foram calculados do histórico de preços.</p>`;
      }
    }

    // ══════════════════════════════════════════
    //  LISTAS DE CATEGORIA
    // ══════════════════════════════════════════
    function renderizarTesouro(conteudo, titulos, taxas) {
      conteudo.innerHTML = `
        <div class="relatorio-secao">
          <p class="secao-titulo">📊 TAXAS DE REFERÊNCIA</p>
          ${item('SELIC Meta', MercadoAPI.pct(taxas.selic_meta,2))}
          ${item('CDI Anual (aprox.)', MercadoAPI.pct(taxas.cdi_anual_aprox,2))}
          ${item('IPCA 12 meses', MercadoAPI.pct(taxas.ipca_12m,2))}
        </div>` +
        titulos.map(t => {
          const tipo = t.tipo==='selic'?'cdi_pct':t.tipo==='ipca'?'ipca_mais':'prefixado';
          const taxa = t.tipo==='selic'?100:t.taxa_compra;
          const s12 = MercadoAPI.simularRendaFixa({valor:10000,tipo,taxa,prazoMeses:12});
          const s24 = MercadoAPI.simularRendaFixa({valor:10000,tipo,taxa,prazoMeses:24});
          return `
            <div class="relatorio-secao">
              <p class="secao-titulo">${t.tipo==='selic'?'📈':t.tipo==='ipca'?'🏛️':'🔒'} ${t.nome}</p>
              ${item('Taxa de compra', MercadoAPI.pct(t.taxa_compra,2)+' a.a.')}
              ${item('Vencimento', new Date(t.vencimento).toLocaleDateString('pt-BR'))}
              ${item('Investimento mínimo', MercadoAPI.R$(t.min_investimento||100))}
              <p style="font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);margin:12px 0 8px">SIMULAÇÃO — R$ 10.000,00</p>
              <div class="sim-grid">
                <div class="sim-item"><p class="sim-prazo">1 ANO</p><p class="sim-valor">${MercadoAPI.R$(s12.montante_liquido)}</p><p class="sim-rend">+${MercadoAPI.R$(s12.renda_liquida)}</p></div>
                <div class="sim-item"><p class="sim-prazo">2 ANOS</p><p class="sim-valor">${MercadoAPI.R$(s24.montante_liquido)}</p><p class="sim-rend">+${MercadoAPI.R$(s24.renda_liquida)}</p></div>
                <div class="sim-item"><p class="sim-prazo">IR</p><p class="sim-valor">15%</p><p class="sim-rend">>2 anos</p></div>
              </div>
              <button class="btn-investir" style="position:static;margin-top:12px;max-width:100%;height:42px;font-size:11px"
                onclick="location.href='ordem.html?ticker=${encodeURIComponent(t.nome)}&tipo=tesouro&taxa=${t.taxa_compra}&preco=${t.preco_compra||100}'">
                INVESTIR NESTE TÍTULO
              </button>
            </div>`;
        }).join('');
    }

    // FIX: lista cripto linka com ?ticker=ID&tipo=cripto (ID em minúsculas, ex: "bitcoin")
    function renderizarListaCripto(conteudo, criptos) {
      conteudo.innerHTML = `<p class="info-dica">💡 Clique em uma cripto para ver o relatório completo</p>` +
        criptos.map(c => `
          <div class="lista-ativo" onclick="location.href='relatorio.html?ticker=${encodeURIComponent(c.id)}&tipo=cripto'">
            <div style="display:flex;align-items:center;gap:10px">
              <img src="${c.imagem}" width="32" height="32" style="border-radius:50%" onerror="this.style.display='none'">
              <div>
                <p class="lista-ticker" style="font-size:16px">${(c.simbolo||c.id).toUpperCase()}</p>
                <p class="lista-nome">${c.nome} · #${c.rank}</p>
              </div>
            </div>
            <div>
              <p class="lista-preco">${MercadoAPI.R$(c.preco)}</p>
              <p class="lista-var ${(c.variacao_24h||0)>=0?'pos':'neg'}">${MercadoAPI.pct(c.variacao_24h||0)}</p>
            </div>
          </div>`).join('');
    }

    function renderizarRendaFixaInfo(conteudo) {
      const isCDB = TIPO === 'cdb';
      const sim = [12,24,36].map(m => {
        const s = MercadoAPI.simularRendaFixa({valor:10000,tipo:'cdi_pct',taxa:isCDB?110:90,prazoMeses:m});
        return `<div class="sim-item"><p class="sim-prazo">${m} MESES</p><p class="sim-valor">${MercadoAPI.R$(s.montante_liquido)}</p><p class="sim-rend">+${MercadoAPI.R$(s.renda_liquida)}</p></div>`;
      }).join('');
      conteudo.innerHTML = `
        <div class="relatorio-secao">
          <p class="secao-titulo">${isCDB?'🏦':'🌱'} ${isCDB?'CDB':'LCI / LCA'}</p>
          <p style="font-size:13px;line-height:1.7;color:var(--ink);margin-bottom:14px">
            ${isCDB?'O CDB é um título emitido por bancos. Você empresta dinheiro ao banco e recebe juros. Tem proteção do FGC até R$ 250.000.':'LCI e LCA são títulos isentos de Imposto de Renda para pessoa física. Ideais para quem está na faixa alta do IR.'}
          </p>
          ${item('Proteção FGC','Sim — até R$ 250.000')}
          ${item('Imposto de Renda',isCDB?'Sim (tabela regressiva)':'Isento para PF ✅',isCDB?'':'pos')}
          ${item('Liquidez',isCDB?'Depende do produto':'Carência mínima obrigatória')}
          ${item('Rentabilidade típica',isCDB?'100-120% do CDI':'85-95% do CDI')}
        </div>
        <div class="relatorio-secao">
          <p class="secao-titulo">🧮 SIMULAÇÃO — R$ 10.000,00</p>
          <div class="sim-grid">${sim}</div>
          <p style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:10px">Simulação a ${isCDB?'110%':'90%'} do CDI · CDI aprox. 13,65% a.a.</p>
        </div>`;
    }
  </script>
</body>
